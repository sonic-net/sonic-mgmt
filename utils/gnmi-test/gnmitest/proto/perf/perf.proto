syntax = "proto3";

import "github.com/openconfig/gnmi/proto/gnmi/gnmi.proto";

package perf;
option go_package = "github.com/openconfig/gnmitest/proto/perf";
// Instances.
message Instance {
  string description = 1;
  int64  exec_time = 2;
}

// InstanceGroup stores a set of Instances.
message InstanceGroup {
  int64 iteration = 1;
  string description = 2;
  repeated Instance instance = 3;
  int64 exec_time = 4;
}

// Report is result of running suite.Suite
message Perf {
  repeated InstanceGroup results = 1;
  int64 exec_time = 2;
  int64 avg_time = 3;
}
