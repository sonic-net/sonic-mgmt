---
# IPv6-only management network configuration for Beijing Lab bjw3
# This file contains IPv6 equivalents of management services when using --ipv6-only-mgmt

# IPv6 NTP servers
# IPv6 equivalent of existing NTP server configuration similar to bjw
ntp_servers_ipv6:
  - '2404:f801:10:2200::a96:16de'   # IPv6 equivalent of testbed server

# IPv6 DNS servers
# IPv6 equivalents of existing DNS servers plus Google IPv6 DNS
dns_servers_ipv6:
  - '2404:f801:10:3200::a32:3232'   # IPv6 equivalent of 10.50.50.50
  - '2404:f801:10:3200::a32:a32'    # IPv6 equivalent of 10.50.10.50

# IPv6 syslog servers
# IPv6 equivalent of existing syslog server
syslog_servers_ipv6:
  - '2404:f801:10:2200::a96:16de'   # IPv6 equivalent of testbed server

# IPv6 TACACS servers
# Note: These will be overridden to use PTF IPv6 address when use_ptf_tacacs_server is enabled
# Currently bjw has no tacacs_servers, so using empty list
tacacs_servers_ipv6: []

# IPv6 SNMP servers
# IPv6 equivalent of existing SNMP server
snmp_servers_ipv6:
  - '2404:f801:10:2200::a96:16de'   # IPv6 equivalent of testbed server

# Keep existing TACACS settings for Beijing Lab
tacacs_group_ipv6: 'BeijingLab'
tacacs_passkey_ipv6: testing123
tacacs_enabled_by_default_ipv6: false

# IPv6 forced management routes
# Include existing IPv6 routes plus additional ones for IPv6-only management
forced_mgmt_routes_ipv6:
  - '2404:f801:10:2200::a96:16de'   # IPv6 equivalent of testbed server (host route)
  - '2404:f801:10:2200::/64'         # Beijing lab network
  - '2404:f801:10:3200::/64'         # Beijing DNS server network
  - '2404:f801:10:1600::/64'         # Additional Beijing lab network
