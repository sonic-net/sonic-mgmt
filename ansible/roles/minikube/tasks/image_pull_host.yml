---
# Host-side image-pull enablement (testbed server). Included from host_create.yml
# when minikube_setup_image_pull is true. Stands up a forward proxy on the mgmt
# bridge IP (if no external proxy is provided) and creates the registry
# imagePullSecret so kubelet can pull from the ACR through the proxy.

- name: Validate registry credentials are provided
  assert:
    that:
      - minikube_registry_server | length > 0
      - minikube_registry_username | length > 0
      - minikube_registry_password | length > 0
      - minikube_dummy_image | length > 0
    fail_msg: >-
      minikube_setup_image_pull requires minikube_registry_server/username/password
      and minikube_dummy_image to be set.

- name: Set up a forward proxy on the testbed server
  block:
    - name: Install tinyproxy
      apt:
        name: tinyproxy
        state: present
      become: true

    - name: Configure tinyproxy on the mgmt bridge IP
      copy:
        dest: /etc/tinyproxy/tinyproxy.conf
        mode: "0644"
        content: |
          User tinyproxy
          Group tinyproxy
          Port {{ minikube_host_proxy_port }}
          Listen {{ minikube_apiserver_ip }}
          Timeout 600
          Allow 127.0.0.1
          Allow {{ minikube_apiserver_ip | regex_replace('\\.[0-9]+$', '.0') }}/24
          ConnectPort 443
          ConnectPort 563
          LogLevel Info
      become: true

    - name: Restart tinyproxy
      service:
        name: tinyproxy
        state: restarted
        enabled: true
      become: true
  when:
    - minikube_setup_host_proxy | bool
    - minikube_image_pull_proxy | length == 0

- name: Create the registry imagePullSecret
  command: >-
    {{ minikube_path }} kubectl -- create secret docker-registry {{ minikube_image_pull_secret_name }}
    --docker-server={{ minikube_registry_server }}
    --docker-username={{ minikube_registry_username }}
    --docker-password={{ minikube_registry_password }}
    --dry-run=client -o yaml
  register: pull_secret_yaml
  environment: "{{ minikube_proxy_env }}"
  no_log: true
  changed_when: false

- name: Apply the registry imagePullSecret
  command: "{{ minikube_path }} kubectl -- apply -f -"
  args:
    stdin: "{{ pull_secret_yaml.stdout }}"
  environment: "{{ minikube_proxy_env }}"
  no_log: true

- name: Stage the dummy smoke DaemonSet manifest
  template:
    src: dummy-daemonset.yaml.j2
    dest: /tmp/dummy-daemonset.yaml
    mode: "0644"

- name: Apply the dummy smoke DaemonSet
  command: "{{ minikube_path }} kubectl -- apply -f /tmp/dummy-daemonset.yaml"
  environment: "{{ minikube_proxy_env }}"
