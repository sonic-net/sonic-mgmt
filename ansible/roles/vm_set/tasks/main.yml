# This role creates a set of VM with veos or SONiC or cisco or Ubuntu for Kubernetes master
# Input parameters for the role:
# - vm_set_action: 'start', 'stop' or 'renumber' for creating, removing, or renumbering vm set respectively
# - id: sequence number for vm set on the host.
# - external_port: interface which will be used as parent for vlan interface creation
# - vlan_base: first vlan id for the VMs
# - VMs: a dictionary which contains hostnames of VMs as a key and a dictionary with parameters (num, memory, mgmt_ip) for every VM.
# - topology: a dictionary which contains hostnames of VMs as a key and vlans value which define a topology (numbers of connected ports for every VM)
# - mgmt_bridge: linux bridge which is used for management interface connections

# Backward compatibility: 'action' was renamed to 'vm_set_action' because 'action' is
# a reserved variable name in ansible-core >= 2.20. Accept both old and new names.
- name: Map legacy 'action' variable to 'vm_set_action'
  set_fact:
    vm_set_action: "{{ action }}"
  when: vm_set_action is not defined and action is defined

# Variables used by the role are mostly defined in files under ansible/group_vars/vm_host directory.
# Supported neighbor types are: veos, sonic, cisco, ubuntu, k8s
# For each of the supported neighbor types, there is a file in ansible/group_vars/vm_host directory which defines the
# the variables for the neighbor type. The neighbor VM image files usually can be manually prepared or automatically
# downloaded from the URLs defined in the variables. Please update the URLs to the actual URLs of the image files in
# your environment.

# ---- Fail if Ubuntu < 22.04 or Debian < 13 ----
# Callers of this role are inconsistent about fact gathering:
#   * Some set `gather_facts: no` (testbed_renumber_vm_topology.yml,
#     testbed_connect_vms.yml, testbed_disconnect_vms.yml, testbed_start_k8s_VMs.yml,
#     testbed_stop_k8s_VMs.yml, testbed_connect_topo.yml) so that their `pre_tasks`
#     can override ansible_user / ansible_password from vm_host_user etc. before any
#     connection is made.
#   * Others rely on the default `gather_facts: yes` (testbed_add_vm_topology.yml,
#     testbed_remove_vm_topology.yml, testbed_start_VMs.yml, testbed_stop_VMs.yml).
# Gather a minimal fact subset here, but only when the facts are missing, so the
# checks work for both kinds of caller. `gather_subset: min` is cheap and skips the
# expensive interface/hardware enumeration; the `when` guard makes it a no-op when
# the caller already gathered facts.
- name: Gather minimal host facts for distribution checks
  setup:
    gather_subset:
      - min
  when: ansible_distribution is not defined or ansible_distribution_version is not defined

- name: Fail if distribution is not Ubuntu or Debian
  fail:
    msg: >-
      Distribution '{{ ansible_distribution }}' is not supported.
      Only Ubuntu 22.04, Ubuntu 24.04, and Debian 13 (Trixie) are supported.
  when:
    - ansible_distribution != "Ubuntu"
    - ansible_distribution != "Debian"

- name: Fail if Ubuntu version is not supported
  fail:
    msg: >-
      Ubuntu {{ ansible_distribution_version}} is not supported.
      Minimum required version is 22.04.
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version is version("22.04", "<")

- name: Fail if Debian version is not supported
  fail:
    msg: >-
      Debian {{ ansible_distribution_version}} is not supported.
      Minimum required version is 13.
  when:
    - ansible_distribution == "Debian"
    - ansible_distribution_version is version("13.0", "<")

# ---- Host setup gating ----
- name: Pick package_installation from env
  set_fact:
    package_installation: "{{ lookup('env', 'PACKAGE_INSTALLATION') }}"
  when: package_installation is not defined and lookup('env', 'PACKAGE_INSTALLATION') | length > 0

- name: Set the default variable package_installation
  set_fact:
    package_installation: true
  when: package_installation is not defined

- name: Pick FORCE_HOST_SETUP from env
  set_fact:
    force_host_setup: "{{ lookup('env', 'FORCE_HOST_SETUP') | default('false') | bool }}"

# Bump this version string whenever host_setup.yml tasks change materially.
- name: Define host setup version
  set_fact:
    host_setup_version: "1"

- name: Check if host setup flag file exists
  stat:
    path: /opt/sonic-testbed/.host_setup_done
  register: host_setup_flag

- name: Read host setup version from flag
  slurp:
    src: /opt/sonic-testbed/.host_setup_done
  register: host_setup_flag_content
  when: host_setup_flag.stat.exists
  ignore_errors: yes

- name: Determine if host setup should run
  set_fact:
    run_host_setup: >-
      {{ force_host_setup
         or not host_setup_flag.stat.exists
         or (host_setup_flag_content.content | default('') | b64decode | trim) != host_setup_version }}

- name: Include host setup tasks
  include_tasks: host_setup.yml
  when: run_host_setup | bool and package_installation | bool

# ---- Python environment (idempotent) ----
- name: Ensure Python environment
  include_tasks: ensure_python_env.yml
  when: package_installation | bool

- name: Check if venv python exists
  stat:
    path: "{{ sonic_testbed_venv }}/bin/python"
  register: venv_python_stat

- name: Set ansible python interpreter to venv
  set_fact:
    ansible_python_interpreter: "{{ sonic_testbed_venv }}/bin/python"
  when: venv_python_stat.stat.exists

# ---- User groups (always run, per-user) ----
- name: Ensure {{ ansible_user }} in docker,sudo group
  user:
    name: "{{ ansible_user }}"
    append: yes
    groups: docker,sudo
  become: yes

- name: Ensure {{ ansible_user }} in libvirt group
  user:
    name: "{{ ansible_user }}"
    append: yes
    groups: libvirt
  become: yes

# ---- Async flag ----
- name: Initialize async flag
  set_fact:
    enable_async: "{{ enable_async | default(false) | bool }}"

# ---- External/internal network setup ----
- name: Setup external front port
  include_tasks: external_port.yml
  when: external_port is defined and "bmc" not in topo

- name: Setup internal management network
  include_tasks: internal_mgmt_network.yml
  when: internal_mgmt_network is defined and internal_mgmt_network == True

# ---- Home/root path ----
- block:
    - getent:
        database: passwd
        key: "{{ ansible_user }}"
        split: ":"
    - set_fact:
        home_path: "{{ getent_passwd[ansible_user][4] }}"
      when: home_path is not defined

    # root_path is supposed to be absolute path.
    - set_fact:
        root_path: "{{ home_path + '/' + root_path }}"
      when: "not root_path.startswith('/')"

    - debug: msg="home_path = {{ home_path }} root_path = {{ root_path }}"

    # Newer Ubuntu releases default new home directories to mode 0750
    # (see DIR_MODE in /etc/adduser.conf), which blocks the unprivileged
    # libvirt-qemu user from traversing /home/<user> to open VM disk
    # images stored under {{ home_path }}/sonic-vm/disks/.  Grant
    # libvirt-qemu the execute (traverse) bit on home_path via a POSIX
    # ACL.  This is targeted (only libvirt-qemu, not "other"), survives
    # subsequent chmod operations, and avoids running QEMU as root.
    #
    # Gated on package_installation because the acl package and the
    # libvirt-qemu user are both installed by host_setup.yml; with
    # package_installation=false the caller is responsible for ensuring
    # those exist out-of-band.
    - name: Allow libvirt-qemu to traverse home directory
      acl:
        path: "{{ home_path }}"
        entity: libvirt-qemu
        etype: user
        permissions: x
        state: present
      become: yes
      when: package_installation | bool

# ---- VM setup ----
- name: Require veos or SONiC or cisco VMs by default
  set_fact:
    vm_required: true

- name: veos or SONiC or cisco VMs not needed when setting up Kubernetes master
  set_fact:
    vm_required: false
  when:
    - k8s is defined

- name: VMs not needed in case of Keysight API Server
  set_fact:
    vm_required: false
  when:
    - ptf_imagename is defined
    - ptf_imagename == "docker-keysight-api-server"

- name: VMs not needed in case of Keysight IxANVL
  set_fact:
    veos_vm_required: false
  when:
    - ptf_imagename is defined
    - ptf_imagename == "docker-ptf-anvl"

- name: Retrieve a list of the defined VMs
  virt: command=list_vms
        uri=qemu:///system
  register: vm_list_defined
  become: true

- name: Retrieve a list of the running VMs
  virt: command=list_vms
        uri=qemu:///system
        state=running
  register: vm_list_running
  become: true

- name: Set vm_state_string according to ansible version
  set_fact:
    vm_state_string: "{{ 'paused' if ansible_version.full is version_compare('2.13', '>=') else 'pause' }}"

- name: Print ansible version and vm_state_string
  debug:
    msg: "ansible version is {{ ansible_version.full }} and vm_state_string is {{ vm_state_string }}"

- name: Retrieve a list of the paused VMs with status={{ vm_state_string }}
  virt: command=list_vms
        uri=qemu:///system
        state={{ vm_state_string }}
  register: vm_list_paused
  become: true

- name: Require VMs as CEOS by default
  set_fact:
    vm_type: "ceos"
  when: vm_type is not defined

- name: Set default value for topo_is_multi_vrf
  set_fact:
    topo_is_multi_vrf: False
  when: topo_is_multi_vrf is not defined

# Honor the converger-provided front-panel count for EVERY vm_set action, not
# just 'start'. A converged (multi-VRF) cEOS prime hosts many merged sub-peers,
# so the converger surfaces the required fp count as max_fp_num_provided at the
# topo root. The 'add_topo' action creates the br-<vm>-N OVS bridges
# (add_ceos_list.yml "Create VMs network") and then binds them; without this
# override max_fp_num stays at the default 4, only 4 bridges are created, and
# the subsequent bind fails with "Too many vlans. Maximum is 4". start.yml has
# its own copy for the 'start' action; doing it here covers add_topo /
# connect_vms / renumber too. Gated on max_fp_num_provided so stock and
# non-converged topologies are byte-identical.
- name: Pick provided max num of fp
  set_fact:
    max_fp_num: "{{ max_fp_num_provided }}"
  when: max_fp_num_provided is defined

- name: Check VM type
  fail:
    msg: "Cannot support this VM type {{ vm_type }}"
  when: vm_type not in supported_vm_types

- block:
    - name: Ensure {{ root_path }} exists
      file: path={{ root_path }} state=directory

    - name: Install cleanup script
      template: src=cleanup.sh.j2
                dest={{ root_path }}/cleanup.sh

    - name: Copy vm_resumer.py to the {{ root_path }}
      become: true
      copy:
        src: roles/vm_set/files/vm_resumer.py
        dest: "{{ root_path }}"
        mode: 0755

    - name: Find current server group
      set_fact: current_server={{ group_names | extract_by_prefix('server_') }}

    - name: Extract VM names from the inventory
      set_fact: VM_hosts={{ groups[current_server] | filter_by_prefix('VM') | sort}}

    - name: Limit VM
      set_fact: VM_hosts="{{ VM_hosts | first_n_elements(VM_num) }}"
      when: VM_num is defined and VM_num|int > 0

    - name: Generate vm list of target VMs
      set_fact: VM_targets={{ VM_hosts | filter_vm_targets(topology['VMs'], VM_base, dut_interfaces | default("")) | sort }}
      when: topology['VMs'] is defined

    - name: Set fallback default value for VM_targets
      set_fact: VM_targets={{ [] }}
      when: VM_targets is not defined

    - name: Set vm configuration properties when configuration is defined
      set_fact: vm_properties="{{ configuration | expand_properties(configuration_properties) }}"
      when: configuration is defined

    - name: Set vm configuration properties when configuration is not defined
      set_fact: vm_properties={}
      when: configuration is not defined

    - name: Stop VMs
      include_tasks: stop.yml
      when: vm_set_action == 'stop'

    - name: Start VMs
      include_tasks: start.yml
      when: vm_set_action == 'start'

    - name: Connect VMs
      include_tasks: connect_vms.yml
      when: vm_set_action == 'connect_vms'

    - name: Disconnect VMs
      include_tasks: disconnect_vms.yml
      when: vm_set_action == 'disconnect_vms'

    - name: Renumber topology
      include_tasks: renumber_topo.yml
      when: vm_set_action == 'renumber_topo'

  when: vm_required is defined and vm_required == True

- name: Set fallback default value for VM_targets
  set_fact:
    VM_targets: []
  when: VM_targets is not defined

- name: Generate DPU list of target DPUs
  set_fact: dpu_targets={{ VM_hosts | filter_vm_targets(topology['DPUs'], VM_base) | sort }}
  when: topology['DPUs'] is defined and hostvars[duts_name]['type'] == 'kvm'

- name: Set fallback default value for dpu_targets
  set_fact: dpu_targets={{ [] }}
  when: dpu_targets is not defined

- name: Add topology
  include_tasks: add_topo.yml
  when: vm_set_action == 'add_topo'

- name: Remove topology
  include_tasks: remove_topo.yml
  when: vm_set_action == 'remove_topo'

- name: Stop Kubernetes VMs
  include_tasks: stop_k8s.yml
  when: vm_set_action == 'stop_k8s'

- name: Start Kubernetes VMs
  include_tasks: start_k8s.yml
  when: vm_set_action == 'start_k8s'

- name: Manage the dut state
  include_tasks: manage_duts.yml
  loop: "{{ duts_name.split(',') }}"
  loop_control:
    loop_var: dut_name
  when: duts_name is defined
