- name: create directory for sonic config
  become: yes
  file:
    path: "/{{ csonic_image_mount_dir }}/csonic_{{ vm_set_name }}_{{ inventory_hostname }}/sonic"
    state: directory
  delegate_to: "{{ VM_host[0] }}"

- name: create config db
  become: yes
  template:
    src: "{{ lookup('first_found', _csonic_configdb_candidates) }}"
    dest: "/{{ csonic_image_mount_dir }}/csonic_{{ vm_set_name }}_{{ inventory_hostname }}/sonic/config_db.json"
  vars:
    _csonic_configdb_candidates:
      files:
        - "configdb-{{ topo }}-{{ props.swrole | default('') }}.j2"
        - "configdb-{{ props.swrole | default('') }}.j2"
        - "configdb-csonic.j2"
      paths:
        - "{{ role_path }}/templates"
  delegate_to: "{{ VM_host[0] }}"

# NOTE: cSONiC FRR configuration is generated by bgpcfgd from CONFIG_DB
# (BGP_NEIGHBOR entries in config_db.json), the same path as production SONiC.
# Only the /sonic directory is bind-mounted into the container; an frr/
# directory would not be consumed, so no FRR/zebra/daemons/vtysh files are
# rendered here.
