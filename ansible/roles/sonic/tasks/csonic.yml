- include_tasks: csonic_config.yml

- name: Create cSONiC container csonic_{{ vm_set_name }}_{{ inventory_hostname }}
  become: yes
  docker_container:
    name: csonic_{{ vm_set_name }}_{{ inventory_hostname }}
    image: "{{ csonic_image }}"
    pull: no
    state: started
    restart: yes
    tty: yes
    network_mode: container:net_{{ vm_set_name }}_{{ inventory_hostname }}
    detach: True
    capabilities:
      - net_admin
    privileged: yes
    volumes:
      - /{{ csonic_image_mount_dir }}/csonic_{{ vm_set_name }}_{{ inventory_hostname }}/sonic:/var/sonic
    env:
      HWSKU: "SONiC-VM"
  delegate_to: "{{ VM_host[0] }}"

- name: Wait for CONFIG_DB to be ready in container
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} sonic-db-cli CONFIG_DB PING
  delegate_to: "{{ VM_host[0] }}"
  register: configdb_ping
  until: configdb_ping.rc == 0 and (configdb_ping.stdout | trim) in ["True", "PONG"]
  retries: 30
  delay: 2
  changed_when: false

- name: Load config_db.json into SONiC ConfigDB
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} config load /var/sonic/config_db.json -y
  delegate_to: "{{ VM_host[0] }}"
  register: config_load_result
  failed_when: false

- name: Display config load result
  debug:
    msg:
      - "Config load stdout: {{ config_load_result.stdout }}"
      - "Config load stderr: {{ config_load_result.stderr }}"
      - "Config load rc: {{ config_load_result.rc }}"
  when: config_load_result is defined

- name: Fail if config load had errors
  fail:
    msg: "Config load failed: {{ config_load_result.stderr }}"
  when: config_load_result.rc != 0 and config_load_result.rc is defined

# cSONiC neighbors that emulate a SpineRouter (e.g. T2 nodes in T1/T2 topologies)
# render DEVICE_METADATA type=SpineRouter, so sonic-py-common is_chassis() returns
# True and bgpcfgd instantiates ChassisAppDbMgr, which calls getDbId('CHASSIS_APP_DB').
# A cSONiC neighbor is a single container, not a real chassis, so the image's
# start.sh strips CHASSIS_APP_DB (and the redis_chassis instance) from
# database_config.json -> bgpcfgd crash-loops and never emits 'router bgp'.
# Re-add CHASSIS_APP_DB pointing at the local redis instance so ChassisAppDbMgr
# connects locally. Idempotent and harmless for non-SpineRouter neighbors.
- name: Ensure CHASSIS_APP_DB exists so bgpcfgd works on SpineRouter cSONiC neighbors
  become: yes
  shell: |
    docker exec -i csonic_{{ vm_set_name }}_{{ inventory_hostname }} python3 - <<'PYEOF'
    import json
    f = '/var/run/redis/sonic-db/database_config.json'
    d = json.load(open(f))
    d.setdefault('DATABASES', {}).setdefault(
        'CHASSIS_APP_DB', {'id': 12, 'separator': '|', 'instance': 'redis'})
    json.dump(d, open(f, 'w'), indent=4)
    PYEOF
  delegate_to: "{{ VM_host[0] }}"
  changed_when: false

- name: Restart bgpcfgd after ensuring CHASSIS_APP_DB (cSONiC)
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} supervisorctl restart bgpcfgd
  delegate_to: "{{ VM_host[0] }}"
  changed_when: false

- name: Collect front panel interfaces expected from CONFIG_DB
  set_fact:
    csonic_fp_interfaces: "{{ configuration[hostname]['interfaces'].keys() | select('match', '^Ethernet[0-9]+$') | list }}"

- name: Wait for front panel interfaces to be created from CONFIG_DB
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} ip link show {{ csonic_fp_interfaces[0] }}
  delegate_to: "{{ VM_host[0] }}"
  register: fp_intf_ready
  until: fp_intf_ready.rc == 0
  retries: 30
  delay: 2
  changed_when: false
  when: csonic_fp_interfaces | length > 0

- name: Bring up front panel interface in container
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} ip link set {{ item }} up
  delegate_to: "{{ VM_host[0] }}"
  loop: "{{ host['interfaces'].keys() | select('match', '^Ethernet[0-9]+$') | list }}"
  vars:
    host: "{{ configuration[hostname] }}"
  register: ifup_result
  failed_when: false

- name: Bring up backplane interface if defined
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} ip link set eth{{ bp_eth_idx }} up
  delegate_to: "{{ VM_host[0] }}"
  vars:
    bp_eth_idx: "{{ (configuration[hostname]['interfaces'].keys() | select('match', '^Ethernet[0-9]+$') | list | length) + 1 }}"
  when: configuration[hostname]['bp_interface'] is defined
  register: bp_ifup_result
  failed_when: false

- name: Wait for bgpcfgd to configure FRR from ConfigDB
  become: yes
  command: >
    docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }}
    vtysh -c "show running-config"
  delegate_to: "{{ VM_host[0] }}"
  register: frr_config
  until: frr_config.stdout is search("router bgp")
  retries: 30
  delay: 2

- name: Check FRR daemon status
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} supervisorctl status
  delegate_to: "{{ VM_host[0] }}"
  register: daemon_status
  failed_when: false

- name: Display all daemon statuses
  debug:
    msg: "{{ daemon_status.stdout_lines }}"
  when: daemon_status.stdout_lines is defined

- name: Verify BGP is running
  become: yes
  command: docker exec csonic_{{ vm_set_name }}_{{ inventory_hostname }} vtysh -c "show bgp summary"
  delegate_to: "{{ VM_host[0] }}"
  register: bgp_summary
  failed_when: false
  ignore_errors: yes

- name: Display BGP summary
  debug:
    msg: "{{ bgp_summary.stdout_lines }}"
  when: bgp_summary.stdout_lines is defined
