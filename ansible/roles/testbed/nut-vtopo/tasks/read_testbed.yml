---
# Read testbed.nut.yaml and extract device/link info from CSVs
# Inputs: testbed_name, testbed_file
# Outputs (set_fact): vnut_devices (list of dicts), vnut_links (list of dicts)

- name: Read testbed YAML file
  set_fact:
    testbed_data: "{{ lookup('file', testbed_file) | from_yaml }}"

- name: Extract testbed entry
  set_fact:
    testbed_entry: "{{ testbed_data | selectattr('name', 'equalto', testbed_name) | first }}"

- name: Get DUT and TG names from testbed
  set_fact:
    testbed_dut_names: "{{ testbed_entry.duts | default([]) }}"
    testbed_tg_names: "{{ testbed_entry.tgs | default([]) }}"
    testbed_all_devices: "{{ (testbed_entry.duts | default([])) + (testbed_entry.tgs | default([])) }}"

- name: Read sonic_lab_devices.csv
  read_csv:
    path: "{{ inventory_dir }}/sonic_lab_devices.csv"
  register: lab_devices_csv

- name: Filter devices for this testbed
  set_fact:
    vnut_devices: "{{ lab_devices_csv.list | selectattr('Hostname', 'in', testbed_all_devices) | list }}"

- name: Read sonic_lab_links.csv
  read_csv:
    path: "{{ inventory_dir }}/sonic_lab_links.csv"
  register: lab_links_csv

- name: Filter links for this testbed's devices
  set_fact:
    vnut_links: "{{ lab_links_csv.list | selectattr('StartDevice', 'in', testbed_all_devices) | list }}"

- name: Display parsed testbed info
  debug:
    msg: |
      Testbed: {{ testbed_name }}
      Devices: {{ vnut_devices | map(attribute='Hostname') | list }}
      Links: {{ vnut_links | length }} links
