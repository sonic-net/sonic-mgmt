---
- name: Wait for ConfigDB to be ready on DUTs
  command: >
    docker exec {{ item.Hostname }}
    bash -c "timeout {{ vnut_configdb_timeout }} bash -c 'until redis-cli -n 4 ping 2>/dev/null | grep -q PONG; do sleep 2; done'"
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"
  register: configdb_wait
  changed_when: false

- name: Get PID of DUT base containers
  command: docker inspect -f {% raw %}'{{.State.Pid}}'{% endraw %} {{ vnut_container_prefix }}_{{ testbed_name }}_{{ item.Hostname }}
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"
  register: dut_pids
  changed_when: false

- name: Restore management interface on DUT base containers
  shell: "nsenter -t {{ item.stdout }} -n bash -c 'ip link set eth0 up; ip addr flush dev eth0; ip addr add {{ item.item.ManagementIp }} dev eth0; ip route replace default via {{ vnut_mgmt_gateway }}'"
  loop: "{{ dut_pids.results }}"
  loop_control:
    label: "{{ item.item.Hostname }}"
  changed_when: true

- name: Wait for management interface to stabilize
  pause:
    seconds: 3

- name: Re-verify and fix management interface on DUT base containers
  shell: "nsenter -t {{ item.stdout }} -n bash -c 'ip link set eth0 up; ip addr show eth0 | grep -q {{ item.item.ManagementIp.split(\"/\")[0] }} || ip addr add {{ item.item.ManagementIp }} dev eth0; ip route replace default via {{ vnut_mgmt_gateway }}'"
  loop: "{{ dut_pids.results }}"
  loop_control:
    label: "{{ item.item.Hostname }}"
  changed_when: true

- name: Start sshd in cSONiC containers
  shell: "docker exec {{ item.Hostname }} bash -c 'mkdir -p /run/sshd && /usr/sbin/sshd || true'"
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"
  changed_when: true
  ignore_errors: true

- name: Wait for SSH on DUT containers
  wait_for:
    host: "{{ item.ManagementIp.split('/')[0] }}"
    port: 22
    timeout: "{{ vnut_ssh_timeout }}"
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"

- name: Wait for critical SONiC services
  command: >
    docker exec {{ item.Hostname }}
    bash -c "timeout {{ vnut_process_timeout }} bash -c 'until supervisorctl status | grep -q RUNNING; do sleep 5; done'"
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"
  register: services_wait
  changed_when: false

- name: Create admin user with SSH access on DUTs
  shell: >
    docker exec {{ item.Hostname }} bash -c
    "useradd -m -s /bin/bash admin 2>/dev/null;
    echo 'admin:{{ vnut_admin_password }}' | chpasswd;
    mkdir -p /etc/sudoers.d /home/admin/.ssh;
    echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin;
    chmod 440 /etc/sudoers.d/admin"
  loop: "{{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list }}"
  loop_control:
    label: "{{ item.Hostname }}"
  changed_when: true

- name: Display readiness status
  debug:
    msg: "All {{ vnut_devices | selectattr('Type', 'equalto', 'DevSonic') | list | length }} DUTs are ready"
