---
- name: Create management bridge
  vnut_network:
    action: create_bridge
    bridge_name: "{{ vnut_mgmt_bridge }}"
    bridge_ip: "{{ vnut_mgmt_gateway }}/{{ vnut_mgmt_subnet.split('/')[1] }}"
  register: bridge_result

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present

- name: Set up NAT masquerade for management network
  shell: >
    iptables -t nat -C POSTROUTING -s {{ vnut_mgmt_subnet }} ! -d {{ vnut_mgmt_subnet }} -j MASQUERADE 2>/dev/null ||
    iptables -t nat -A POSTROUTING -s {{ vnut_mgmt_subnet }} ! -d {{ vnut_mgmt_subnet }} -j MASQUERADE
  changed_when: true

- name: Allow forwarding from management bridge
  shell: |
    iptables -C FORWARD -i {{ vnut_mgmt_bridge }} -j ACCEPT 2>/dev/null ||
    iptables -I FORWARD -i {{ vnut_mgmt_bridge }} -j ACCEPT
    iptables -C FORWARD -o {{ vnut_mgmt_bridge }} -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null ||
    iptables -I FORWARD -o {{ vnut_mgmt_bridge }} -m state --state RELATED,ESTABLISHED -j ACCEPT
  changed_when: true

- name: Display bridge creation result
  debug:
    var: bridge_result.msg
