---
# launch_one_dut.yml — Create and start a SONiC KVM VM for a DUT
# Called with: dut_name (hostname string), device_idx

- name: "Set VM facts for {{ dut_name }}"
  set_fact:
    vm_name: "{{ dut_name }}"
    disk_image: "{{ vnut_vm_disk_dir }}/sonic_{{ dut_name }}.img"
    serial_port: "{{ vnut_vm_serial_port_base + device_idx }}"

- name: "Map interfaces to bridges for {{ dut_name }}"
  set_fact:
    vm_interfaces: >-
      {%- set ns = namespace(items=[]) -%}
      {%- for port in (device_conn[dut_name] | default({})).keys() | sort -%}
        {%- set bridge = device_bridge_map[dut_name ~ ':' ~ port] -%}
        {%- set ns.items = ns.items + [{"name": port, "bridge": bridge}] -%}
      {%- endfor -%}
      {{ ns.items }}

- name: "Create VM disk directories"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ vnut_sonic_vm_storage }}/images"
    - "{{ vnut_vm_disk_dir }}"

- name: "Check if disk image exists for {{ dut_name }}"
  stat:
    path: "{{ disk_image }}"
  register: disk_stat

- name: "Check source VS image exists"
  stat:
    path: "{{ vnut_sonic_vs_image }}"
  register: src_image_stat
  when: not disk_stat.stat.exists

- name: "Fail if source VS image not found"
  fail:
    msg: >-
      SONiC VS image not found at {{ vnut_sonic_vs_image }}.
      Please download sonic-vs.img and place it there.
  when:
    - not disk_stat.stat.exists
    - not (src_image_stat.stat.exists | default(false))

- name: "Copy sonic-vs.img for {{ dut_name }}"
  copy:
    src: "{{ vnut_sonic_vs_image }}"
    dest: "{{ disk_image }}"
    remote_src: yes
  when: not disk_stat.stat.exists

- name: "Get list of defined VMs"
  virt:
    command: list_vms
    uri: qemu:///system
  register: vm_list_defined
  become: yes

- name: "Define SONiC VM {{ dut_name }}"
  virt:
    name: "{{ vm_name }}"
    command: define
    xml: "{{ lookup('template', 'templates/vnut-sonic.xml.j2') }}"
    uri: qemu:///system
  when: vm_name not in vm_list_defined.list_vms
  become: yes

- name: "Get list of running VMs"
  virt:
    command: list_vms
    state: running
    uri: qemu:///system
  register: vm_list_running
  become: yes

- name: "Start SONiC VM {{ dut_name }}"
  virt:
    name: "{{ vm_name }}"
    state: running
    uri: qemu:///system
  when: vm_name not in (vm_list_running.list_vms | default([]))
  become: yes

- name: "Debug VM info for {{ dut_name }}"
  debug:
    msg: >-
      VM {{ vm_name }}: serial_port={{ serial_port }},
      mgmt_ip={{ device_info[dut_name].ManagementIp }}, disk={{ disk_image }},
      interfaces={{ vm_interfaces | length }} front-panel ports
