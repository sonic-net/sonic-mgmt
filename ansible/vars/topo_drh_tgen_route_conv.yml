topology:
  # dRH (Disaggregated Regional Hub) tgen route convergence topology
  # 1 DUT (LowerRegionalHub) with 16 uplink ports to IXIA/tgen
  # IXIA emulates UpperRegionalHub neighbors via PortChannels
  #
  # No downlink ports (FRH/LT2 not included in this topo)

  dut_num: 1
  VMs:
    # Uplink ports - via Fanout to Ixia (T3/Spine emulation)
    Snappi_URH_1:
      vlans:
        - 32
      vm_offset: 0
    Snappi_URH_2:
      vlans:
        - 33
      vm_offset: 1
    Snappi_URH_3:
      vlans:
        - 34
      vm_offset: 2
    Snappi_URH_4:
      vlans:
        - 35
      vm_offset: 3
    Snappi_URH_5:
      vlans:
        - 36
      vm_offset: 4
    Snappi_URH_6:
      vlans:
        - 37
      vm_offset: 5
    Snappi_URH_7:
      vlans:
        - 38
      vm_offset: 6
    Snappi_URH_8:
      vlans:
        - 39
      vm_offset: 7
    Snappi_URH_9:
      vlans:
        - 40
      vm_offset: 8
    Snappi_URH_10:
      vlans:
        - 41
      vm_offset: 9
    Snappi_URH_11:
      vlans:
        - 42
      vm_offset: 10
    Snappi_URH_12:
      vlans:
        - 43
      vm_offset: 11
    Snappi_URH_13:
      vlans:
        - 44
      vm_offset: 12
    Snappi_URH_14:
      vlans:
        - 45
      vm_offset: 13
    Snappi_URH_15:
      vlans:
        - 46
      vm_offset: 14
    Snappi_URH_16:
      vlans:
        - 47
      vm_offset: 15

  DUT:
    loopback:
      ipv4:
        - 10.1.0.1/32
      ipv6:
        - FC00:10::1/128

configuration_properties:
  common:
    podset_number: 400
    tor_number: 16
    tor_subnet_number: 8
    max_tor_subnet_number: 32
    tor_subnet_size: 128
    dut_asn: 65100
    dut_type: LowerRegionalHub
    nhipv4: 10.10.246.254
    nhipv6: FC0A::FF
  core:
    swrole: core

configuration:
  Snappi_URH_1:
    properties:
      - common
      - core
    bgp:
      asn: 65400
      peers:
        65100:
          - 20.3.1.0
          - 2000:1:1:1::1
    interfaces:
      Loopback0:
        ipv4: 100.1.0.1/32
        ipv6: 2064:100::1/128
      Ethernet1:
        lacp: 1
      Port-Channel1:
        ipv4: 20.3.1.1/31
        ipv6: 2000:1:1:1::2/126
    bp_interface:
      ipv4: 10.10.246.1/24
      ipv6: fc0a::2/64
