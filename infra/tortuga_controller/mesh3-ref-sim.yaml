simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  sim_dir: /nobackup/sim
  sim_host: tortuga-mesh3
  skip_auto_bringup: false
  staggered_boot_delay: 60
devices:
  trex1:
    data_ports:
      - eth1
      - eth2
    disks:
    - hda_ref:
        file: /nobackup/images/rhel7_serial.qcow2
        type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
    - 22
    console_ports: [60001]
  trex2:
    data_ports:
      - eth1
      - eth2
    disks:
    - hda_ref:
        file: /nobackup/images/rhel7_serial.qcow2
        type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
    - 22
    console_ports: [60002]
  trex3:
    data_ports:
      - eth1
      - eth2
    disks:
    - hda_ref:
        file: /nobackup/images/rhel7_serial.qcow2
        type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
    - 22
    console_ports: [60003]
  trex4:
    data_ports:
      - eth1
      - eth2
    disks:
      - hda_ref:
          file: /nobackup/images/rhel7_serial.qcow2
          type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22
    console_ports: [60004]
  trex5:
    data_ports:
      - eth1
      - eth2
    disks:
      - hda_ref:
          file: /nobackup/images/rhel7_serial.qcow2
          type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22
    console_ports: [60005]
  trex6:
    data_ports:
      - eth1
      - eth2
    disks:
      - hda_ref:
          file: /nobackup/images/rhel7_serial.qcow2
          type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22
    console_ports: [60006]

  L0:
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
    - churchill
    vxr_sim_config:
      shelf:
        ConfigS1NplPath: /auto/mb/sonic/workspace/sonic-cicd/sdk/sdk-1.66.69.13/npl
        ConfigS1NpsuiteVer: 1.137.1
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    data_ports:
      - Ethernet0
      - Ethernet8
      - Ethernet16
      - Ethernet24
      - Ethernet32
      - Ethernet40
      - Ethernet48
      - Ethernet56
      - Ethernet64
      - Ethernet72
    xr_port_redir:
      - 22
      - 23
    console_ports: [60020]
    cli_commands: |
      sudo config hostname tortuga-mesh3-leaf0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      cp /etc/sonic/config_db.json config_db.json.fresh
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L1:
