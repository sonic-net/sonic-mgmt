connections:
  hubs:
    L0_trex1:
      - L0.Ethernet48
      - trex1.eth1
    L0_trex2:
      - L0.Ethernet56
      - trex2.eth1
    L1_trex3:
      - L1.Ethernet48
      - trex3.eth1
    L1_trex4:
      - L1.Ethernet56
      - trex4.eth1
    L2_trex5:
      - L2.Ethernet48
      - trex5.eth1
    L2_trex6:
      - L2.Ethernet56
      - trex6.eth1
    L0_L1_conn1:
      - L0.Ethernet0
      - L1.Ethernet0
    L0_L2_conn1:
      - L0.Ethernet8
      - L2.Ethernet0
    L1_L2_conn1:
      - L1.Ethernet8
      - L2.Ethernet8
