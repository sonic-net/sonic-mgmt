simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  sim_dir: /nobackup/sim
  sim_host: tortuga-mesh3
  skip_auto_bringup: false

devices:
  trex1: &host
    data_ports:
      - eth1
      - eth2
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /nobackup/images/ubuntu22.qcow2
          type: reference
    memory: 2GB
    platform: linux
    vcpu: 2
    xr_port_redir:
      - 22

  trex2:
    <<: *host
  trex3:
    <<: *host
  trex4:
    <<: *host
  trex5:
    <<: *host
  trex6:
    <<: *host
  trex7:
    <<: *host
  trex8:
    <<: *host
  trex9:
    <<: *host

  L0: &switch
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigS1NplPath: /auto/mb/sonic/workspace/sonic-cicd/sdk/sdk-1.66.85.46/npl
        ConfigS1NpsuiteVer: 1.137.1
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    data_ports:
      - Ethernet1_1
      - Ethernet1_2
      - Ethernet1_3
      - Ethernet1_4
      - Ethernet1_5
      - Ethernet1_6
      - Ethernet1_7
      - Ethernet1_8
      - Ethernet1_9
      - Ethernet1_10
      - Ethernet1_11
      - Ethernet1_12
      - Ethernet1_13
      - Ethernet1_14
    xr_port_redir:
      - 22
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-mesh3-leaf0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L1:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-mesh3-leaf1
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

  L2:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-mesh3-leaf2
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

connections:
  hubs:
    L0_trex1_1:
      - L0.Ethernet1_9
      - trex1.eth1
    L0_trex1_4:
      - L0.Ethernet1_12
      - trex4.eth2
    L0_trex2_1:
      - L0.Ethernet1_10
      - trex2.eth1
    L0_trex3_1:
      - L0.Ethernet1_11
      - trex3.eth1
    L1_trex4_1:
      - L1.Ethernet1_9
      - trex4.eth1
    L1_trex1_2:
      - L1.Ethernet1_12
      - trex1.eth2
    L1_trex5_1:
      - L1.Ethernet1_10
      - trex5.eth1
    L1_trex6_1:
      - L1.Ethernet1_11
      - trex6.eth1
    L2_trex7_1:
      - L2.Ethernet1_9
      - trex7.eth1
    L2_trex7_2:
      - L2.Ethernet1_12
      - trex7.eth2
    L2_trex8_1:
      - L2.Ethernet1_10
      - trex8.eth1
    L2_trex9_1:
      - L2.Ethernet1_11
      - trex9.eth1
    L0_L1_conn1:
      - L0.Ethernet1_1
      - L1.Ethernet1_1
    L0_L2_conn1:
      - L0.Ethernet1_2
      - L2.Ethernet1_1
    L1_L2_conn1:
      - L1.Ethernet1_2
      - L2.Ethernet1_2
