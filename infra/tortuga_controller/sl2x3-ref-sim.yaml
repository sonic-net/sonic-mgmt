simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  sim_dir: /nobackup/sim
  sim_host: tortuga-2x3
  skip_auto_bringup: false

devices:
  host: &host
    data_ports:
      - eth1
      - eth2
    disks:
      - hda_ref:
          file: /nobackup/images/rhel7_serial.qcow2
          type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22

  switch: &switch
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..7: 1x400
        8..15: 1x100
        16..23: 4x25
        24..31: 4x10
    vxr_sim_config:
      shelf:
        ConfigS1NplPath: /auto/mb/sonic/workspace/sonic-cicd/sdk/sdk-1.66.85.31/npl
        ConfigS1NpsuiteVer: 1.137.1
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    data_ports:
      - Ethernet0
      - Ethernet1
      - Ethernet2
      - Ethernet3
      - Ethernet4
      - Ethernet5
      - Ethernet6
      - Ethernet7
      - Ethernet8
      - Ethernet9
    xr_port_redir:
      - 22

  trex1:
    <<: *host
  trex2:
    <<: *host
  trex3:
    <<: *host

  L0:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-2x3-leaf0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L1:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-2x3-leaf1
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep2.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L2:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-2x3-leaf2
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep2.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  S0:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-2x3-spine0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep2.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  S1:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-2x3-spine1
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep2.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

connections:
  hubs:
    L0_trex1:
      - L0.Ethernet6
      - trex1.eth1
    L1_trex2:
      - L1.Ethernet6
      - trex2.eth1
    L2_trex3:
      - L2.Ethernet6
      - trex3.eth1
    S0_L0_conn1:
      - S0.Ethernet0
      - L0.Ethernet0
    S0_L1_conn1:
      - S0.Ethernet1
      - L1.Ethernet0
    S1_L1_conn1:
      - S1.Ethernet0
      - L1.Ethernet1
    S1_L2_conn1:
      - S1.Ethernet1
      - L2.Ethernet0
