simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  sim_dir: /nobackup/sim
  sim_host: localhost
  skip_auto_bringup: false

devices:
  trex1: &host
    data_ports:
      - eth1
      - eth2
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /nobackup/images/ubuntu22.qcow2
          type: reference
    memory: 3GB
    platform: linux
    vcpu: 2
    xr_port_redir:
      - 22

  trex2:
    <<: *host
  trex3:
    <<: *host
  trex4:
    <<: *host
  trex5:
    <<: *host
  trex6:
    <<: *host
  trex7:
    <<: *host
  trex8:
    <<: *host
  trex9:
    <<: *host
  trex10:
    <<: *host

  L0: &switch
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso
    linecard_types:
      - HF6100-64ED
    port_breakout:
      lc0:
        0..63: 1x800
    vxr_sim_config:
      shelf:
        # Following config prevents packet from reaching nsim before it is initialized.
        # Sometimes, dsim crashes when the packets are sent before it is initialized.
        ConfigS1EgressSeen: 'true'
        ConfigS1DelayAfterEgressSeen: '60'
        ConfigEnableNgdp: 'true'
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 28GB
    vcpu: 12
    platform: spitfire_f
    data_ports:
      - Ethernet1_1
      - Ethernet1_2
      - Ethernet1_3
      - Ethernet1_4
      - Ethernet1_5
      - Ethernet1_6
      - Ethernet1_7
      - Ethernet1_8
      - Ethernet1_9
      - Ethernet1_10
      - Ethernet1_11
      - Ethernet1_12
      - Ethernet1_13
      - Ethernet1_14
      - Ethernet1_15
      - Ethernet1_16
      - Ethernet1_17
      - Ethernet1_18
      - Ethernet1_19
      - Ethernet1_20
      - Ethernet1_21
      - Ethernet1_22
      - Ethernet1_23
      - Ethernet1_24
      - Ethernet1_25
      - Ethernet1_26
      - Ethernet1_27
      - Ethernet1_28
      - Ethernet1_29
      - Ethernet1_30
      - Ethernet1_31
      - Ethernet1_32
      - Ethernet1_33
      - Ethernet1_34
      - Ethernet1_35
      - Ethernet1_36
      - Ethernet1_37
      - Ethernet1_38
      - Ethernet1_39
      - Ethernet1_40
      - Ethernet1_41
      - Ethernet1_42
      - Ethernet1_43
      - Ethernet1_44
      - Ethernet1_45
      - Ethernet1_46
      - Ethernet1_47
      - Ethernet1_48
      - Ethernet1_49
      - Ethernet1_50
      - Ethernet1_51
      - Ethernet1_52
      - Ethernet1_53
      - Ethernet1_54
      - Ethernet1_55
      - Ethernet1_56
      - Ethernet1_57
      - Ethernet1_58
      - Ethernet1_59
      - Ethernet1_60
      - Ethernet1_61
      - Ethernet1_62
      - Ethernet1_63
      - Ethernet1_64
    xr_port_redir:
      - 22
    pre_cli: |
      sudo bash -c "echo 'net.core.rmem_default = 16777216' >> /etc/sysctl.conf"
      sudo bash -c "echo 'net.core.wmem_default = 16777216' >> /etc/sysctl.conf"
      sudo sysctl -p
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-1x3-leaf0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L1:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-1x3-leaf1
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

  L2:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-1x3-leaf2
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

  S0:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-1x3-spine0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

