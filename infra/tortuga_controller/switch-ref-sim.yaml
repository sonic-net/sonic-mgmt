simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  sim_dir: /nobackup/sim
  sim_host: localhost
  skip_auto_bringup: false

devices:
  trex1: &host
    data_ports:
      - eth1
      - eth2
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /nobackup/images/ubuntu22.qcow2
          type: reference
    memory: 3GB
    platform: linux
    vcpu: 2
    xr_port_redir:
      - 22

  trex2:
    <<: *host
  trex3:
    <<: *host
  trex4:
    <<: *host

  N1:
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    data_ports:
      - Ethernet1_1
      - Ethernet1_2
      - Ethernet1_3
      - Ethernet1_4
      - Ethernet1_5
      - Ethernet1_6
      - Ethernet1_7
      - Ethernet1_8
      - Ethernet1_9
      - Ethernet1_10
      - Ethernet1_11
      - Ethernet1_12
      - Ethernet1_13
      - Ethernet1_14
      - Ethernet1_15
      - Ethernet1_16
      - Ethernet1_17
      - Ethernet1_18
      - Ethernet1_19
      - Ethernet1_20
      - Ethernet1_21
    xr_port_redir:
      - 22
    pre_cli: |
      sleep 60
      curl --retry 10 --retry-delay 10 --retry-all-errors -O http://ttg-fs1.cisco.com/ttg-images/misc/pyvxr_gen_sw_sudi_cert.tar.gz
      curl -O http://ttg-fs1.cisco.com/ttg-images/tortuga-agents_0.1-1_amd64.deb
      tar -xzf pyvxr_gen_sw_sudi_cert.tar.gz
      sudo ./pyvxr_gen_sw_sudi_cert.sh
    cli_commands: |
      sudo config hostname tortuga-switch-leaf0
      sudo config save -y
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ttg-fs1.cisco.com/ttg-images/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

connections:
  hubs:
    N1_trex1_1:
      - N1.Ethernet1_9
      - trex1.eth1
    N1_trex1_2:
      - N1.Ethernet1_13
      - trex1.eth2
    N1_trex2_1:
      - N1.Ethernet1_10
      - trex2.eth1
    N1_trex2_2:
      - N1.Ethernet1_15
      - trex2.eth2
    N1_trex3_1:
      - N1.Ethernet1_11
      - trex3.eth1
    N1_trex4_1:
      - N1.Ethernet1_12
      - trex4.eth1
    N1_trex4_2:
      - N1.Ethernet1_14
      - trex4.eth2
    N1_LOOP:
      - N1.Ethernet1_16
      - N1.Ethernet1_17

