  L0: &switch
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/images/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    data_ports:
      - Ethernet1_1
      - Ethernet1_2
      - Ethernet1_3
      - Ethernet1_4
      - Ethernet1_5
      - Ethernet1_6
      - Ethernet1_7
      - Ethernet1_8
      - Ethernet1_9
      - Ethernet1_10
      - Ethernet1_11
      - Ethernet1_12
      - Ethernet1_13
      - Ethernet1_14
      - Ethernet1_15
      - Ethernet1_16
      - Ethernet1_17
      - Ethernet1_18
      - Ethernet1_19
      - Ethernet1_20
      - Ethernet1_21
      - Ethernet1_22
      - Ethernet1_23
      - Ethernet1_24
      - Ethernet1_25
      - Ethernet1_26
      - Ethernet1_27
      - Ethernet1_28
      - Ethernet1_29
      - Ethernet1_30
      - Ethernet1_31
      - Ethernet1_32
    xr_port_redir:
      - 22
    pre_cli: |
      sleep 60
      curl --retry 10 --retry-delay 10 --retry-all-errors -O http://ttg-fs1.cisco.com/ttg-images/misc/pyvxr_gen_sw_sudi_cert.tar.gz
      curl -O http://ttg-fs1.cisco.com/ttg-images/tortuga-agents_0.1-1_amd64.deb
      tar -xzf pyvxr_gen_sw_sudi_cert.tar.gz
      sudo ./pyvxr_gen_sw_sudi_cert.sh
    cli_commands: |
      sudo config hostname tortuga-2x9-leaf0
      sudo config save -y
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ttg-fs1.cisco.com/ttg-images/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth

  L1:
    <<: *switch
    cli_commands: |
      sudo config hostname tortuga-2x9-leaf1
      sudo config save -y
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb

  L2:
    <<: *switch
    cli_commands: |
      sudo config hostname tortuga-2x9-leaf2
