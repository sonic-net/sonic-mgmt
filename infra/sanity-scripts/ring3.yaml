
################################################################################
#                         CICD test list - Ring3                               #
################################################################################
#
# This structure organizes a list of tests in 4 layers:
#     TEST_CATEGORY: Defines a subset of sonic-mgmt tests.
#     TOPOLOGY: Defines the type of topology in which the test is run.
#     PLATFORM: Defines the type of platform in which the test is run
#     SIM_OR_HW: Defines sim/hw specific test cases
#
# In other words, the hierarchy is:
#     TEST_CATEGORY -> TOPOLOGY -> PLATFORM -> SIM_OR_HW -> [list of tests]
#
# TOPOLOGY section will always include a 't0-64' key, which serves as a base.
# PLATFORM section will always include a 'mth64'
# SIM_OR_HW key can be either 'sim', or 'hw'
#
# Example:
#
# example-ring3.yaml
#
# FWD:
#   t0-64:
#     mth64:
#       sim:
#         - fwd/test/case_1.py
#         - fwd/test/case_2.py
#         - fwd/test/case_3.py
#         - fwd/test/case_4.py
#         - fwd/test/case_5.py
#       hw:
#         - fwd/test/case_6.py
#         - fwd/test/case_7.py
#         - fwd/test/case_8.py
#   t0-64:
#     mth64:
#       sim:
#         - telemetry/test_telemetry.py::test_config_db_parameters
#         - example/t0/specific/fwd/test.py
#       hw:
#         - example/t0/specific/fwd/hw/test1.py
#         - example/t0/specific/fwd/hw/test2.py
#         - example/t0/specific/fwd/hw/test3.py
# PLT:
#   t0-64:
#     mth64:
#       sim:
#         - plt/test/case_1.py
#         - plt/test/case_2.py
#         - plt/test/case_3.py
#         - plt/test/case_4.py
#         - plt/test/case_5.py
#   t0-64:
#     mth64:
#       sim:
#         - example/t0/specific/plt/test.py
#         - example/t0/specific/plt/test2.py
#   t1-64-lag:
#     mth64:
#       sim:
#         - example/t1/specific/plt/test.py
#         - example/t1/specific/plt/test2.py
#
# How the test list is created
# - a list of TEST_CATEGORY is given(must have at least one)
# - For each TEST_CATEGORY:
#     - tests in TEST_CATEGORY/t0-64/mth64 are included
#     - if TOPOLOGY is specified, and TEST_CATEGORY/TOPOLOGY exists, tests in TEST_CATEGORY/TOPOLOGY/mth64 are included
#     - if TOPOLOGY and PLATFORM are specified, and TEST_CATEGORY/TOPOLOGY/PLATFORM exists, tests in TEST_CATEGORY/TOPOLOGY/PLATFORM are included
#     - depending on sim/hw run, test cases in 'sim' or 'hw' are included
# - Any duplicate test entries are removed.
# - You now have your final test list!


