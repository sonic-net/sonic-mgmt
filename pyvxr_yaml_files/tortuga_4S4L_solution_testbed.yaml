simulation:
  slurm_flags:
        hours: 120
        cluster: multicluster
        pending_timeout: 1200
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false

devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types: [8101-32FH]
    linux_password: cisco123
    linux_username: cisco
    onie-install: http://10.28.109.58/IMAGES/cmono_23860/sonic-buildimage-cisco.202305.1.tortuga-periodic/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    platform: spitfire_f
    xr_port_redir:
    - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth


  SD2: &sonic_router_with_tcp
      <<: *sonic_router
      cli_commands: |
          rm -f /home/cisco/tcpserver.py
          echo 'import socket' > /home/cisco/tcpserver.py
          echo 'import threading' >> /home/cisco/tcpserver.py
          echo 'import sys' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo 'def handle_client(conn, addr):' >> /home/cisco/tcpserver.py
          echo '    print(f"Connected by {addr}")' >> /home/cisco/tcpserver.py
          echo '    with conn:' >> /home/cisco/tcpserver.py
          echo '        while True:' >> /home/cisco/tcpserver.py
          echo '            data = conn.recv(1024)' >> /home/cisco/tcpserver.py
          echo '            if not data:' >> /home/cisco/tcpserver.py
          echo '                break' >> /home/cisco/tcpserver.py
          echo '            conn.sendall(data)  # Echo back' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo 'def start_server(host, port):' >> /home/cisco/tcpserver.py
          echo '    # Determine address family (IPv4 or IPv6)' >> /home/cisco/tcpserver.py
          echo '    family = socket.AF_INET6 if ":" in host else socket.AF_INET' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '    with socket.socket(family, socket.SOCK_STREAM) as s:' >> /home/cisco/tcpserver.py
          echo '        # Allow immediate reuse of the address after restart' >> /home/cisco/tcpserver.py
          echo '        s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '        # Bind and listen' >> /home/cisco/tcpserver.py
          echo '        s.bind((host, port))' >> /home/cisco/tcpserver.py
          echo '        s.listen()' >> /home/cisco/tcpserver.py
          echo '        print(f"Server listening on {host}:{port}")' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '        while True:' >> /home/cisco/tcpserver.py
          echo '            conn, addr = s.accept()' >> /home/cisco/tcpserver.py
          echo '            print(f"Accepted connection from {addr}")' >> /home/cisco/tcpserver.py
          echo '            client_thread = threading.Thread(target=handle_client, args=(conn, addr))' >> /home/cisco/tcpserver.py
          echo '            client_thread.daemon = True' >> /home/cisco/tcpserver.py
          echo '            client_thread.start()' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo 'if __name__ == "__main__":' >> /home/cisco/tcpserver.py
          echo '    if len(sys.argv) != 3:' >> /home/cisco/tcpserver.py
          echo '        print(f"Usage: python3 {sys.argv[0]} <port> <ip>")' >> /home/cisco/tcpserver.py
          echo '        sys.exit(1)' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '    try:' >> /home/cisco/tcpserver.py
          echo '        PORT = int(sys.argv[1])' >> /home/cisco/tcpserver.py
          echo '    except ValueError:' >> /home/cisco/tcpserver.py
          echo '        print("Port must be an integer")' >> /home/cisco/tcpserver.py
          echo '        sys.exit(1)' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '    HOST = sys.argv[2]' >> /home/cisco/tcpserver.py
          echo '' >> /home/cisco/tcpserver.py
          echo '    start_server(HOST, PORT)' >> /home/cisco/tcpserver.py
          chmod +x /home/cisco/tcpserver.py
          echo "TCP server file created successfully"

  SD3:
      <<: *sonic_router_with_tcp

  SD4:
      <<: *sonic_router

  SD5: 
      <<: *sonic_router
  
  SD6: 
      <<: *sonic_router

  SD7: 
      <<: *sonic_router

  SD8: 
      <<: *sonic_router

  external_router:
      <<: *sonic_router

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_9.20.2206.28.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_9.20_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_9.20_KVM.qcow2
    data_ports:
      - data[0..13]
  
  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

  host1:
    platform: linux
    image: /auto/vxr/images/linux/ubuntu-kne.qcow2
    linux_username: vxr
    linux_password: "cisco123"
    linux_prompt: 'vxr@vxr-vm:~\$'
    xr_port_redir: [22]

