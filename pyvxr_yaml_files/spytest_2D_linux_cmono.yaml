simulation:
  slurm_flags:
    pending_timeout: 60
    hours: 60
    partition: regression
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false

devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types: [8101-32FH]
    port_breakout:
      lc0:
        0..7: 1x400
        8..15: 1x100
        16..23: 4x25
        24..31: 4x10
    linux_password: cisco123
    linux_username: cisco
    onie-install: /ws/stalarir-sjc/images/sonic-cisco-8000-tgen.bin
    os_type: sonic
    memory: 12GB
    platform: spitfire_f
    xr_port_redir:
    - 22
    vxr_sim_config:
       shelf:
          ConfigS1NpsuiteVer:  '1.184.1'
          ConfigS1SdkVer: '24.11.3000.27'
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azim
  SD2:
      <<: *sonic_router


  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  hubs:
    hub0:
      - SD1.Ethernet[0..7]
      - SD2.Ethernet[0..7]
