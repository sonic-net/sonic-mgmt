simulation:
  no_image_copy: false
  slurm_flags:
    pending_timeout: 60
    hours: 30
    partition: regression
    cluster: rch-slurm-m1
          
devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v3.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '8G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..32]
      - backplane

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    pre_cli: |
      sudo bash -c "echo 'net.core.rmem_default = 16777216' >> /etc/sysctl.conf"
      sudo bash -c "echo 'net.core.wmem_default = 16777216' >> /etc/sysctl.conf"
      sudo sysctl -p
    xr_port_redir: [22]
    linux_username: "cisco"
    linux_password: "cisco123"
    vcpu: 10
    memory: '20G'
    linecard_types: ['8122-64EH-O']
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso
    onie-install: /auto/vxr1/sonic-images/lightning/nightly/16519-202405-sonic-cisco-8000.bin
    vxr_sim_config:
      shelf:
        # the below config prevet packet reaching nsim before the full initialization. We observer dsim crash when the packets are sent before the full initialization.
        # the below config can be removed when dsim issue is fixed
        ConfigS1EgressSeen: 'true'
        ConfigS1DelayAfterEgressSeen: '60' 
    port_breakout:
       lc0:
          0..63: 2x400

  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup/sonic/ubuntu1804_mgt.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@vxr-vm:~\$'
    vcpu: 10
    memory: '20G'

device_groups:
  veos:
    devices:
    - "veos[1..32]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

connections:
    custom:
      ptf_injected1:
        ports:
        - docker_ptf.eth0
