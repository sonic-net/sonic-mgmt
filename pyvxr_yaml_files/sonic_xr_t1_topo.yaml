simulation:
  sim_rel: /auto/vxr/vxr2_user/vxr2_npsuite_1.50.0
  slurm_flags:
    hours: 120
    partition: bigmem_intel

devices:
  
  ptf:
    platform: linux
    image: /auto/vxr/images/onie-sonic/ptf_docker_v2.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    xr_port_redir: [22]
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: http://172.29.93.10/sonic-images/sonic-cisco-8000.bin.test
    linecard_versions: [p7]
    linux_username: admin
    linux_password: YourPaSsWoRd
    vxr_sim_config:
      shelf:
          ConfigDsimNplPath: /auto/vxr/sonic_npl/1.50.0
  
  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup/sonic/ubuntu1804_sonic_mgmt_081320.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    vcpu: 4
    memory: '4G'

device_groups:
  xrv9k:
    devices:
    - "xrv9k[1..32]"
    platform: xrv9k
    vcpu: 2
    memory: "8G"
    xr_port_redir: [22]
    image: /auto/vxr/images/xrv9k/xrv9k-fullk9-x-7.0.1.138I.qcow2

