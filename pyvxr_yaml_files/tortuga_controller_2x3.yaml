simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  slurm_flags:
    pending_timeout: 60
    hours: 30
    partition: regression
    cluster: rch-slurm-m1
devices:
  trex1:
    data_ports:
      - eth1
      - eth2
    disks:
      - hda_ref:
          file: /auto/vxr1/images/linux/rhel7_serial.qcow2
          type: reference
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22
    console_ports: [60001]
