simulation:
  no_image_copy: false
  slurm_flags:
    pending_timeout: 60
    hours: 20
    partition: regression
    cluster: rch-slurm-m1

devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v4.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: true
    vcpu: 4
    memory: '8G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..32]
      - backplane

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    pre_cli: |
      sudo bash -c "echo 'net.core.rmem_default = 16777216' >> /etc/sysctl.conf"
      sudo bash -c "echo 'net.core.wmem_default = 16777216' >> /etc/sysctl.conf"
      sudo sysctl -p
    xr_port_redir: [22]
    linux_username: "admin"
    linux_password: "password"
    vcpu: 10
    memory: '20G'
    linecard_types: ['8223-64E-MO']
    npu_asic_versions: [A0]
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso
    onie-install: /auto/vxr1/sonic-images/titan_cicd/202511/sonic-cisco-8000.bin

  sonic_mgmt:
    platform: linux
    xr_port_redir: [22]
    image: /globalnobackup/sonic/ubuntu1804_mgt.qcow2
    linux_username: 'vxr'
    linux_password: 'cisco123'
    linux_prompt: 'vxr@vxr-vm:~\$'
    vcpu: 10
    memory: '20G'

device_groups:
  veos:
    devices:
      - "veos[1..4]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
      - hda:
          file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
          type: reference

connections:
   hubs:
    hub0_0:
    - docker_ptf.eth[0..1]
    - sonic_dut.Ethernet[0..1]
    hub0_1:
    - docker_ptf.eth[2..3]
    - sonic_dut.Ethernet[2..3]
    hub0_2:
    - docker_ptf.eth[4..5]
    - sonic_dut.Ethernet[4..5]
    hub0_3:
    - docker_ptf.eth[6..7]
    - sonic_dut.Ethernet[6..7]
    hub0_4:
    - docker_ptf.eth[8..9]
    - sonic_dut.Ethernet[8..9]
    hub0_5:
    - docker_ptf.eth[10..11]
    - sonic_dut.Ethernet[10..11]
    hub0_6:
    - docker_ptf.eth[12..13]
    - sonic_dut.Ethernet[12..13]
    hub0_7:
    - docker_ptf.eth[14..15]
    - sonic_dut.Ethernet[14..15]
    hub0_8:
    - docker_ptf.eth[16..17]
    - sonic_dut.Ethernet[16..17]
    hub0_9:
    - docker_ptf.eth[18..19]
    - sonic_dut.Ethernet[18..19]
    hub0_10:
    - docker_ptf.eth[20..21]
    - sonic_dut.Ethernet[20..21]
    hub0_11:
    - docker_ptf.eth[22..23]
    - sonic_dut.Ethernet[22..23]
    hub0_12:
    - docker_ptf.eth[24..25]
    - sonic_dut.Ethernet[24..25]
    hub0_13:
    - docker_ptf.eth[26..27]
    - sonic_dut.Ethernet[26..27]
   custom:
    ptf_injected29:
      ports:
      - docker_ptf.eth28
      - sonic_dut.Ethernet28
      - veos1.Ethernet1
    ptf_injected30:
      ports:
      - docker_ptf.eth29
      - sonic_dut.Ethernet29
      - veos2.Ethernet1
    ptf_injected31:
      ports:
      - docker_ptf.eth30
      - sonic_dut.Ethernet30
      - veos3.Ethernet1
    ptf_injected32:
      ports:
      - docker_ptf.eth31
      - sonic_dut.Ethernet31
      - veos4.Ethernet1
    backplane:
      ports:
      - veos[1..4].Ethernet9
      - docker_ptf.backplane
