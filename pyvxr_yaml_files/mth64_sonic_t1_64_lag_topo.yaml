simulation:
  no_image_copy: true
  slurm_flags:
    hours: 120
          
devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker.qcow2.new
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:/#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..32]

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    xr_port_redir: [22]
    linux_username: "cisco"
    linux_password: "cisco123"
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: http://172.27.147.152/IMAGES/dt8.1/sonic-cisco-8000.bin
    linecard_types: [matilda64]
    vxr_sim_config:
        shelf:
            ConfigS1NplPath: /auto/vxr1/sonic-images/SDK1.40.1_NPS1.76.1/npl
            ConfigS1NpsuiteVer: 1.76.2

  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup3/sonic/ubuntu1804_spytest.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    vcpu: 4
    memory: '4G'

device_groups:
  veos:
    devices:
    - "veos[1..24]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

