simulation:
  no_image_copy: true
  slurm_flags:
    hours: 26
    pending_timeout: 60
    partition: regression
    cluster: rch-slurm-m1
  pyvxr_flags:
    sonic_lc_bringup: True
  # Using temporary SIM release for RP crash fix: MIGSOFTWAR-10686
  sim_rel: /auto/vxr1/kqlin/release/vxr2_05859_pvt_kqlin
  # Skip platform check due to MIGSOFTWAR-10688
  skip_platform_check: True

devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v2.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..64]
      - backplane

  sonic_dut:
    platform: spitfire_d
    os_type: sonic
    lcc_type: havoc-gb
    num_linecards: 2
    linecard_types: [ 'gauntlet', 'gauntlet' ]
    xr_port_redir: [22]
    linux_username: "cisco"
    linux_password: "cisco123"
    linux_config: udhcpc -q -s /lib/onie/udhcp4_net -n -i eth0
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: /ws/mridul-sjc/sonic-cisco-8000.bin
    vxr_sim_config:
      rp:
          ConfigNicOrder: "mgmt-ce-punt"
      lc:
          ConfigNicOrder: "mgmt-ce-punt"

  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup/sonic/ubuntu1804_mgt.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@vxr-vm:~\$'
    vcpu: 4
    memory: '4G'

device_groups:
  veos:
    devices:
    - "veos[1..8]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

# ARISTA 01 T3: veos1
# ARISTA 03 T3: veos2
# ARISTA 04 T3: veos3
# ARISTA 06 T3: veos4
#
# ARISTA 01 T1: veos5
# ARISTA 03 T1: veos6
# ARISTA 04 T1: veos7
# ARISTA 06 T1: veos8
connections:
  custom:
    ptf_injected_01_T3_1:
      ports:
      - sonic_dut.HundredGigE0/0/0/4
      - veos1.Ethernet1
      - docker_ptf.eth0
    ptf_injected_01_T3_2:
      ports:
      - sonic_dut.HundredGigE0/0/0/5
      - veos1.Ethernet2
      - docker_ptf.eth1

    ptf_injected_03_T3:
      ports:
      - sonic_dut.HundredGigE0/0/0/8
