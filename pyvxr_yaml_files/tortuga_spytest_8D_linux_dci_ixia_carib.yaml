simulation:
  slurm_flags:
    pending_timeout: 60
    partition: regression
    cluster: rch-slurm-m1
    hours: 30
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  staggered_boot_delay: 60


devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /auto/vxr1/sonic-images/yadeng/sonic-cisco-8000.bin.202405c 
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    xr_port_redir:
      - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  SD6:
      <<: *sonic_router

  SD7:
      <<: *sonic_router

  SD8:
      <<: *sonic_router

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_9.20.2206.28.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_9.20_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_9.20_KVM.qcow2
    data_ports:
      - data[0..7]

  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  ovs_hubs:
    hub0:
      - SD1.Ethernet[0..1]
      - SD5.Ethernet[0..1]
    hub1:
      - SD1.Ethernet[4..5]
      - SD6.Ethernet[0..1]
    hub2:
      - SD2.Ethernet[0..1]
      - SD5.Ethernet[4..5]
    hub3:
      - SD2.Ethernet[4..5]
      - SD6.Ethernet[4..5]
    hub4:
      - SD3.Ethernet[0..1]
      - SD7.Ethernet[0..1]
    hub5:
      - SD3.Ethernet[4..5]
      - SD8.Ethernet[0..1]
    hub6:
      - SD4.Ethernet[0..1]
      - SD7.Ethernet[4..5]
    hub7:
      - SD4.Ethernet[4..5]
      - SD8.Ethernet[4..5]
    hub8:
      - SD1.Ethernet[7..8]
      - SD3.Ethernet[7..8]
    hub9:
      - SD1.Ethernet[9..10]
      - SD4.Ethernet[7..8]
    hub10:
      - SD2.Ethernet[7..8]
      - SD3.Ethernet[9..10]
    hub11:
      - SD2.Ethernet[9..10]
      - SD4.Ethernet[9..10]
    hub12:
      - SD5.Ethernet[12..13]
      - ixia.data[0..1]
    hub14:
      - SD6.Ethernet[12..13]
      - ixia.data[2..3]
    hub15:
      - SD7.Ethernet[12..13]
      - ixia.data[4..5]
    hub16:
      - SD8.Ethernet[12..13]
      - ixia.data[6..7]
