simulation:
    slurm_flags:
        partition: bigmem_intel
        hours: 72

devices:

  mux_sim:
    platform: linux
    vcpu: 2
    image: /auto/vxr/vxr_images/onie-sonic/mux_sim_v5.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@ubuntu:~#
    extended_pci_bus: True
    xr_port_redir: [22, 8080]
    xr_config: /home/vxr/restart_mux.sh vms_1 "0,2,4,6,8,10,16,18,20,22,24,26,28,30,32,34,36,38,44,46,48,50,52,54"
    data_port_attributes:
       transport: e1000
    data_ports:
      - ptf[0..27]
      - upper_tor[0..27]
      - lower_tor[0..27]

  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v2.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..71]
      - backplane

  sonic_dut_0: &dut
    platform: spitfire_f
    os_type: sonic
    xr_port_redir: [22]
    #linux_username: "admin"
    #linux_password: "YourPaSsWoRd"
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: /auto/vxr1/sonic-images/devpatha/1905/sonic-cisco-8000.bin
    linecard_types: [matilda64]
    vxr_sim_config:
        shelf:
           ConfigS1NplPath: /auto/mb/sonic/workspace/sonic-cicd/sdk/sdk-1.57.10.10/npl
           ConfigS1NpsuiteVer: 1.105.0

  sonic_dut_1:
      <<: *dut

  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup/sonic/ubuntu1804_spytest.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    vcpu: 4
    memory: '4G'

device_groups:
  veos:
    devices:
    - "veos[1..4]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

