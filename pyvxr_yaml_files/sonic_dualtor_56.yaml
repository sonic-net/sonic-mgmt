devices:

  mux_sim:
    platform: linux
    vcpu: 2
    image: /auto/vxr/vxr_images/onie-sonic/mux_sim.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@ubuntu:~#
    extended_pci_bus: True
    xr_port_redir: [22, 8080]
    data_port_attributes: 
       transport: e1000
    data_ports:
      - ptf[0..26]
      - upper_tor[0..26]
      - lower_tor[0..26]

  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker.qcow2.new
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:/#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..32]

  sonic_dut_0: &dut
    platform: spitfire_f
    os_type: sonic
    xr_port_redir: [22]
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: http://172.27.147.152/IMAGES/dt8.1/sonic-cisco-8000.bin
    linecard_types: [matilda64]
    vxr_sim_config:
        shelf:
            ConfigS1NplPath: /auto/vxr1/sonic-images/SDK1.40.1_NPS1.76.1/npl
            ConfigS1NpsuiteVer: 1.76.2

  sonic_dut_1:
      <<: *dut

  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup3/sonic/ubuntu1804_spytest.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    vcpu: 4
    memory: '4G'

device_groups:
  veos:
    devices:
    - "veos[1..4]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

connections:
  hubs:

    mux_sim_to_ptf:
      - docker_ptf.eth[0..11]
      - mux_sim.ptf[0..11]

    mux_sim_to_upper_tor:
      - mux_sim.upper_tor[0..11]
      - sonic_dut_0.Ethernet[0..11]

    mux_sim_to_lower_tor:
      - mux_sim.lower_tor[0..11]
      - sonic_dut_1.Ethernet[0..11]

    sonic_dut_0_to_veos1:
      - sonic_dut_0.Ethernet[12..13]
      - veos1.Ethernet[1..2]

    sonic_dut_0_to_veos2:
      - sonic_dut_0.Ethernet[14..15]
      - veos2.Ethernet[1..2]

    sonic_dut_0_to_veos3:
      - sonic_dut_0.Ethernet[40..41]
      - veos3.Ethernet[1..2]

    sonic_dut_0_to_veos4:
      - sonic_dut_0.Ethernet[42..43]
      - veos4.Ethernet[1..2]

    sonic_dut_1_to_veos1:
      - sonic_dut_1.Ethernet[12..13]
      - veos1.Ethernet[3..4]

    sonic_dut_1_to_veos2:
      - sonic_dut_1.Ethernet[14..15]
      - veos2.Ethernet[3..4]

    sonic_dut_1_to_veos3:
      - sonic_dut_1.Ethernet[40..41]
      - veos3.Ethernet[3..4]

    sonic_dut_1_to_veos4:
      - sonic_dut_1.Ethernet[42..43]
      - veos4.Ethernet[3..4]

