      - SD2.Ethernet[4..7]
      - SD3.Ethernet[4..7]
    hub4:
      - SD2.Ethernet[8..11]
      - SD4.Ethernet[4..7]
    hub5:
      - SD3.Ethernet[8..11]
      - SD4.Ethernet[8..11]
    hub6:
      - SD1.Ethernet12
      - spt.data0
    hub7:
