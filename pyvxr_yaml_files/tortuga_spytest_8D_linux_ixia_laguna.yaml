simulation:
  slurm_flags:
    pending_timeout: 60
    hours: 30
    partition: regression
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false

devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso
    linecard_types: ['HF6100-64ED']
    port_breakout:
       lc0:
          0..63: 1x800
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/prashsr3/IPSLA/images/cisco.202405c.2.tortuga/sonic-buildimage-cisco.202405c.2.tortuga-periodic/sonic-cisco-8000.bin
    vxr_sim_config:
      shelf:
        # the below config prevet packet reaching nsim before the full initialization. We observer dsim crash when the packets are sent before the full initialization.
        # the below config can be removed when dsim issue is fixed
        ConfigS1EgressSeen: 'true'
        ConfigS1DelayAfterEgressSeen: '60'
    os_type: sonic
    memory: 20GB
    platform: spitfire_f
    data_ports:
      - Ethernet1_[1..64]
    xr_port_redir:
    - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  SD6:
      <<: *sonic_router

  SD7: &linux_host
    data_ports:
      - eth1
      - eth2
      - eth3
      - eth4
      - eth5
      - eth6
    data_port_attributes:
      transport: e1000
    disks:
      - hda_ref:
          file: /auto/vxr/images/linux/ubuntu22.qcow2
          type: reference
    memory: 2GB
    platform: linux
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    vcpu: 2
    xr_port_redir:
      - 22
    cli_commands: |
      rm -f /home/vxr/tcpserver.py
      echo 'import socket' > /home/vxr/tcpserver.py
      echo 'import threading' >> /home/vxr/tcpserver.py
      echo 'import sys' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo 'def handle_client(conn, addr):' >> /home/vxr/tcpserver.py
      echo '    print(f"Connected by {addr}")' >> /home/vxr/tcpserver.py
      echo '    with conn:' >> /home/vxr/tcpserver.py
      echo '        while True:' >> /home/vxr/tcpserver.py
      echo '            data = conn.recv(1024)' >> /home/vxr/tcpserver.py
      echo '            if not data:' >> /home/vxr/tcpserver.py
      echo '                break' >> /home/vxr/tcpserver.py
      echo '            conn.sendall(data)  # Echo back' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo 'def start_server(host, port):' >> /home/vxr/tcpserver.py
      echo '    # Determine address family (IPv4 or IPv6)' >> /home/vxr/tcpserver.py
      echo '    family = socket.AF_INET6 if ":" in host else socket.AF_INET' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '    with socket.socket(family, socket.SOCK_STREAM) as s:' >> /home/vxr/tcpserver.py
      echo '        # Allow immediate reuse of the address after restart' >> /home/vxr/tcpserver.py
      echo '        s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '        # Bind and listen' >> /home/vxr/tcpserver.py
      echo '        s.bind((host, port))' >> /home/vxr/tcpserver.py
      echo '        s.listen()' >> /home/vxr/tcpserver.py
      echo '        print(f"Server listening on {host}:{port}")' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '        while True:' >> /home/vxr/tcpserver.py
      echo '            conn, addr = s.accept()' >> /home/vxr/tcpserver.py
      echo '            print(f"Accepted connection from {addr}")' >> /home/vxr/tcpserver.py
      echo '            client_thread = threading.Thread(target=handle_client, args=(conn, addr))' >> /home/vxr/tcpserver.py
      echo '            client_thread.daemon = True' >> /home/vxr/tcpserver.py
      echo '            client_thread.start()' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo 'if __name__ == "__main__":' >> /home/vxr/tcpserver.py
      echo '    if len(sys.argv) != 3:' >> /home/vxr/tcpserver.py
      echo '        print(f"Usage: python3 {sys.argv[0]} <port> <ip>")' >> /home/vxr/tcpserver.py
      echo '        sys.exit(1)' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '    try:' >> /home/vxr/tcpserver.py
      echo '        PORT = int(sys.argv[1])' >> /home/vxr/tcpserver.py
      echo '    except ValueError:' >> /home/vxr/tcpserver.py
      echo '        print("Port must be an integer")' >> /home/vxr/tcpserver.py
      echo '        sys.exit(1)' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '    HOST = sys.argv[2]' >> /home/vxr/tcpserver.py
      echo '' >> /home/vxr/tcpserver.py
      echo '    start_server(HOST, PORT)' >> /home/vxr/tcpserver.py
      chmod +x /home/vxr/tcpserver.py
      echo "TCP server file created successfully"

  SD8:
      <<: *linux_host

  SD9: &pxe_client
    data_ports:
      - eth1
      - eth2
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu:~\$
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    memory: 4GB
    platform: linux
    vcpu: 4
    xr_port_redir:
      - 22
    qemu_args: "-boot order=n -boot menu=on -global iPXE.dhcp_timeout=60"
    cli_commands: |
         echo "cisco123" | sudo -S apt remove python2.7 -y
         sudo apt autoremove -y

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_9.20.2206.28.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_9.20_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_9.20_KVM.qcow2
    data_ports:
      - data[0..9]

  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

