simulation:
  slurm_flags:
    pending_timeout: 60
    partition: regression
    hours: 30
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false


devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /auto/vxr1/sonic-images/abramamu/test/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    xr_port_redir:
      - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  SD6:
      <<: *sonic_router

  SD7:
      <<: *sonic_router

  SD8:
      <<: *sonic_router

  HOST1: &host
    data_ports:
    - eth1
    - eth2
    - eth3
    - eth4
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /auto/vxr/images/linux/ubuntu22.qcow2 
          type: reference
    memory: 2GB
    platform: linux
    vcpu: 1
    xr_port_redir:
      - 22
    cli_commands: |
      sudo ifconfig eth1 up
      sudo modprobe 8021q
      sudo ip link add link eth1 name eth1.10 type vlan id 10
      sudo ip link add link eth1 name eth1.20 type vlan id 20
      sudo ip link add link eth1 name eth1.30 type vlan id 30
      sudo ip link add link eth1 name eth1.40 type vlan id 40
      sudo ip link add link eth1 name eth1.50 type vlan id 50
      sudo ip link add link eth1 name eth1.60 type vlan id 60
      sudo ip link add link eth1 name eth1.70 type vlan id 70
      sudo ip link add link eth1 name eth1.80 type vlan id 80
      sudo ip link add link eth1 name eth1.90 type vlan id 90
      sudo ip link add link eth1 name eth1.99 type vlan id 99
      sudo ip link set dev eth1.10 address 00:00:00:00:10:01
      sudo ip link set dev eth1.20 address 00:00:00:00:20:01
      sudo ip link set dev eth1.30 address 00:00:00:00:30:01
      sudo ip link set dev eth1.40 address 00:00:00:00:40:01
      sudo ip link set dev eth1.50 address 00:00:00:00:50:01
      sudo ip link set dev eth1.60 address 00:00:00:00:60:01
      sudo ip link set dev eth1.70 address 00:00:00:00:70:01
      sudo ip link set dev eth1.80 address 00:00:00:00:80:01
      sudo ip link set dev eth1.90 address 00:00:00:00:90:01
      sudo ip link set dev eth1.99 address 00:00:00:00:99:01
      sudo ip addr add 10.212.10.1/24 dev eth1.10
      sudo ip addr add 10.212.20.1/24 dev eth1.20
      sudo ip addr add 10.212.30.1/24 dev eth1.30
      sudo ip addr add 10.212.40.1/24 dev eth1.40
      sudo ip addr add 10.212.50.1/24 dev eth1.50
      sudo ip addr add 10.212.60.1/24 dev eth1.60
      sudo ip addr add 10.212.70.1/24 dev eth1.70
      sudo ip addr add 10.212.80.1/24 dev eth1.80
      sudo ip addr add 10.212.90.1/24 dev eth1.90
      sudo ip addr add 10.212.99.1/24 dev eth1.99
      sudo ip link set dev eth1.10 up
      sudo ip link set dev eth1.20 up
      sudo ip link set dev eth1.30 up
      sudo ip link set dev eth1.40 up
      sudo ip link set dev eth1.50 up
      sudo ip link set dev eth1.60 up
