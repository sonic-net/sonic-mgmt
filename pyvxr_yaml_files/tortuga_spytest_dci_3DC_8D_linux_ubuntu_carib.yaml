simulation:
  slurm_flags:
    pending_timeout: 60
    partition: regression
    cluster: rch-slurm-m1
    hours: 30
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  staggered_boot_delay: 60


devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
        ConfigS1NplPath: /auto/vxr1/sonic-images/yucgu/202405/npl
        ConfigS1NpsuiteVer: 1.184.1  
    linux_password: cisco123
    linux_username: cisco
    onie-install:  /auto/vxr1/sonic-images/mrghosh/sonic-cisco-8000_dci_9_24.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    xr_port_redir:
      - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  SD6:
      <<: *sonic_router

  SD7:
      <<: *sonic_router

  SD8:
      <<: *sonic_router

  HOST1: &host
    data_ports:
    - eth1
    - eth2
    - eth3
    - eth4
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /auto/vxr/images/linux/ubuntu22.qcow2 
          type: reference
    memory: 2GB
    platform: linux
    vcpu: 1
    xr_port_redir:
      - 22
    cli_commands: |
      sudo ifconfig eth1 up
      sudo ip addr add 10.212.10.1/24 dev eth1
      sudo ifconfig eth1 hw ether 00:00:00:00:00:01
      sudo ip route replace default via 10.212.10.10
      ip addr
      ping -c 1 10.212.10.10
  HOST2:
      <<: *host
      pre_cli: |
        echo "PS1=\"HOST2$ \"" >> ~/.bashrc
        echo -e "network:\n  version: 2\n  renderer: networkd\n  ethernets:\n    eth1:\n      dhcp4: no\n    eth2:\n      dhcp4: no\n  bonds:\n    bond0:\n      dhcp4: no\n      interfaces:\n        - eth1\n        - eth2\n      parameters:\n        mode: 802.3ad\n        transmit-hash-policy: layer3+4\n        mii-monitor-interval: 100\n        lacp-rate: fast\n  addresses:\n    - 10.212.10.2/24\n    - 10:212:10::2/64\n  gateway4: 10.212.10.10" | sudo tee /etc/netplan/01-netcfg.yaml > /dev/null
      cli_commands: |
        sudo netplan apply
        sudo ifconfig eth1 hw ether 00:00:00:00:00:02
        sudo ifconfig eth2 hw ether 00:00:00:00:00:02
        sudo ifconfig bond0 hw ether 00:00:00:00:00:02
        ip addr
        ping -c 1 10.212.10.10

  HOST3:
      <<: *host
      cli_commands: |
        sudo ifconfig eth1 up
        sudo ip addr add 10.212.10.3/24 dev eth1
        sudo ifconfig eth1 hw ether 00:00:00:00:00:03
        sudo ip route replace default via 10.212.10.10
        ip addr
        ping -c 1 10.212.10.10

  HOST4:
      <<: *host
      cli_commands: |
        sudo ifconfig eth1 up
        sudo ip addr add 10.212.10.4/24 dev eth1
        sudo ifconfig eth1 hw ether 00:00:00:00:00:04
        sudo ip route replace default via 10.212.10.10
        ip addr
        ping -c 1 10.212.10.10

  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  ovs_hubs:
    # DC1 Intra-fabric (SD1/SD2 <-> SD5/SD6) - Same for both 6D and 8D
    hub0:
      - SD1.Ethernet[0..1]
      - SD5.Ethernet[0..1]
    hub1:
      - SD1.Ethernet[4..5]
      - SD6.Ethernet[0..1]
    hub2:
      - SD2.Ethernet[0..1]
      - SD5.Ethernet[4..5]
    hub3:
      - SD2.Ethernet[4..5]
      - SD6.Ethernet[4..5]
    
    # DC2 Intra-fabric (SD3 <-> SD7) - Same for both 6D and 8D
    hub4:
      - SD3.Ethernet[0..1]
      - SD7.Ethernet[0..1]
    
    # DC1-DC2 Inter-DC WAN links - Same for both 6D and 8D
    hub6:
      - SD1.Ethernet[7..8]
      - SD3.Ethernet[7..8]
    hub8:
      - SD2.Ethernet[7..8]
      - SD3.Ethernet[9..10]
    
    # DC3 Intra-fabric (SD4 <-> SD8) - Only for 8D topology
    hub5:
      - SD4.Ethernet[0..1]
      - SD8.Ethernet[0..1]
    
    # DC1-DC3 Inter-DC WAN links - Only for 8D topology
    hub7:
      - SD1.Ethernet[9..10]
      - SD4.Ethernet[7..8]
    hub9:
      - SD2.Ethernet[9..10]
      - SD4.Ethernet[9..10]
    
    # DC2-DC3 Inter-DC WAN links - Only for 8D topology
    hub10:
      - SD3.Ethernet[11..12]
      - SD4.Ethernet[11..12]
    
    # Host connections - Consistent for both topologies
    hub11:
      - SD5.Ethernet12
      - HOST1.eth1
    hub12:
      - SD5.Ethernet13
      - HOST2.eth1
    hub13:
      - SD6.Ethernet12
      - HOST2.eth2
    hub14:
      - SD7.Ethernet12
      - HOST3.eth1
    hub15:
      - SD8.Ethernet12
      - HOST4.eth1
