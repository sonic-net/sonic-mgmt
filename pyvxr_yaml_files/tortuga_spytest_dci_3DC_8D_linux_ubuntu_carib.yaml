      cli_commands: |
        echo -e "network:\n  version: 2\n  renderer: networkd\n  ethernets:\n    eth1:\n      dhcp4: no\n    eth2:\n      dhcp4: no\n  bonds:\n    bond0:\n      dhcp4: no\n      interfaces:\n        - eth1\n        - eth2\n      parameters:\n        mode: 802.3ad\n        transmit-hash-policy: layer3+4\n        mii-monitor-interval: 100\n        lacp-rate: fast\n  vlans:\n    bond0.10:\n      id: 10\n      link: bond0\n      addresses:\n        - 10.212.10.2/24\n      macaddress: 00:00:00:00:10:02\n    bond0.20:\n      id: 20\n      link: bond0\n      addresses:\n        - 10.212.20.2/24\n      macaddress: 00:00:00:00:20:02\n    bond0.30:\n      id: 30\n      link: bond0\n      addresses:\n        - 10.212.30.2/24\n      macaddress: 00:00:00:00:30:02\n    bond0.40:\n      id: 40\n      link: bond0\n      addresses:\n        - 10.212.40.2/24\n      macaddress: 00:00:00:00:40:02\n    bond0.50:\n      id: 50\n      link: bond0\n      addresses:\n        - 10.212.50.2/24\n      macaddress: 00:00:00:00:50:02\n    bond0.60:\n      id: 60\n      link: bond0\n      addresses:\n        - 10.212.60.2/24\n      macaddress: 00:00:00:00:60:02\n    bond0.70:\n      id: 70\n      link: bond0\n      addresses:\n        - 10.212.70.2/24\n      macaddress: 00:00:00:00:70:02\n    bond0.80:\n      id: 80\n      link: bond0\n      addresses:\n        - 10.212.80.2/24\n      macaddress: 00:00:00:00:80:02\n    bond0.90:\n      id: 90\n      link: bond0\n      addresses:\n        - 10.212.90.2/24\n      macaddress: 00:00:00:00:90:02\n    bond0.99:\n      id: 99\n      link: bond0\n      addresses:\n        - 10.212.99.2/24\n      macaddress: 00:00:00:00:99:02" | sudo tee /etc/netplan/01-netcfg.yaml > /dev/null
        sudo netplan apply
