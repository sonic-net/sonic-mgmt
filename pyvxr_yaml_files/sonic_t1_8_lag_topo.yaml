simulation:
  no_image_copy: true
  slurm_flags:
    hours: 120

devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v2.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: True
    vcpu: 4
    memory: '4G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..64]
      - backplane

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    xr_port_redir: [22]
    linux_username: "cisco"
    linux_password: "cisco123"
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    onie-install: http://172.29.93.10/sonic-images/dt_drop_22.4/sonic-cisco-8000.bin
    linecard_types: [matilda32]
   
  sonic_mgmt :
    platform: linux
    xr_port_redir: [22]
    image : /globalnobackup/sonic/ubuntu1804_mgt.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@vxr-vm:~\$'
    vcpu: 32
    memory: '64G'

device_groups:
  veos:
    devices:
    - "veos[1..6]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
    - hda:
        file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
        type: reference

connections:
    custom:
      ptf_injected1:
        ports:
        - docker_ptf.eth0
        - sonic_dut.Ethernet0
        - veos1.Ethernet1
      ptf_injected2:
        ports:
        - docker_ptf.eth1
        - sonic_dut.Ethernet1
        - veos1.Ethernet2
      ptf_injected3:
        ports:
        - docker_ptf.eth2
        - sonic_dut.Ethernet2
        - veos2.Ethernet1
      ptf_injected4:
        ports:
        - docker_ptf.eth3
        - sonic_dut.Ethernet3
        - veos2.Ethernet2
      ptf_injected5:
        ports:
        - docker_ptf.eth4
        - sonic_dut.Ethernet4
        - veos3.Ethernet1
      ptf_injected7:
        ports:
        - docker_ptf.eth5
        - sonic_dut.Ethernet5
        - veos4.Ethernet1
      ptf_injected8:
        ports:
        - docker_ptf.eth6
        - sonic_dut.Ethernet6
        - veos5.Ethernet1
      ptf_injected9:
        ports:
        - docker_ptf.eth7
        - sonic_dut.Ethernet7
        - veos6.Ethernet1
      backplane:
        ports:
        - veos[1..6].Ethernet9
        - docker_ptf.backplane
