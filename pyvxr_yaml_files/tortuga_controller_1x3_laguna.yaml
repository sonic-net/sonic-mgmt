simulation:
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  slurm_flags:
    pending_timeout: 60
    hours: 30
    partition: regression


devices:
  trex1: &host
    data_ports:
      - eth1
      - eth2
    data_port_attributes:
      transport: e1000
    linux_username: vxr
    linux_password: cisco123
    linux_prompt: vxr@ubuntu22:~\$
    disks:
      - hda_ref:
          file: /auto/vxr/images/linux/ubuntu22.qcow2.old
          type: reference
    memory: 2GB
    platform: linux
    vcpu: 1
    xr_port_redir:
      - 22

  trex2:
    <<: *host
  trex3:
    <<: *host
  trex4:
    <<: *host
  trex5:
    <<: *host
  trex6:
    <<: *host
  trex7:
    <<: *host
  trex8:
    <<: *host
  trex9:
    <<: *host
  trex10:
    <<: *host

  L0: &switch
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso 
    linecard_types: ['HF6100-64ED']
    port_breakout:
       lc0:
          0..63: 1x800
    linux_password: cisco123
    linux_username: cisco
    onie-install: /ws/yadeng-sjc/images/sonic-cisco-8000.bin.202405c
    vxr_sim_config:
      shelf:
        # the below config prevet packet reaching nsim before the full initialization. We observer dsim crash when the packets are sent before the full initialization.
        # the below config can be removed when dsim issue is fixed
        ConfigS1EgressSeen: 'true'
        ConfigS1DelayAfterEgressSeen: '60'
    os_type: sonic
    memory: 20GB
    vcpu: 10
    platform: spitfire_f
    data_ports:
      - Ethernet1_[1..64]
    xr_port_redir:
      - 22
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-deng-g200-leaf0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo curl http://ramius-fs1.cisco.com/cdi-images/tortuga/drake-config-pradeep1.yml -o /opt/cisco/etc/tortuga/drake-config.yml
      sudo systemctl daemon-reload
      sudo systemctl restart drake
      sudo systemctl restart lira
      sudo systemctl restart azimuth
      sudo systemctl disable systemd-networkd
      sudo config platform cisco sdk-debug disable

  L1:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-deng-g200-leaf1
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo config platform cisco sdk-debug disable

  L2:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-deng-g200-leaf2
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo config platform cisco sdk-debug disable

  S0:
    <<: *switch
    cli_commands: |
      sleep 60
      sudo config hostname tortuga-deng-g200-spine0
      sudo config save -y
      curl http://ramius-fs1.cisco.com/cdi-images/tortuga/tortuga-agents_0.1-1_amd64.deb -o /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo dpkg -i /home/cisco/tortuga-agents_0.1-1_amd64.deb
      sudo config platform cisco sdk-debug disable

