simulation:
  slurm_flags:
        hours: 120
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  staggered_boot_delay: 60

devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - matilda32
    linux_password: cisco123
    linux_username: cisco
    onie-install: http://172.29.93.10/sonic-images/10652/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    platform: spitfire_f
    xr_port_redir:
    - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth


  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5: 
      <<: *sonic_router

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_9.20.2206.28.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_9.20_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_9.20_KVM.qcow2
    data_ports:
      - data[0..7]
  
  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  hubs:
    hub0:
      - SD1.Ethernet0
      - SD3.Ethernet0
    hub1:
      - SD1.Ethernet2
      - SD3.Ethernet2
    hub2:
      - SD1.Ethernet4
      - SD4.Ethernet4
    hub3:
      - SD1.Ethernet6
      - SD4.Ethernet6
    hub4:
      - SD2.Ethernet0
      - SD3.Ethernet4
    hub5:
      - SD2.Ethernet2
      - SD3.Ethernet6
    hub6:
      - SD2.Ethernet4
      - SD4.Ethernet0
    hub7:
      - SD2.Ethernet6
      - SD4.Ethernet2
    hub8:
      - SD3.Ethernet8
      - ixia.data0
    hub9:
      - SD3.Ethernet10
      - ixia.data1
    hub10:
      - SD3.Ethernet12
      - ixia.data2
    hub11:
      - SD3.Ethernet14
      - ixia.data3
    hub12:
      - SD4.Ethernet8
      - ixia.data4
    hub13:
      - SD4.Ethernet10
      - ixia.data5
    hub14:
      - SD4.Ethernet12
      - ixia.data6
    hub15:
      - SD4.Ethernet14
      - ixia.data7
