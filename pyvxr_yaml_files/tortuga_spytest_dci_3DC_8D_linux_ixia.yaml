simulation:
  slurm_flags:
    pending_timeout: 60
    partition: regression
    hours: 30
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false


devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
      - 8101-32FH
    port_breakout:
      lc0:
        0..31: 1x400
    vxr_sim_config:
      shelf:
        ConfigCardPidOverride: HF6100-32D
    linux_password: cisco123
    linux_username: cisco
    onie-install: /auto/vxr1/sonic-images/abramamu/test/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    vcpu: 8
    platform: spitfire_f
    xr_port_redir:
      - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  SD6:
      <<: *sonic_router

  SD7:
      <<: *sonic_router

  SD8:
      <<: *sonic_router

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_10.00.2407.119.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_10.00_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_10.00_KVM.qcow2
    data_ports:
      - data[0..7]

  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  hubs:
    # DC1 Intra-fabric (SD1/SD2 <-> SD5/SD6) - Same for both 6D and 8D
    hub0:
      - SD1.Ethernet[0..1]
      - SD5.Ethernet[0..1]
    hub1:
      - SD1.Ethernet[4..5]
      - SD6.Ethernet[0..1]
    hub2:
      - SD2.Ethernet[0..1]
      - SD5.Ethernet[4..5]
    hub3:
      - SD2.Ethernet[4..5]
      - SD6.Ethernet[4..5]
    
    # DC2 Intra-fabric (SD3 <-> SD7) - Same for both 6D and 8D
    hub4:
      - SD3.Ethernet[0..1]
      - SD7.Ethernet[0..1]
    
    # DC1-DC2 Inter-DC WAN links - Same for both 6D and 8D
    hub6:
      - SD1.Ethernet[7..8]
      - SD3.Ethernet[7..8]
    hub8:
      - SD2.Ethernet[7..8]
      - SD3.Ethernet[9..10]
    
    # DC3 Intra-fabric (SD4 <-> SD8) - Only for 8D topology
    hub5:
      - SD4.Ethernet[0..1]
      - SD8.Ethernet[0..1]
    
    # DC1-DC3 Inter-DC WAN links - Only for 8D topology
    hub7:
      - SD1.Ethernet[9..10]
      - SD4.Ethernet[7..8]
    hub9:
      - SD2.Ethernet[9..10]
      - SD4.Ethernet[9..10]
    
    # DC2-DC3 Inter-DC WAN links - Only for 8D topology
    hub10:
      - SD3.Ethernet[11..12]
      - SD4.Ethernet[11..12]
    
    # IXIA connections - HOST1 (DC1 Leaf1), HOST2 (DC1 Leaf1/Leaf2), HOST3 (DC2 Leaf), HOST4 (DC3 Leaf), HOST5 (DC1 GW)
    hub11:
      - SD5.Ethernet12
      - ixia.data0
    hub12:
      - SD5.Ethernet13
      - ixia.data1
    hub13:
      - SD6.Ethernet12
      - ixia.data2
    hub14:
      - SD7.Ethernet12
      - ixia.data3
    hub15:
      - SD8.Ethernet12
      - ixia.data4
    hub16:
      - SD1.Ethernet15
      - ixia.data5
