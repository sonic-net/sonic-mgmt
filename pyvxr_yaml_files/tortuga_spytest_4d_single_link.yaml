  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  hubs:
    spine0_leaf0_conn1:
    - spine0.Ethernet0
    - leaf0.Ethernet0
    spine0_leaf1_conn1:
    - spine0.Ethernet8
    - leaf1.Ethernet12
    spine1_leaf0_conn1:
    - spine1.Ethernet0
    - leaf0.Ethernet12
    spine1_leaf1_conn1:
    - spine1.Ethernet8
    - leaf1.Ethernet0
