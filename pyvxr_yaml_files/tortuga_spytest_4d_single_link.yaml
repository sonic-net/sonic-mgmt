simulation:
  slurm_flags:
        hours: 120
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  staggered_boot_delay: 60
devices:
  leaf0:
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types:
    - matilda32
    vxr_sim_config:
      shelf:
        Configspine1NplPath: /auto/mb/sonic/workspace/sonic-cicd/sdk/sdk-1.66.69.7/npl
        Configspine1NpsuiteVer: 1.137.1
    linux_password: cisco123
    linux_username: cisco
    onie-install: /nobackup/thgowda/sonic-test/sim/sonic-buildimage-cisco.202205.dsf-p2/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    platform: spitfire_f
    data_ports:
    - Ethernet0
    - Ethernet4
    - Ethernet8
    - Ethernet12
    - Ethernet16
    xr_port_redir:
    - 22
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth
  leaf1:
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
