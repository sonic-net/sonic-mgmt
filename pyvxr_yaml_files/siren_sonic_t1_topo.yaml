simulation:
  no_image_copy: false
  slurm_flags:
    pending_timeout: 60
    hours: 24
    partition: regression
    cluster: rch-slurm-m1

devices:
  docker_ptf:
    platform: linux
    image: /auto/vxr/vxr_images/onie-sonic/ptf_docker_v4.qcow2
    linux_username: root
    linux_password: lab
    linux_prompt: root@docker-ptf:~#
    xr_port_redir: [22]
    extended_pci_bus: true
    vcpu: 4
    memory: '8G'
    mgmt_intf_name: mgmt
    data_ports:
      - eth[0..32]
      - backplane

  sonic_dut:
    platform: spitfire_f
    os_type: sonic
    linecard_types: [HF6100-60L4D]
    npu_asic_versions: [A1]
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0-2020.11br.iso
    onie-install: /auto/vxr1/skorka/sonic-cisco-8000-tortuga.bin
    pre_cli: |
      # a workaround for skd bug https://cdetsng.cisco.com/webui/#view=CSCwn14284
      sudo bash -c "echo 'net.core.rmem_default = 16777216' >> /etc/sysctl.conf"
      sudo bash -c "echo 'net.core.wmem_default = 16777216' >> /etc/sysctl.conf"
      sudo sysctl -p
      # a workaround for Siren's syncd.conf issue
      sudo cp /usr/share/sonic/device/cisco-8000/syncd.conf /usr/share/sonic/device/x86_64-hf6100_60l4d-r0/syncd.conf
    xr_port_redir: [22]
    linux_username: "admin"
    linux_password: "password"
    vcpu: 10
    memory: '20G'
    data_ports:
      - Ethernet1_[1..64]

  sonic_mgmt:
    platform: linux
    xr_port_redir: [22]
    image: /globalnobackup/sonic/ubuntu1804_mgt.qcow2
    linux_username: 'vxr'
    linux_password: 'cisco123'
    linux_prompt: 'vxr@vxr-vm:~\$'
    vcpu: 10
    memory: '20G'

device_groups:
  veos:
    devices:
      - "veos[1..32]"
    platform: veos
    xr_port_redir: [22]
    image: /auto/vxr/images/veos/Aboot-veos-serial-8.0.0.iso
    disks:
      - hda:
          file: /auto/vxr/images/veos/vEOS-lab-4.24.1.1F.qcow2
          type: reference

connections:
  custom:
    ptf_injected1:
      ports:
        - docker_ptf.eth0
        - sonic_dut.Ethernet1_1
        - veos1.Ethernet1
