simulation:
  slurm_flags:
    pending_timeout: 60
    hours: 30
    partition: regression
  no_image_copy: true
  pyvxr_flags:
    port_file_timeout: 1200
  skip_auto_bringup: false
  staggered_boot_delay: 60

devices:
  SD1: &sonic_router
    image: /auto/vxr/images/onie-sonic/onie-recovery-x86_64-cisco_8000-r0.iso
    linecard_types: [churchill]
    port_breakout:
      lc0:
        0..7: 1x400
        8..15: 1x100
        16..23: 4x25
        24..31: 4x10
    linux_password: cisco123
    linux_username: cisco
    onie-install: http://172.29.93.10/sonic-images/10652/sonic-cisco-8000.bin
    os_type: sonic
    memory: 12GB
    platform: spitfire_f
    xr_port_redir:
    - 22
    vxr_sim_config:
        shelf:
           ConfigCardPidOverride: 'HF6100-32D'
    pre_cli: |
        sudo systemctl disable drake
        sudo systemctl disable lira
        sudo systemctl disable azimuth

  SD2:
      <<: *sonic_router

  SD3:
      <<: *sonic_router

  SD4:
      <<: *sonic_router

  SD5:
      <<: *sonic_router

  ixia:
    platform: ixia-web
    ixia_images:
      windows: /auto/vxr/images/ixia/IxNetworkWeb_KVM_9.20.2206.28.qcow2
      chassis: /auto/vxr/images/ixia/Ixia_Virtual_Chassis_9.20_KVM.qcow2
      load: /auto/vxr/images/ixia/Ixia_Virtual_Load_Module_9.20_KVM.qcow2
    data_ports:
      - data[0..7]

  sonic_mgmt :
    platform: linux
    image: /auto/vxr1/images/linux/ubuntu_serial.qcow2
    linux_username: 'vxr'
    linux_password : 'cisco123'
    linux_prompt: 'vxr@ubuntu:~\$'
    xr_port_redir: [22]
    vcpu: 4
    memory: '4G'

connections:
  hubs:
    hub0:
      - SD1.Ethernet[0..3]
      - SD3.Ethernet[0..3]
    hub1:
      - SD1.Ethernet[4..7]
      - SD4.Ethernet[0..3]
    hub2:
      - SD2.Ethernet[0..3]
      - SD3.Ethernet[4..7]
    hub3:
      - SD2.Ethernet[4..7]
      - SD4.Ethernet[4..7]
    hub4:
      - SD3.Ethernet[8..11]
      - ixia.data[0..3]
    hub5:
      - SD4.Ethernet[8..9]
      - ixia.data[4..5]
    hub6:
      - SD1.Ethernet[8..11]
      - SD2.Ethernet[8..11]
    hub7:
      - SD2.Ethernet[12..13]
      - ixia.data[6..7]
