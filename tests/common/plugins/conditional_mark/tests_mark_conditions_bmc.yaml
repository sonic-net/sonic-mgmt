# Conditional mark conditions for BMC topology
#
# Skip tests that require ASIC or data-plane features when running on BMC testbeds.
# BMC has no switching ASIC, so tests depending on hardware offload, forwarding,
# QoS, port channels, VLANs, etc. are not applicable.
#
# Usage: --mark-conditions-files tests/common/plugins/conditional_mark/tests_mark_conditions_bmc.yaml


acl/:
  skip:
    reason: 'ACL tests require ASIC, not available on BMC'
    conditions:
      - "'bmc' in topo_type"

arp/:
  skip:
    reason: 'ARP tests require data-plane, not available on BMC'
    conditions:
      - "'bmc' in topo_type"

