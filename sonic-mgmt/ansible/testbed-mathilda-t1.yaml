#####
#
# testbed-github.yaml is designed to be a convenient config file that contains information pertaining to sonic-mgmt
# the information has been divided into the following groups: 
#   - device_groups 
#   - devices
#   - host_vars
#   - veos_groups
#   - veos
#   - testbed
#   - topology
#
# these groups when converted from yaml in python become dictionaries. 
# these dictionaries help generate files necessary for ansible to run test cases 
#
# where are files generated from: 
#   - device_groups generates: lab
#   - devices generates: fanout/secrets.yml, lab/secrets.yml, lab
#   - host_vars generates: <host_vars>.yml
#   - veos_groups generates: veos
#   - veos generates: main.yml, vm_host/creds.yml, sonic_lab_devices.csv, eos/creds.yml, veos
#   - testbed generates: testbed.csv
#   - topology generates: sonic_lab_links.csv
#
# output files created:
#   [1]  /group_vars/vm_host/main.yml
#   [2]  /group_vars/vm_host/creds.yml
#   [3]  /files/sonic_lab_devices.csv
#   [4]  /testbed.csv
#   [5]  /files/sonic_lab_links.csv
#   [6]  /group_vars/eos/creds.yml
#   [7]  /group_vars/fanout/secrets.yml
#   [8]  /group_vars/lab/secrets.yml
#   [9]  /lab
#   [10] /veos
#   [11*] /host_vars/<host_var>.yml (where * is 0 or more)
#
#####
testbed_config:
    name: Mathilda-T1
    alias: topologyGithubTestbed
    type: Physical 

# device_groups is a dictionary that contains the groups that devices and hosts belong to. it also contains global variables under 'vars'
# device_groups is to export the lab file
# cross references with devices for ansible_host value
device_groups:                              
    lab:
        children: [sonic, vm_host, fanout, ptf]                                # source: sonic-mgmt/ansible/lab 
        vars:
            mgmt_subnet_mask_length: "16"                        # source: sonic-mgmt/ansible/lab
    sonic:
        children: [mathilda-4]      # source: sonic-mgmt/ansible/lab
        vars:
            hwsku: "8102-64H-O"                               # source: sonic-mgmt/ansible/lab
            iface_speed: '100000'                                 # source: sonic-mgmt/ansible/lab
    fanout:
        host: [nexus-5]         # source: sonic-mgmt/ansible/lab
    ptf:
        host: [ptf_math_1]                             # source: sonic-mgmt/ansible/lab

# devices is a dictionary that contains all devices and hosts but not ptfs (ptfs found under testbed)
# devices is used to export sonic_lab_devices, fanout/secrets, lab/secrets, lab
# there are no cross references
devices:
    mathilda-4:
        device_type: DevSonic                       # source: sonic-mgmt/ansible/files/sonic_lab_devices-github.csv
        hwsku: 8102-64H-O                          # source: sonic-mgmt/ansible/files/sonic_lab_devices-github.csv
        alias:
        credentials:
            username: cisco
            password: cisco123
            enable_password:
        ansible:
            ansible_host: 1.74.23.17/16             # source: sonic-mgmt/ansible/files/sonic_lab_devices-github.csv
            ansible_ssh_user: cisco
            ansible_ssh_pass: cisco123

    sonic-ucs-m3-2:                                 # source: sonic-mgmt/ansible/lab
        device_type: blank
        hwsku:
        mgmt_subnet_mask_length: 16
        alias:
        credentials:
            username: rraghav
            password: roZes@123
        ansible:
            ansible_host: 1.74.23.200                # source: sonic-mgmt/ansible/veos
            ansible_ssh_pass: rraghav
            ansible_become_pass: roZes@123
            ansible_sudo_pass: roZes@123

    nexus-5:
        device_type: fanout
        hwsku: C9336C-FX2
        alias:
        credentials:
            username: admin
            password: roZes@123
        ansible:
            ansible_host: 1.74.23.8               # source: sonic-mgmt/ansible/lab
            ansible_user: admin
            ansible_ssh_user: admin
            ansible_ssh_pass: roZes@123
            ansible_become_pass: roZes@123


# host_vars is a dictionary that contains all host_var values
# host_vars is used to export the host_vars files
# there are no cross references
host_vars:
    sonic-ucs-m3-2:
        mgmt_bridge: br1                # source: sonic-mgmt/host_vars
        mgmt_prefixlen: 16              # source: sonic-mgmt/host_vars
        mgmt_gw: 1.74.23.7              # source: sonic-mgmt/host_vars
        external_port: enp5s0f1         # source: sonic-mgmt/host_vars

# veos_groups is a dictionary that contains all veos groups
# veos_groups is used to generate the veos file
# veos_groups cross references veos (below)
veos_groups:
    servers:
        children: [server_1]                      # source: sonic-mgmt/veos
        vars: 
            topologies: ['t1', 't1-lag', 't1-64-lag', 't1-64-lag-clet', 't0', 't0-56', 't0-52', 'ptf32', 'ptf64', 't0-64', 't0-64-32', 't0-116']  # source: sonic-mgmt/veos
    server_1:
        children: [vms_1,vm_host]                        # source: sonic-mgmt/veos
        vars:
            host_var_file: host_vars/sonic-ucs-m3-2.yml    # source: sonic-mgmt/veos
    eos:
        children: [vms_1]                            # source: sonic-mgmt/veos
    vms_1:
        host: [VM0100, VM0101, VM0102, VM0103, VM0104, VM0105, VM0106, VM0107, VM0108, VM0109, VM0110, VM0111, VM0112, VM0113, VM0114, VM0115, VM0116, VM0117, VM0118, VM0119, VM0120, VM0121, VM0122, VM0123, VM0124, VM0125, VM0126, VM0127, VM0128, VM0129, VM0130, VM0131, VM0132, VM0133, VM0134, VM0135, VM0136, VM0137, VM0138, VM0139, VM0140, VM0141, VM0142, VM0143, VM0144, VM0145, VM0146, VM0147, VM0148, VM0149, VM0150, VM0151, VM0152, VM0153, VM0154, VM0155, VM0156, VM0157, VM0158, VM0159, VM0160, VM0161, VM0162, VM0163, VM0164, VM0165, VM0166, VM0167]  # source: sonic-mgmt/veos
    vm_host:
        children: [vm_host_1]                    # source: sonic-mgmt/veos
    vm_host_1:
        host: [STR-ACS-SERV-01]                             # source: sonic-mgmt/veos

# veos is a dictionary that contains veos information as well as hosts of children groups from veos_groups
