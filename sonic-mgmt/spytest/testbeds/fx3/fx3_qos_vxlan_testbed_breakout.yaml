version: 2.0

services: {default: "!include sonic_services.yaml"}

params: "!include sonic_params.yaml"
builds: "!include sonic_builds.yaml"
speeds: "!include sonic_speeds.yaml"
errors: "!include sonic_errors.yaml"
instrument: "!include sonic_instrument.yaml"

configs:
    default: "!include sonic_configs.yaml"
    empty: {current: [], restore: []}

devices:
    dut1:
        device_type: DevSonic
        access: {protocol: ssh, ip: 172.26.235.252, port: 22}
        rps: {model: Raritan, ip: 10.28.105.119, outlet: 24, username: admin, password: raritan}
        credentials: {username: admin, password: password, altpassword: ""}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    dut2:
        device_type: DevSonic
        access: {protocol: ssh, ip: 172.26.235.251, port: 22}
        rps: {model: Raritan, ip: 10.28.105.119, outlet: 23, username: admin, password: raritan}
        credentials: {username: admin, password: password, altpassword: ""}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    T1:
        device_type: TGEN
        properties: {type: ixia, version: 11.10, ip: 172.26.235.250, ix_server: 172.26.235.72, params: def_tg}

topology:
    dut1:
        interfaces:
            # VxLAN L3VNI ingress port — bound to VrfQoS during Section I tests.
            # Inner L3 frames enter here, are DSCP-classified, then VxLAN-
            # encapsulated and forwarded over the transit peer link.
            # Also used as the default 'ingress' port by the reused
            # qos_map/scheduler/buffer/wred suites (port_info['ingress']).
            Ethernet1_49: {EndDevice: T1, EndPort: 1/9,  params: def_tg_link}
            # VxLAN L2VNI ingress port — placed in Vlan502 access mode during
            # Section J tests. Kept separate from the L3VNI port so the two
            # overlays can coexist without flipping the port between
            # VRF-bound (L3VNI) and VLAN-access (L2VNI) modes on every run.
            # Also serves as 'ingress_b' for Section G per-port classification
            # isolation tests in peer_link mode.
            Ethernet1_50: {EndDevice: T1, EndPort: 1/10, params: def_tg_link}
            # Single-DUT egress port — used by the reused qos_map/scheduler/
            # buffer/wred suites when running in single-DUT 'ixia' mode.
            # Not consumed by VxLAN tests (they egress via DUT2 / 1/12).
            Ethernet1_51: {EndDevice: T1, EndPort: 1/11, params: def_tg_link}
            # 100G transit/peer link to dut2 — broken out to 4x25G.
            # Carries VxLAN-encapsulated traffic; QoS counters on the
            # sub-port reflect DSCP-to-TC classification on the ingress port.
            Ethernet1_54: {EndDevice: dut2, EndPort: Ethernet1_54, params: def_link, breakout: "4x25"}
    dut2:
        interfaces:
            # Remote-VTEP egress port — VxLAN-decapsulated traffic exits
            # here to the Ixia for both L3VNI (Section I) and L2VNI
            # (Section J) flows. Single port serves both overlays since
            # the egress side is symmetric.
            Ethernet1_49: {EndDevice: T1, EndPort: 1/12, params: def_tg_link}
            # 100G transit/peer link to dut1 — broken out to 4x25G.
            Ethernet1_54: {EndDevice: dut1, EndPort: Ethernet1_54, params: def_link, breakout: "4x25"}
