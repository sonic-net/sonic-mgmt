
D1:
  sonic:
    config: |
      sudo config interface ip add D1D2P1 1001:100:40::1/64
      sudo config interface ip add D1D2P2 1001:100:44::1/64
      sudo config interface ip add D1D2P3 1001:100:80::1/64
      sudo config interface ip add D1D2P4 1001:100:84::1/64
      sudo config interface ip add D1D2P5 1001:100:88::1/64
      sudo config interface ip add D1D2P7 1001:100:232::1/64
      sudo config interface ip add D1D2P8 1001:100:236::1/64
      sudo config interface ip add D1T1P1 2001:200:1::1/64


      sudo config interface ip add D1D2P1 100.100.40.1/24
      sudo config interface ip add D1D2P2 100.100.44.1/24
      sudo config interface ip add D1D2P3 100.100.80.1/24
      sudo config interface ip add D1D2P4 100.100.84.1/24
      sudo config interface ip add D1D2P5 100.100.88.1/24
      sudo config interface ip add D1D2P7 100.100.232.1/24
      sudo config interface ip add D1D2P8 100.100.236.1/24
      sudo config interface ip add D1T1P1 200.200.1.1/24
    deconfig: |

      sudo config interface ip rem D1D2P1 1001:100:40::1/64
      sudo config interface ip rem D1D2P2 1001:100:44::1/64
      sudo config interface ip rem D1D2P3 1001:100:80::1/64
      sudo config interface ip rem D1D2P4 1001:100:84::1/64
      sudo config interface ip rem D1D2P5 1001:100:88::1/64
      sudo config interface ip rem D1D2P7 1001:100:232::1/64
      sudo config interface ip rem D1D2P8 1001:100:236::1/64
      sudo config interface ip rem D1T1P1 2001:200:1::1/64

      sudo config interface ip rem D1D2P1 100.100.40.1/24
      sudo config interface ip rem D1D2P2 100.100.44.1/24
      sudo config interface ip rem D1D2P3 100.100.80.1/24
      sudo config interface ip rem D1D2P4 100.100.84.1/24
      sudo config interface ip rem D1D2P5 100.100.88.1/24
      sudo config interface ip rem D1D2P7 100.100.232.1/24
      sudo config interface ip rem D1D2P8 100.100.236.1/24
      sudo config interface ip rem D1T1P1 200.200.1.1/24

      sudo config interface startup D1D2P1
  bgp:
    config: |
      no router bgp
      router bgp 65200
      bgp router-id 10.200.200.200
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast
      
      bgp disable-ebgp-connected-route-check
      bgp bestpath as-path multipath-relax
      no bgp network import-check

      neighbor 100.100.40.2 remote-as 65201
      neighbor 100.100.44.2 remote-as 65201
      neighbor 100.100.80.2 remote-as 65201
      neighbor 100.100.84.2 remote-as 65201
      neighbor 100.100.88.2 remote-as 65201
      neighbor 100.100.232.2 remote-as 65201
      neighbor 100.100.236.2 remote-as 65201
      neighbor 200.200.1.2 remote-as 65205

      neighbor 1001:100:40::2 remote-as 65201
      neighbor 1001:100:44::2 remote-as 65201
      neighbor 1001:100:80::2 remote-as 65201
      neighbor 1001:100:84::2 remote-as 65201
      neighbor 1001:100:88::2 remote-as 65201
      neighbor 1001:100:232::2 remote-as 65201
      neighbor 1001:100:236::2 remote-as 65201
      neighbor 2001:200:1::2 remote-as 65205

      address-family ipv4 unicast
      neighbor 100.100.40.2 activate
      neighbor 100.100.44.2 activate
      neighbor 100.100.80.2 activate
      neighbor 100.100.84.2 activate
      neighbor 100.100.88.2 activate
      neighbor 100.100.232.2 activate
      neighbor 100.100.236.2 activate
      neighbor 200.200.1.2 activate
      exit-address-family

      address-family ipv6 unicast
      neighbor 1001:100:40::2 activate
      neighbor 1001:100:40::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:40::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:44::2 activate
      neighbor 1001:100:44::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:44::2 route-map TO_BGP_PEER_V6 out
      
      neighbor 1001:100:80::2 activate
      neighbor 1001:100:80::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:80::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:84::2 activate
      neighbor 1001:100:84::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:84::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:88::2 activate
      neighbor 1001:100:88::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:88::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:232::2 activate
      neighbor 1001:100:232::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:232::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:236::2 activate
      neighbor 1001:100:236::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:236::2 route-map TO_BGP_PEER_V6 out

      neighbor 2001:200:1::2 activate
      neighbor 2001:200:1::2 route-map FROM_BGP_PEER_V6 in
      neighbor 2001:200:1::2 route-map TO_BGP_PEER_V6 out
      exit-address-family
      exit

      route-map FROM_BGP_PEER_V6 permit 1
      on-match next
      set ipv6 next-hop prefer-global
      exit
      route-map FROM_BGP_PEER_V6 permit 100
      exit
      route-map TO_BGP_PEER_V6 permit 100

      end
      exit
    deconfig: |
      no router bgp 65200
      end
      exit

