spine0:
    sonic:
      config: |
        sudo counterpoll tunnel enable
        sudo counterpoll watermark interval 1000
        sudo config interface startup D1D3P1
        sudo config interface startup D1D4P1
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config interface ipv6 enable use-link-local-only D1D4P1
        sudo config interface ip add Loopback27 2001:db8:1::1/128 || true
        sudo config interface startup Loopback27
      deconfig: |
        sudo config interface ip rem Loopback27 2001:db8:1::1/128 || true
        sudo config interface ipv6 disable use-link-local-only D1D4P1 || true
        sudo config interface ipv6 disable use-link-local-only D1D3P1 || true

    bgp:
      config: |
        router bgp 2363070545
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 2001:db8:1::2 peer-group OVERLAY
        neighbor 2001:db8:1::3 peer-group OVERLAY
        neighbor D1D3P1 interface peer-group TRANSIT
        neighbor D1D4P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv6 unicast
        exit-address-family
        end
        exit

      deconfig: |
        no router bgp 2363070545
        end
        exit


leaf0:
    sonic:
      config: |
        sudo counterpoll tunnel enable
        sudo counterpoll watermark interval 1000
        sudo config interface startup D3D1P1
        sudo config interface startup D3D2P1
        sudo config interface ipv6 enable use-link-local-only D3D1P1
        sudo config interface ipv6 enable use-link-local-only D3D2P1
        sudo config interface ip add Loopback27 2001:db8:1::2/128 || true
        sudo config vxlan add VXLAN 2001:db8:1::2 || true
        sudo config vxlan evpn_nvo add NVO VXLAN || true
        sudo config vrf add Vrf01 || true
        sudo config vlan add 2 || true
        sudo config vlan member add -u 2 D3T1P1 || true
        sudo config interface vrf bind Vlan2 Vrf01 || true
        sudo config interface ip add Vlan2 2002:db8:1::1/64 || true
        sudo config vlan add 100 || true
        sudo config interface vrf bind Vlan100 Vrf01 || true
        sudo config vxlan map add VXLAN 100 1000 || true
        sudo config vrf add_vrf_vni_map Vrf01 1000 || true

      deconfig: |
        sudo config vrf del_vrf_vni_map Vrf01 || true
        sudo config vxlan map del VXLAN 100 1000 || true
        sudo config vxlan evpn_nvo del NVO || true
        sudo config vxlan del VXLAN || true
        sudo config interface vrf unbind Vlan100 || true
        sudo config vlan del 100 || true
        sudo config interface vrf unbind Vlan2 || true
        sudo config interface ip remove Vlan2 2002:db8:1::1/64 || true
        sudo config vlan member del 2 D3T1P1 || true
        sudo config vlan del 2 || true
        sudo config vrf del Vrf01 || true
        sudo config interface ip rem Loopback27 2001:db8:1::2/128 || true
        sudo config interface ipv6 disable use-link-local-only D3D2P1 || true
        sudo config interface ipv6 disable use-link-local-only D3D1P1 || true

    bgp:
      config: |
        router bgp 2363073663
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 2001:db8:1::1 peer-group OVERLAY
        neighbor 2001:db8:1::3 peer-group OVERLAY
        neighbor D3D1P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        advertise ipv6 unicast
        exit-address-family
        exit
        vrf Vrf01
        vni 1000
        exit
        router bgp 2363073663 vrf Vrf01
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        advertise ipv6 unicast
        exit-address-family
        end
        exit

      deconfig: |
        vrf Vrf01
        no vni 1000
        exit-vrf
        no router bgp 2363073663 vrf Vrf01
        end
        exit


