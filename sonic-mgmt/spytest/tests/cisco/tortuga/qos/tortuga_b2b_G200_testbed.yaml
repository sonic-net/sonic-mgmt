            Ethernet1_58: {EndDevice: spine1, EndPort: Ethernet1_2, params: def_link}
            Ethernet1_61: {EndDevice: spine2, EndPort: Ethernet1_1, params: def_link}
            Ethernet1_62: {EndDevice: spine2, EndPort: Ethernet1_2, params: def_link}
            Ethernet1_64_2: {EndDevice: T1, EndPort: 1/13, params: def_tg_link}
            Ethernet1_64_1: {EndDevice: T1, EndPort: 1/14, params: def_tg_link}
            Ethernet1_60_2: {EndDevice: T1, EndPort: 1/15, params: def_tg_link}
            Ethernet1_60_1: {EndDevice: T1, EndPort: 1/16, params: def_tg_link}
    leaf2:
        interfaces:
            Ethernet1_57: {EndDevice: spine1, EndPort: Ethernet1_13, params: def_link}
            Ethernet1_58: {EndDevice: spine1, EndPort: Ethernet1_14, params: def_link}
            Ethernet1_61: {EndDevice: spine2, EndPort: Ethernet1_13, params: def_link}
            Ethernet1_62: {EndDevice: spine2, EndPort: Ethernet1_14, params: def_link}
