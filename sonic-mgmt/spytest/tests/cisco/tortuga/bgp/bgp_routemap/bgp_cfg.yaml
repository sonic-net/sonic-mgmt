SD1:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface ip add Ethernet0 10.1.3.1/24
        sudo config interface ip add Loopback0 1.1.1.1/32
      deconfig: |
        sudo config interface ip rem Loopback0 1.1.1.1/32
        sudo config interface ip rem Ethernet0 10.1.3.1/24
        sudo config interface shutdown Ethernet0

    bgp:
      config: |
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp network import-check
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.3.3 remote-as 3003
        neighbor 10.1.3.3 timers 3 10
        address-family ipv4 unicast
        neighbor 10.1.3.3 activate
        exit-address-family
        exit
      deconfig: |
        no router bgp 1001


SD3:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface ip add Ethernet0 10.1.3.3/24
        sudo config interface ip add Loopback0 3.3.3.3/32
      deconfig: |
        sudo config interface ip rem Loopback0 3.3.3.3/32
        sudo config interface ip rem Ethernet0 10.1.3.3/24
        sudo config interface startup Ethernet0

    bgp:
      config: |
        router bgp 3003
        no bgp ebgp-requires-policy
        no bgp network import-check
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.3.1 remote-as 1001
        neighbor 10.1.3.1 timers 3 10
        address-family ipv4 unicast
        neighbor 10.1.3.1 activate
        exit-address-family
        exit
      deconfig: |
        no router bgp 3003
