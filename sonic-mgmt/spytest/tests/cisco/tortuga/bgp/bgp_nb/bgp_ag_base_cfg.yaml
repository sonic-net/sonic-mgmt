spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1
        sudo config interface ip add D1D3P1 10.1.1.1/24
        sudo config interface ip add Loopback0 192.168.1.1/32
        sudo config interface ip add Loopback1 192.168.1.3/32
        sudo config interface ip add Loopback2 192.168.1.4/32
        sudo config interface ip add Loopback3 192.168.2.1/32
        sudo config interface ip add Loopback4 192.168.2.2/32
        sudo config interface ip add Loopback5 192.168.2.3/32
        sudo config interface ip add Loopback6 192.168.3.1/32
        sudo config interface ip add Loopback7 192.168.3.2/32
        sudo config interface ip add Loopback8 192.168.3.3/32
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.1/32
        sudo config interface ip rem Loopback1 192.168.1.3/32
        sudo config interface ip rem Loopback2 192.168.1.4/32
        sudo config interface ip rem Loopback3 192.168.2.1/32
        sudo config interface ip rem Loopback4 192.168.2.2/32
        sudo config interface ip rem Loopback5 192.168.2.3/32
        sudo config interface ip rem Loopback6 192.168.3.1/32
        sudo config interface ip rem Loopback7 192.168.3.2/32
        sudo config interface ip rem Loopback8 192.168.3.3/32
        sudo config interface ip rem D1D3P1 10.1.1.1/24

    bgp:
      config: |
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.2 remote-as 1002
        neighbor 10.1.1.2 update-source 10.1.1.1
        neighbor 10.1.1.2 timers 3 10
        address-family ipv4 unicast
        redistribute connected route-map AG_ROUTE_MAP
        neighbor 10.1.1.2 activate
        exit-address-family
        exit
        ip prefix-list ANY seq 5 permit any
        ip prefix-list ADD_MED seq 5 permit 192.168.3.1/32
        ip prefix-list PREPEND_AS_LIST seq 5 permit 192.168.2.1/32
        ip prefix-list PREPEND_AS_LIST seq 10 permit 192.168.2.2/32
        ip prefix-list PREPEND_AS_LIST seq 15 permit 192.168.2.3/32
        route-map AG_ROUTE_MAP permit 2
        match ip address prefix-list ADD_MED
        set metric 20
        exit
        route-map AG_ROUTE_MAP permit 3
        match ip address prefix-list PREPEND_AS_LIST
        set as-path prepend 400
        exit
        route-map AG_ROUTE_MAP permit 4
        match ip address prefix-list ANY
        exit
        route-map SUP_RM permit 10
        match ip address prefix-list SUP_RM_PREFIX
        exit
        route-map AGG_ROUTE_MAP permit 10
        set metric 10
        ip prefix-list SUP_RM_PREFIX permit 192.168.1.4/32
        ip prefix-list SUP_RM_PREFIX permit 192.168.1.3/32
      deconfig: |
        no router bgp 1001
        no ip prefix-list ANY permit any
        no ip prefix-list ADD_MED permit 192.168.3.1/32
        no ip prefix-list PREPEND_AS_LIST permit 192.168.2.1/32
        no ip prefix-list PREPEND_AS_LIST permit 192.168.2.2/32
        no ip prefix-list PREPEND_AS_LIST permit 192.168.2.3/32
        no ip prefix-list SUP_RM_PREFIX permit 192.168.1.4/32
        no ip prefix-list SUP_RM_PREFIX permit 192.168.1.3/32
        no route-map AG_ROUTE_MAP permit 2
        no route-map AG_ROUTE_MAP permit 3
        no route-map AG_ROUTE_MAP permit 4
        no route-map SUP_RM permit 10
        no route-map AGG_ROUTE_MAP permit 10

leaf0:
    sonic:
      config: |
        sudo config interface startup D3D1P1
        sudo config interface ip add D3D1P1 10.1.1.2/24
        sudo config interface ip add Loopback0 192.168.1.2/32
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.2/32
        sudo config interface ip rem D3D1P1 10.1.1.2/24

    bgp:
      config: |
        router bgp 1002
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.1 remote-as 1001
        neighbor 10.1.1.1 update-source 10.1.1.2
        neighbor 10.1.1.1 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 10.1.1.1 activate
        exit-address-family
        exit
      deconfig: |
        no router bgp 1002
