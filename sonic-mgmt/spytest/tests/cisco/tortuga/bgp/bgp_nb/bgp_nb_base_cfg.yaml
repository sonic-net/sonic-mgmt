         neighbor 2001:db2::2 timers 3 10
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.2 activate
         neighbor 10.1.2.2 activate
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::2 activate
         neighbor 2001:db2::2 activate
         exit-address-family
         exit
         router bgp 100 vrf Vrf02
         bgp router-id 192.168.1.2
         no bgp ebgp-requires-policy
         no bgp default ipv4-unicast
         bgp disable-ebgp-connected-route-check
         bgp bestpath as-path multipath-relax
         neighbor 10.1.1.2 remote-as 202
         neighbor 10.1.1.2 update-source 10.1.1.1
         neighbor 10.1.1.2 timers 3 10
         neighbor 2001:db1::2 remote-as 202
         neighbor 2001:db1::2 timers 3 10
         neighbor 10.1.2.2 remote-as 202
         neighbor 10.1.2.2 update-source 10.1.2.1
         neighbor 10.1.2.2 timers 3 10
         neighbor 2001:db2::2 remote-as 202
         neighbor 2001:db2::2 timers 3 10
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.2 activate
         neighbor 10.1.2.2 activate
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::2 activate
         neighbor 2001:db2::2 activate
         exit-address-family
         exit
         router bgp 100 vrf Vrf03
         bgp router-id 192.168.1.3
         no bgp ebgp-requires-policy
         no bgp default ipv4-unicast
         bgp disable-ebgp-connected-route-check
         bgp bestpath as-path multipath-relax
         neighbor 10.1.1.2 remote-as 203
         neighbor 10.1.1.2 update-source 10.1.1.1
         neighbor 10.1.1.2 timers 3 10
         neighbor 2001:db1::2 remote-as 203
         neighbor 2001:db1::2 timers 3 10
         neighbor 10.1.2.2 remote-as 203
         neighbor 10.1.2.2 local-as 200 no-prepend replace-as
         neighbor 10.1.2.2 update-source 10.1.2.1
         neighbor 10.1.2.2 timers 3 10
         neighbor 2001:db2::2 remote-as 203
         neighbor 2001:db2::2 timers 3 10
         neighbor 2001:db2::2 local-as 200 no-prepend replace-as
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.2 activate
         neighbor 10.1.2.2 activate
         redistribute connected route-map AS_PRE
         neighbor 10.1.2.2 soft-reconfiguration inbound
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::2 activate
         neighbor 2001:db2::2 activate
         neighbor 2001:db2::2 soft-reconfiguration inbound
         exit-address-family
         exit
         route-map AS_PRE permit 10
         set as-path prepend 64514 64515
         end
         exit
      deconfig: |
         no router bgp 100 vrf Vrf01
         no router bgp 100 vrf Vrf02
         no router bgp 100 vrf Vrf03
         no route-map AS_PRE permit 10
         end
         exit
