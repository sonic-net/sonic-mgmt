spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1 
        sudo config interface startup D1D3P2 
        sudo config subinterface add SUB_D1_D3_P1.100 100
        sudo config subinterface add SUB_D1_D3_P1.200 200
        sudo config subinterface add SUB_D1_D3_P1.300 300
        sudo config vrf add Vrf01
        sudo config vrf add Vrf02
        sudo config vrf add Vrf03
        sudo config interface vrf bind SUB_D1_D3_P1.100 Vrf01
        sudo config interface vrf bind SUB_D1_D3_P1.200 Vrf02
        sudo config interface vrf bind SUB_D1_D3_P1.300 Vrf03
        sudo config interface ip add SUB_D1_D3_P1.200 10.1.1.2/30
        sudo config interface ip add SUB_D1_D3_P1.300 10.1.1.2/30
        sudo config interface ip add SUB_D1_D3_P1.100 10.1.1.2/30
        sudo config interface vrf bind Loopback0 Vrf01
        sudo config interface vrf bind Loopback1 Vrf02
        sudo config interface vrf bind Loopback2 Vrf03
        sudo config interface ip add Loopback0 192.168.1.2/32
        sudo config interface ip add Loopback1 192.168.2.2/32
        sudo config interface ip add Loopback2 192.168.3.2/32
        sudo config subinterface add SUB_D1_D3_P2.100 100
        sudo config subinterface add SUB_D1_D3_P2.200 200
        sudo config subinterface add SUB_D1_D3_P2.300 300
        sudo config interface vrf bind SUB_D1_D3_P2.100 Vrf01
        sudo config interface vrf bind SUB_D1_D3_P2.200 Vrf02
        sudo config interface vrf bind SUB_D1_D3_P2.300 Vrf03
        sudo config interface ip add SUB_D1_D3_P2.100 2001:db1::2/64
        sudo config interface ip add SUB_D1_D3_P2.200 2001:db1::2/64
        sudo config interface ip add SUB_D1_D3_P2.300 2001:db1::2/64
      deconfig: |
        sudo config vrf del Vrf01
        sudo config vrf del Vrf02
        sudo config vrf del Vrf03
        sudo config subinterface del SUB_D1_D3_P1.100
        sudo config subinterface del SUB_D1_D3_P1.200
        sudo config subinterface del SUB_D1_D3_P1.300
        sudo config subinterface del SUB_D1_D3_P2.100
        sudo config subinterface del SUB_D1_D3_P2.200
        sudo config subinterface del SUB_D1_D3_P2.300


    bgp:
      config: |
         router bgp 201 vrf Vrf01
         bgp router-id 192.168.1.2
         no bgp ebgp-requires-policy
         no bgp default ipv4-unicast
         bgp disable-ebgp-connected-route-check
         bgp bestpath as-path multipath-relax
         neighbor 10.1.1.1 remote-as 100
         neighbor 10.1.1.1 update-source 10.1.1.2
         neighbor 10.1.1.1 timers 3 10
         neighbor 2001:db1::1 remote-as 100
         neighbor 2001:db1::1 timers 3 10
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.1 activate
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::1 activate
         exit-address-family
         exit
         router bgp 202 vrf Vrf02
         bgp router-id 192.168.2.2
         no bgp ebgp-requires-policy
         no bgp default ipv4-unicast
         bgp disable-ebgp-connected-route-check
         bgp bestpath as-path multipath-relax
         neighbor 10.1.1.1 remote-as 100
         neighbor 10.1.1.1 update-source 10.1.1.2
         neighbor 10.1.1.1 timers 3 10
         neighbor 2001:db1::1 remote-as 100
         neighbor 2001:db1::1 timers 3 10
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.1 activate
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::1 activate
         exit-address-family
         exit
         router bgp 203 vrf Vrf03
         bgp router-id 192.168.3.2
         no bgp ebgp-requires-policy
         no bgp default ipv4-unicast
         bgp disable-ebgp-connected-route-check
         bgp bestpath as-path multipath-relax
         neighbor 10.1.1.1 remote-as 100
         neighbor 10.1.1.1 update-source 10.1.1.2
         neighbor 10.1.1.1 timers 3 10
         neighbor 2001:db1::1 remote-as 100
         neighbor 2001:db1::1 timers 3 10
         address-family ipv4 unicast
         redistribute connected
         neighbor 10.1.1.1 activate
         exit-address-family
         address-family ipv6 unicast
         redistribute connected
         neighbor 2001:db1::1 activate
         exit-address-family
         end
         exit
      deconfig: |
         no router bgp 201 vrf Vrf01
         no router bgp 202 vrf Vrf02
         no router bgp 203 vrf Vrf03
         end
         exit

