leaf0:
    sonic:
      config: |
        sudo config interface breakout D1D2P1 "4x10G(4)" -yf
        sudo config interface startup D1D2P2
        sudo config interface startup D1D2P3
        sudo config interface startup D1D2P4
        sudo config interface startup D1D2P5
        sudo config interface ipv6 disable use-link-local-only D1D2P2
        sudo config interface ipv6 disable use-link-local-only D1D2P3
        sudo config interface ipv6 disable use-link-local-only D1D2P4
        sudo config interface ipv6 disable use-link-local-only D1D2P5
        sudo config subinterface add D1D2P6 100
        sudo config subinterface add D1D2P7 100
        sudo config subinterface add D1D2P8 100
        sudo config subinterface add D1D2P9 100
        sudo config vrf add Vrf10
        sudo config interface vrf bind D1D2P6 Vrf10
        sudo config interface vrf bind D1D2P7 Vrf10
        sudo config interface vrf bind D1D2P8 Vrf10
        sudo config interface vrf bind D1D2P9 Vrf10
        sudo config interface vrf  bind D1T1P1 Vrf10
        sudo config interface ip add D1D2P6 4.4.4.1/24
        sudo config interface ip add D1D2P7 5.5.5.1/24
        sudo config interface ip add D1D2P8 6.6.6.1/24
        sudo config interface ip add D1D2P9 7.7.7.1/24
        sudo config interface ip add D1T1P1 2.2.2.1/24
        sonic-clear counters


      deconfig: |
        sudo config interface vrf unbind D1D2P6
        sudo config interface vrf unbind D1D2P7
        sudo config interface vrf unbind D1D2P8
        sudo config interface vrf unbind D1D2P9
        sudo config interface vrf unbind D1T1P1
        sudo config subinterface del D1D2P6
        sudo config subinterface del D1D2P7
        sudo config subinterface del D1D2P8
        sudo config subinterface del D1D2P9
        sudo config vrf del Vrf10
        sudo config interface breakout  D1D2P1 "1x40G(4)" -yf
        sudo config interface startup D1D2P1

    bgp:
      config: |
        router bgp 65102
        bgp router-id 10.200.200.201
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        router bgp 65102 vrf Vrf10
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1 
        neighbor 4.4.4.2 peer-group TRANSIT
        neighbor 5.5.5.2 peer-group TRANSIT
        neighbor 6.6.6.2 peer-group TRANSIT
        neighbor 7.7.7.2 peer-group TRANSIT
        address-family ipv4 unicast
        neighbor TRANSIT activate	
        redistribute connected
        exit-address-family
        exit

      deconfig: |
        no router bgp 65102
        no router bgp 65102 vrf Vrf10


