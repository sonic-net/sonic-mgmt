leaf1:
    sonic:
      config: |
        sudo config interface startup D4D1P1
        sudo config interface startup D4T1P1
        sudo config interface ip add D4D1P1 12.1.1.2/24
        sudo config interface ip add D4D1P1 12:1:1::2/120
        sudo config interface ip add D4T1P1 11.1.1.1/24
        sudo config interface ip add D4T1P1 11:1:1::1/120
      deconfig: |
        sudo config interface ip rem D4T1P1 11.1.1.1/24
        sudo config interface ip rem D4T1P1 11:1:1::1/120
        sudo config interface ip rem D4D1P1 12.1.1.2/24
        sudo config interface ip rem D4D1P1 12:1:1::2/120
