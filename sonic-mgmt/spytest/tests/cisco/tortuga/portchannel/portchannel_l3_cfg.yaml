spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1
        sudo config interface startup D1D3P2
        sudo config interface startup D1D4P1
        sudo config interface ip add D1D4P1 12.1.1.1/24
        sudo config interface ip add D1D4P1 12:1:1::1/120
      deconfig: |
        sudo config interface ip rem D1D4P1 12.1.1.1/24
        sudo config interface ip rem D1D4P1 12:1:1::1/120
        sudo config interface startup D1D4P1
        sudo config interface startup D1D3P1
        sudo config interface startup D1D3P2
    bgp:
      config: |
        no router bgp
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 100.10.1.2 remote-as 1002
        neighbor 100.10.1.2 timers 3 10
        neighbor 100.10.1.2 timers connect 10
        neighbor 12.1.1.2 remote-as 1003
        neighbor 12.1.1.2 timers 3 10
        neighbor 12.1.1.2 timers connect 10
        neighbor 100:10:1::2 remote-as 1002
        neighbor 100:10:1::2 timers 3 10
        neighbor 100:10:1::2 timers connect 10
        neighbor 12:1:1::2 remote-as 1003
        neighbor 12:1:1::2 timers 3 10
        neighbor 12:1:1::2 timers connect 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 100.10.1.2 activate
        neighbor 12.1.1.2 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 100:10:1::2 activate
        neighbor 100:10:1::2 route-map FROM_BGP_PEER_V6 in
        neighbor 100:10:1::2 route-map TO_BGP_PEER_V6 out
        neighbor 12:1:1::2 activate
        neighbor 12:1:1::2 route-map FROM_BGP_PEER_V6 in
        neighbor 12:1:1::2 route-map TO_BGP_PEER_V6 out
        exit-address-family
        exit
        route-map FROM_BGP_PEER_V6 permit 1
        on-match next
        set ipv6 next-hop prefer-global
        exit
        route-map FROM_BGP_PEER_V6 permit 100
        exit
        route-map TO_BGP_PEER_V6 permit 100
        end
        exit
      deconfig: |
        no router bgp 1001
        end
        exit

