spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1
        sudo config interface startup D1D3P2
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config interface ip add D1D3P1 10.1.1.1/24
        sudo config interface ip add Loopback0 192.168.1.1/32
        sudo config interface ip add D1D3P2 10::1/64
        sudo config interface ip add Loopback1 192::1/128
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.1/32
        sudo config interface ip rem D1D3P1 10.1.1.1/24
        sudo config interface ip rem D1D3P2 10::1/64
        sudo config interface ip rem Loopback1 192::1/128
        sudo config interface ipv6 disable use-link-local-only D1D3P1

    bgp:
      config: |
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.2 remote-as 1002
        neighbor 10.1.1.2 update-source 10.1.1.1
        neighbor 10.1.1.2 timers 3 10
        neighbor 10::2 remote-as 1002
        neighbor 10::2 update-source 10::1
        neighbor 10::2 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 10.1.1.2 activate
        neighbor 10::2 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 10.1.1.2 activate
        neighbor 10::2 activate
        exit-address-family
        end
        exit
      deconfig: |
        no router bgp 1001
        end
        exit

leaf0:
    sonic:
      config: |
        sudo config interface startup D3D1P1
        sudo config interface startup D3D1P2
        sudo config interface startup D3D2P1
        sudo config interface startup D3D2P2
        sudo config vrf add Vrf01
        sudo config interface vrf bind D3D2P1 Vrf01
        sudo config interface vrf bind Loopback1 Vrf01
        sudo config interface vrf bind D3D2P2 Vrf01
        sudo config interface vrf bind Loopback3 Vrf01
        sudo config interface ip add D3D1P1 10.1.1.2/24
        sudo config interface ip add D3D2P1 20.1.1.1/24
        sudo config interface ip add D3D1P2 10::2/24
        sudo config interface ip add D3D2P2 20::1/64
        sudo config interface ip add Loopback0 192.168.1.2/32
        sudo config interface ip add Loopback1 192.168.0.2/32
        sudo config interface ip add Loopback2 192::2/128
        sudo config interface ip add Loopback3 192::1:2/128
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.2/32
        sudo config interface ip rem Loopback1 192.168.0.2/32
        sudo config interface ip rem Loopback2 192::2/128
        sudo config interface ip rem Loopback3 192::1:2/128
        sudo config interface ip rem D3D1P1 10.1.1.2/24
        sudo config interface ip rem D3D2P1 20.1.1.1/24
        sudo config interface ip rem D3D1P2 10::2/24
        sudo config interface ip rem D3D2P2 20::1/64
        sudo config vrf del Vrf01

    bgp:
      config: |
        router bgp 1002
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.1 remote-as 1001
        neighbor 10.1.1.1 update-source 10.1.1.2
        neighbor 10.1.1.1 timers 3 10
        neighbor 10::1 remote-as 1001
        neighbor 10::1 update-source 10::2
        neighbor 10::1 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 10.1.1.1 activate
        neighbor 10::1 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 10.1.1.1 activate
        neighbor 10::1 activate
        exit-address-family
        exit
        router bgp 2002 vrf Vrf01
        no bgp ebgp-requires-policy
        no bgp network import-check
        neighbor 20.1.1.2 remote-as 1003
        neighbor 20.1.1.2 update-source 20.1.1.1
        neighbor 20.1.1.2 timers 3 10
        neighbor 20::2 remote-as 1003
        neighbor 20::2 update-source 20::1
        neighbor 20::2 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family ipv6 unicast
        neighbor 20::2 activate
        redistribute connected
        exit-address-family
        end
        exit
      deconfig: |
        no router bgp 1002
        no router bgp 2002 vrf Vrf01
        end
        exit

spine1:
    sonic:
      config: |
        sudo config interface startup D2D3P1
        sudo config interface startup D2D3P2
        sudo config interface startup D2D4P1
        sudo config vrf add Vrf01
        sudo config vrf add Vrf02
        sudo config interface vrf bind D2D3P1 Vrf01
        sudo config interface vrf bind D2D4P1 Vrf02
        sudo config interface vrf bind D2D3P2 Vrf01
        sudo config interface vrf bind Loopback0 Vrf01
        sudo config interface vrf bind Loopback1 Vrf01
        sudo config interface vrf bind Loopback2 Vrf02
        sudo config interface ip add D2D3P1 20.1.1.2/24
        sudo config interface ip add D2D4P1 30.1.1.1/24
        sudo config interface ip add D2D3P2 20::2/24
        sudo config interface ip add Loopback0 192.168.1.3/32
        sudo config interface ip add Loopback1 192::3/128
