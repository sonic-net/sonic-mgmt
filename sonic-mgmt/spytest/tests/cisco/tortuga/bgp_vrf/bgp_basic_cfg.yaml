        sudo config interface ip rem D2D4P1 30.1.1.1/24
        sudo config interface ip rem D2D3P2 20::2/24
        sudo config vrf del Vrf01
        sudo config vrf del Vrf02

    bgp:
      config: |
        router bgp 1003 vrf Vrf01
        no bgp ebgp-requires-policy
        no bgp network import-check
        neighbor 20.1.1.1 remote-as 2002
        neighbor 20.1.1.1 update-source 20.1.1.2
        neighbor 20.1.1.1 timers 3 10
        neighbor 20::1 remote-as 2002
        neighbor 20::1 update-source 20::2
        neighbor 20::1 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 20::1 activate
        exit-address-family
        router bgp 1004 vrf Vrf02
        no bgp ebgp-requires-policy
        no bgp network import-check
        neighbor 30.1.1.2 remote-as 1004
        neighbor 30.1.1.2 update-source 30.1.1.1
        neighbor 30.1.1.2 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        exit-address-family
        end
        exit
      deconfig: |
        no router bgp 1003 vrf Vrf01
        no router bgp 1004 vrf Vrf02
        end
        exit

