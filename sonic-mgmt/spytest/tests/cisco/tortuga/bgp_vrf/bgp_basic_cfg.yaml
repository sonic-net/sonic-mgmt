CE1:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface startup Ethernet8
        sudo config interface ipv6 enable use-link-local-only Ethernet0
        sudo config interface ip add Ethernet0 10.1.1.1/24
        sudo config interface ip add Loopback0 192.168.1.1/32
        sudo config interface ip add Ethernet8 10::1/64
        sudo config interface ip add Loopback1 192::1/128
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.1/32
        sudo config interface ip rem Ethernet0 10.1.1.1/24
        sudo config interface ip rem Ethernet8 10::1/64
        sudo config interface ip rem Loopback1 192::1/128
        sudo config interface ipv6 disable use-link-local-only Ethernet8
        sudo config interface shutdown Ethernet0
        sudo config interface shutdown Ethernet8

    bgp:
      config: |
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.2 remote-as 1002
        neighbor 10.1.1.2 update-source 10.1.1.1
        neighbor 10.1.1.2 timers 3 10
        neighbor 10::2 remote-as 1002
        neighbor 10::2 update-source 10::1
        neighbor 10::2 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 10.1.1.2 activate
        neighbor 10::2 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 10.1.1.2 activate
        neighbor 10::2 activate
        exit-address-family
        exit
      deconfig: |
        no router bgp 1001

PE1:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface startup Ethernet8
        sudo config interface startup Ethernet16
        sudo config interface startup Ethernet24
        sudo config vrf add Vrf01
        sudo config interface vrf bind Ethernet8 Vrf01
        sudo config interface vrf bind Loopback1 Vrf01
        sudo config interface vrf bind Ethernet24 Vrf01
        sudo config interface vrf bind Loopback3 Vrf01
        sudo config interface ip add Ethernet0 10.1.1.2/24
        sudo config interface ip add Ethernet8 20.1.1.1/24
        sudo config interface ip add Ethernet16 10::2/24
        sudo config interface ip add Ethernet24 20::1/64
        sudo config interface ip add Loopback0 192.168.1.2/32
        sudo config interface ip add Loopback1 192.168.0.2/32
        sudo config interface ip add Loopback2 192::2/128
        sudo config interface ip add Loopback3 192::1:2/128
      deconfig: |
        sudo config interface ip rem Loopback0 192.168.1.2/32
        sudo config interface ip rem Loopback1 192.168.0.2/32
        sudo config interface ip rem Loopback2 192::2/128
        sudo config interface ip rem Loopback3 192::1:2/128
        sudo config interface ip rem Ethernet0 10.1.1.2/24
        sudo config interface ip rem Ethernet8 20.1.1.1/24
        sudo config interface ip rem Ethernet16 10::2/24
        sudo config interface ip rem Ethernet24 20::1/64
        sudo config vrf del Vrf01
        sudo config interface shutdown Ethernet24
        sudo config interface shutdown Ethernet16
        sudo config interface shutdown Ethernet0
        sudo config interface shutdown Ethernet8

    bgp:
      config: |
        router bgp 1002
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 10.1.1.1 remote-as 1001
        neighbor 10.1.1.1 update-source 10.1.1.2
        neighbor 10.1.1.1 timers 3 10
        neighbor 10::1 remote-as 1001
        neighbor 10::1 update-source 10::2
        neighbor 10::1 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 10.1.1.1 activate
        neighbor 10::1 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 10.1.1.1 activate
        neighbor 10::1 activate
        exit-address-family
        exit
        router bgp 2002 vrf Vrf01
        no bgp ebgp-requires-policy
        no bgp network import-check
        neighbor 20.1.1.2 remote-as 1003
        neighbor 20.1.1.2 update-source 20.1.1.1
        neighbor 20.1.1.2 timers 3 10
        neighbor 20::2 remote-as 1003
        neighbor 20::2 update-source 20::1
        neighbor 20::2 timers 3 10
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family ipv6 unicast
        neighbor 20::2 activate
        redistribute connected
        exit-address-family
        exit
      deconfig: |
        no router bgp 1002
        no router bgp 2002 vrf Vrf01

