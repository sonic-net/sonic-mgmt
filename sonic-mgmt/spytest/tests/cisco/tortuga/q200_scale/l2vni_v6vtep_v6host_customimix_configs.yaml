spine1:
    sonic:
      config: |
        sudo config interface ipv6 enable use-link-local-only D1D2P1
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config loopback add Loopback0
        sudo config interface ip add Loopback0 1001:1::1/128
        sudo config interface startup Loopback0
        sudo config interface startup D1D2P1
        sudo config interface startup D1D3P1
      deconfig: |
      
    bgp:
      config: |
        router bgp 65100
        bgp router-id 10.200.200.100
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        #neighbor TRANSIT bfd
        neighbor TRANSIT ebgp-multihop 1
        neighbor D1D2P1 interface peer-group TRANSIT
        neighbor D1D3P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
      deconfig: |
        no router bgp 65100

leaf0:
    sonic:
      config: |
        sudo counterpoll tunnel enable
        sudo config interface ipv6 enable use-link-local-only D2D1P1
        sudo config interface startup D1D2P1
        sudo config loopback add Loopback0
        sudo config interface ip add Loopback0 2001:1::1/128
        sudo config vxlan add VXLAN 2001:1::1
        sudo config vxlan evpn_nvo add NVO VXLAN
        sudo config vlan add 2
        sudo config vxlan map add VXLAN 2 5002
        sudo config vlan member add 2 D2T1P1
      deconfig: |
        sudo config vxlan map del VXLAN 2 5002
        sudo config vxlan evpn_nvo del NVO
        sudo config vxlan del VXLAN
        sudo config vlan member del 2 D2T1P1
        sudo config vlan del 2


    bgp:
      config: |
        router bgp 65102
        bgp router-id 10.200.200.200
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback0
        neighbor TRANSIT peer-group
        #neighbor TRANSIT bfd
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 2001:1::2 peer-group OVERLAY
        neighbor D2D1P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        advertise ipv6 unicast
        exit-address-family
        exit
      deconfig: |
        no router bgp 65102

