spine1:
    sonic:
      config: |
        sudo config interface ipv6 enable use-link-local-only D1D2P1
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config loopback add Loopback0
        sudo config interface ip add Loopback0 10.200.200.100/32
        sudo config interface startup Loopback0
        sudo config interface startup D1D2P1
        sudo config interface startup D1D3P1
      deconfig: |
     
    bgp:
      config: |
        router bgp 65100
        bgp router-id 10.200.200.100
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        #neighbor TRANSIT bfd
        neighbor TRANSIT ebgp-multihop 1
        neighbor D1D2P1 interface peer-group TRANSIT
        neighbor D1D3P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        exit
      deconfig: |
        no router bgp 65100

leaf0:
  sonic:
    config: |
      sudo counterpoll tunnel enable
      sudo config interface ipv6 enable use-link-local-only D2D1P1
      sudo config interface startup D2D1P1
      sudo config loopback add Loopback0
      sudo config interface ip add Loopback0 10.200.200.200/32
      sudo config vxlan add VXLAN 10.200.200.200
      sudo config vxlan evpn_nvo add NVO VXLAN
      sudo config vlan add 2
      sudo config vxlan map add VXLAN 2 5002
      sudo config vlan member add  2 D2T1P1
      sudo config vlan add 3
      sudo config vxlan map add VXLAN 3 5003
      sudo config vlan member add 3 D2T1P1
      sudo config vlan add 4
      sudo config vxlan map add VXLAN 4 5004
      sudo config vlan member add 4 D2T1P1
      sudo config vlan add 5
      sudo config vxlan map add VXLAN 5 5005
      sudo config vlan member add 5 D2T1P1
      sudo config vlan add 6
      sudo config vxlan map add VXLAN 6 5006
      sudo config vlan member add 6 D2T1P1
      sudo config vlan add 7
      sudo config vxlan map add VXLAN 7 5007
      sudo config vlan member add 7 D2T1P1
      sudo config vlan add 8
      sudo config vxlan map add VXLAN 8 5008
      sudo config vlan member add 8 D2T1P1
      sudo config vlan add 9
      sudo config vxlan map add VXLAN 9 5009
      sudo config vlan member add 9 D2T1P1

      sudo config vlan add 1221
      sudo config vrf add Vrf1221
      sudo config interface vrf bind Vlan2 Vrf1221
      sudo config interface vrf bind Vlan3 Vrf1221
      sudo config interface vrf bind Vlan4 Vrf1221
      sudo config interface vrf bind Vlan5 Vrf1221
      sudo config interface vrf bind Vlan6 Vrf1221
      sudo config interface vrf bind Vlan7 Vrf1221
      sudo config interface vrf bind Vlan8 Vrf1221
      sudo config interface vrf bind Vlan9 Vrf1221
      sudo config interface vrf bind Vlan1221 Vrf1221
      sudo config vxlan map add VXLAN 1221 5221
      sudo config vrf add_vrf_vni_map Vrf1221 5221
      sudo config interface ip add Vlan2 2:1::2:1/64
      sudo config interface ip add Vlan3 3:1::2:1/64
      sudo config interface ip add Vlan4 4:1::2:1/64
      sudo config interface ip add Vlan5 5:1::2:1/64
      sudo config interface ip add Vlan6 6:1::2:1/64
      sudo config interface ip add Vlan7 7:1::2:1/64
      sudo config interface ip add Vlan8 8:1::2:1/64
      sudo config interface ip add Vlan9 9:1::2:1/64
    deconfig: |
      sudo config vrf del_vrf_vni_map Vrf1221
      sudo config vxlan map del VXLAN 1221 5221
      sudo config vxlan map del VXLAN 2 5002
      sudo config vxlan map del VXLAN 3 5003
      sudo config vxlan map del VXLAN 4 5004
      sudo config vxlan map del VXLAN 5 5005
      sudo config vxlan map del VXLAN 6 5006
      sudo config vxlan map del VXLAN 7 5007
      sudo config vxlan map del VXLAN 8 5008
      sudo config vxlan map del VXLAN 9 5009
      sudo config interface vrf unbind Vlan2
      sudo config interface vrf unbind Vlan3
      sudo config interface vrf unbind Vlan4
      sudo config interface vrf unbind Vlan5
      sudo config interface vrf unbind Vlan6
      sudo config interface vrf unbind Vlan7
      sudo config interface vrf unbind Vlan8
      sudo config interface vrf unbind Vlan9
      sudo config interface vrf unbind Vlan1221
      sudo config vrf del Vrf1221
      sudo config vlan del 1221
      sudo config vxlan evpn_nvo del NVO
      sudo config vxlan del VXLAN
      sudo config vlan member del 2 D2T1P1
      sudo config vlan member del 3 D2T1P1
      sudo config vlan member del 4 D2T1P1
      sudo config vlan member del 5 D2T1P1
      sudo config vlan member del 6 D2T1P1
      sudo config vlan member del 7 D2T1P1
      sudo config vlan member del 8 D2T1P1
      sudo config vlan member del 9 D2T1P1

      sudo config vlan del 2
      sudo config vlan del 3 
      sudo config vlan del 4 
      sudo config vlan del 5 
      sudo config vlan del 6 
      sudo config vlan del 7 
      sudo config vlan del 8 
      sudo config vlan del 9 
  bgp:
    config: |
      router bgp 65102
      bgp router-id 10.200.200.200
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast
      bgp disable-ebgp-connected-route-check
      bgp bestpath as-path multipath-relax
      neighbor OVERLAY peer-group
      neighbor OVERLAY remote-as external
      neighbor OVERLAY disable-connected-check
      neighbor OVERLAY ebgp-multihop 255
      neighbor OVERLAY update-source Loopback0
      neighbor TRANSIT peer-group
      #neighbor TRANSIT bfd
      neighbor TRANSIT remote-as external
      neighbor TRANSIT ebgp-multihop 1
      neighbor 10.200.200.201 peer-group OVERLAY
      neighbor D2D1P1 interface peer-group TRANSIT
      address-family ipv4 unicast
      redistribute connected
      neighbor TRANSIT activate
      exit-address-family
      address-family ipv6 unicast
      redistribute connected
      neighbor TRANSIT activate
      exit-address-family
      address-family l2vpn evpn
      neighbor OVERLAY activate
      advertise-all-vni
      advertise ipv4 unicast
      advertise ipv6 unicast
      exit-address-family
      exit
      router bgp 65102 vrf Vrf1221
      address-family ipv4 unicast
      redistribute connected
      exit-address-family
      router bgp 65102 vrf Vrf1221
      address-family ipv6 unicast
      redistribute connected
      exit-address-family
      address-family l2vpn evpn
      advertise ipv4 unicast
      advertise ipv6 unicast
      exit-address-family
      exit
      vrf Vrf1221
      vni 5221
      exit
    deconfig: |
      vrf Vrf1221
      no vni 5221
      exit
      no router bgp 65102 vrf Vrf1221
      no router bgp 65102
      exit
