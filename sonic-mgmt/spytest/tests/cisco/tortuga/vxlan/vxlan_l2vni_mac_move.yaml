leaf0:
    sonic:
      config: |
        sudo config interface startup D3D1P1
        sudo config interface startup D3D2P1
        sudo config interface ipv6 enable use-link-local-only D3D1P1
        sudo config interface ipv6 enable use-link-local-only D3D2P1
        sudo config interface ipv6 disable use-link-local-only D3T1P1
        sudo config interface ipv6 disable use-link-local-only D3T1P2
        sudo config interface startup D3T1P1
        sudo config interface startup D3T1P2
        sudo config interface ip add Loopback27 10.200.200.200/32
        sudo config vlan add 3
        sudo config vlan member add -u 3 D3T1P2
        sudo config vlan member add -u 3 D3T1P1
        sudo config vxlan add VXLAN 10.200.200.200
        sudo config vxlan evpn_nvo add NVO VXLAN
        sudo config vxlan map add VXLAN 3 5003
        sudo config interface ip add Vlan3 200.200.200.1/24
        sudo config static-anycast-gateway mac_address add 00:11:22:33:44:55
        sudo config vlan static-anycast-gateway enable 3

      deconfig: |
        sudo config vlan static-anycast-gateway disable 3
        sudo config static-anycast-gateway mac_address del 
        sudo config interface ip rem Vlan3 200.200.200.1/24
        sudo config vxlan map del VXLAN 3 5003
        sudo config vxlan evpn_nvo del NVO
        sudo config vxlan del VXLAN
        sudo config vlan member del 3 D3T1P2
        sudo config vlan member del 3 D3T1P1
        sudo config vlan del 3
        sudo config interface ip rem Loopback27 10.200.200.200/32
        sudo config interface ipv6 disable use-link-local-only D3D1P1
        sudo config interface ipv6 disable use-link-local-only D3D2P1
        sudo config interface shutdown D3D1P1
        sudo config interface shutdown D3D2P1
 
    bgp:
      config: |
        router bgp 2363073663
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 10.200.200.201 peer-group OVERLAY
        neighbor D3D1P1 interface peer-group TRANSIT
        neighbor D3D2P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        exit-address-family
        exit

      deconfig: |
        no router bgp 2363073663 
        exit

