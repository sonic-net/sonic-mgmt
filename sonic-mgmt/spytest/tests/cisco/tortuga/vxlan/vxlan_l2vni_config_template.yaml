spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1
        sudo config interface startup D1D4P1
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config interface ipv6 enable use-link-local-only D1D4P1
        sudo config interface ip add Loopback27 10.200.200.210/32
        sudo config interface startup Loopback27
      deconfig: |
        sudo config interface ip rem Loopback27 10.200.200.210/32
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D3P1 

    bgp:
      config: |
        router bgp 2363070745
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 10.200.200.200 peer-group OVERLAY
        neighbor 10.200.200.201 peer-group OVERLAY
        neighbor 10.200.200.202 peer-group OVERLAY
        neighbor D1D3P1 interface peer-group TRANSIT
        neighbor D1D4P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        exit-address-family
        end
        exit

      deconfig: |
        no router bgp 2363070745
        end
        exit


