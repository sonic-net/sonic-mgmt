leaf0:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface startup Ethernet16
        sudo config interface startup Ethernet32
        sudo config interface ipv6 enable use-link-local-only Ethernet0
        sudo config interface ipv6 enable use-link-local-only Ethernet16
        sudo config interface ip add Loopback27 fd27::280:10f1:25f/128
        sudo config vxlan add Vtep fd27::280:10f1:25f
        sudo config vxlan evpn_nvo add NVO Vtep
        sudo config vlan add 100
        sudo config interface ipv6 disable use-link-local-only Ethernet32
        sudo config vlan member add -u 100 Ethernet32
        sudo config vxlan map add Vtep 100 2727
      deconfig: |
        sudo config vxlan map del Vtep 100 2727
        sudo config vlan member del 100 Ethernet32
        sudo config vlan del 100
        sudo config vxlan evpn_nvo del NVO
        sudo config vxlan del Vtep
        sudo config interface ip rem Loopback27 fd27::280:10f1:25f/128
        sudo config interface ipv6 disable use-link-local-only Ethernet32
