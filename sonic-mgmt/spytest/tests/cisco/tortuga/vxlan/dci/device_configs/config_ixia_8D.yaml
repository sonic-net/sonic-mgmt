dc1gw1:
    pre-sonic-bgp:
      config: |
        evpn mh redirect-off
        end
        exit

      deconfig: |
        no evpn mh redirect-off
        end
        exit

    sonic:
      config: |
        swssloglevel -l INFO -c orchagent
        swssloglevel -l INFO -c fdbsyncd
        sudo config interface ipv6 enable use-link-local-only D1D5P1
        sudo config interface ipv6 enable use-link-local-only D1D5P2
        sudo config interface ipv6 enable use-link-local-only D1D6P1
        sudo config interface ipv6 enable use-link-local-only D1D6P2
        sudo config interface startup D1D3P1
        sudo config interface startup D1D3P2
        sudo config interface startup D1D4P1
        sudo config interface startup D1D4P2
        sudo config interface startup D1D13P1
        sudo config interface ip add D1D3P1 51.53.1.51/24
        sudo config interface ip add D1D3P2 51.53.2.51/24
        sudo config interface ip add D1D4P1 51.54.1.51/24
        sudo config interface ip add D1D4P2 51.54.2.51/24
        sudo config interface ip add Loopback0 fd27::233:d0c6:fed1/128
        sudo config interface ip add Loopback1 10.10.10.10/32
        sudo config interface ip add Loopback10 fd27::233:d0c6:feda/128
        sudo config interface ip add Loopback11 101.101.101.101/32
        sudo config vlan add 10
        sudo config vlan add 20
        sudo config vlan add 30
        sudo config vlan add 40
        sudo config vlan add 50
        sudo config vlan add 60
        sudo config vlan add 70
        sudo config vlan add 80
        sudo config vlan add 90
        sudo config vlan add 99
        sudo config vxlan add vxlan-local fd27::233:d0c6:feda
        sudo config vxlan evpn_nvo add NVO-LOCAL vxlan-local
        sudo config vxlan map add vxlan-local 10 5010
        sudo config vxlan map add vxlan-local 20 5020
        sudo config vxlan map add vxlan-local 30 5030
        sudo config vxlan map add vxlan-local 40 5040
        sudo config vxlan map add vxlan-local 50 5050
        sudo config vxlan map add vxlan-local 60 5060
        sudo config vxlan map add vxlan-local 70 5070
        sudo config vxlan map add vxlan-local 80 5080
        sudo config vxlan map add vxlan-local 90 5090
        sudo config vxlan map add vxlan-local 99 5099
        sudo config vxlan add vxlan-remote 101.101.101.101
        sudo config vxlan evpn_nvo add NVO-REMOTE vxlan-remote
        sudo config vxlan map add vxlan-remote 10 5011
        sudo config vxlan map add vxlan-remote 20 5021
        sudo config vxlan map add vxlan-remote 30 5031
        sudo config vxlan map add vxlan-remote 40 5041
        sudo config vxlan map add vxlan-remote 50 5051
        sudo config vxlan map add vxlan-remote 60 5061
        sudo config vxlan map add vxlan-remote 70 5071
        sudo config vxlan map add vxlan-remote 80 5081
        sudo config vxlan map add vxlan-remote 90 5091
        sudo config vxlan map add vxlan-remote 99 5100
        sudo config interface ip add D1D13P1 10.212.3.10/24 
        sudo counterpoll tunnel enable
        sudo counterpoll tunnel interval 2000

      deconfig: |
        sudo config vxlan map del vxlan-remote 10 5011
        sudo config vxlan map del vxlan-remote 20 5021
        sudo config vxlan map del vxlan-remote 30 5031
        sudo config vxlan map del vxlan-remote 40 5041
        sudo config vxlan map del vxlan-remote 50 5051
        sudo config vxlan map del vxlan-remote 60 5061
        sudo config vxlan map del vxlan-remote 70 5071
        sudo config vxlan map del vxlan-remote 80 5081
        sudo config vxlan map del vxlan-remote 90 5091
        sudo config vxlan map del vxlan-remote 99 5100
        sudo config vxlan evpn_nvo del NVO-REMOTE
        sudo config vxlan del vxlan-remote
        sudo config vxlan map del vxlan-local 10 5010
        sudo config vxlan map del vxlan-local 20 5020
        sudo config vxlan map del vxlan-local 30 5030
        sudo config vxlan map del vxlan-local 40 5040
        sudo config vxlan map del vxlan-local 50 5050
        sudo config vxlan map del vxlan-local 60 5060
        sudo config vxlan map del vxlan-local 70 5070
        sudo config vxlan map del vxlan-local 80 5080
        sudo config vxlan map del vxlan-local 90 5090
        sudo config vxlan map del vxlan-local 99 5099
        sudo config vxlan evpn_nvo del NVO-LOCAL
        sudo config vxlan del vxlan-local
        sudo config vlan del 10
        sudo config vlan del 20
        sudo config vlan del 30
        sudo config vlan del 40
        sudo config vlan del 50
        sudo config vlan del 60
        sudo config vlan del 70
        sudo config vlan del 80
        sudo config vlan del 90
        sudo config vlan del 99
