dc1gw1:
    pre-sonic-bgp:
      config: |
        evpn mh redirect-off
        end
        exit

      deconfig: |
        no evpn mh redirect-off
        end
        exit

    sonic:
      config: |
        swssloglevel -l INFO -c orchagent
        swssloglevel -l INFO -c fdbsyncd
        sudo config interface ipv6 enable use-link-local-only D1D5P1
        sudo config interface ipv6 enable use-link-local-only D1D5P2
        sudo config interface ipv6 enable use-link-local-only D1D6P1
        sudo config interface ipv6 enable use-link-local-only D1D6P2
        sudo config interface startup D1D3P1
        sudo config interface startup D1D3P2
        sudo config interface startup D1D4P1
        sudo config interface startup D1D4P2
        sudo config interface ip add D1D3P1 51.53.1.51/24
        sudo config interface ip add D1D3P2 51.53.2.51/24
        sudo config interface ip add D1D4P1 51.54.1.51/24
        sudo config interface ip add D1D4P2 51.54.2.51/24
        sudo config interface ip add Loopback0 fd27::233:d0c6:fed1/128
        sudo config interface ip add Loopback1 10.10.10.10/32
        sudo config interface ip add Loopback10 fd27::233:d0c6:feda/128
        sudo config interface ip add Loopback11 101.101.101.101/32
        sudo config vlan add 10
        sudo config vlan add 20
        sudo config vxlan add vxlan-local fd27::233:d0c6:feda
        sudo config vxlan evpn_nvo add NVO-LOCAL vxlan-local
        sudo config vxlan map add vxlan-local 10 5010
        sudo config vxlan map add vxlan-local 20 5020
        sudo config vxlan add vxlan-remote 101.101.101.101
        sudo config vxlan evpn_nvo add NVO-REMOTE vxlan-remote
        sudo config vxlan map add vxlan-remote 10 5011
        sudo config vxlan map add vxlan-remote 20 5021
        sudo counterpoll tunnel enable
        sudo counterpoll tunnel interval 2000

      deconfig: |
        sudo config vxlan map del vxlan-remote 10 5011
        sudo config vxlan map del vxlan-remote 20 5021
        sudo config vxlan evpn_nvo del NVO-REMOTE
        sudo config vxlan del vxlan-remote
        sudo config vxlan map del vxlan-local 10 5010
        sudo config vxlan map del vxlan-local 20 5020
        sudo config vxlan evpn_nvo del NVO-LOCAL
        sudo config vxlan del vxlan-local
        sudo config vlan del 10
        sudo config vlan del 20
        sudo config interface ip rem Loopback11 101.101.101.101/32
        sudo config interface ip rem Loopback10 fd27::233:d0c6:feda/128
        sudo config interface ip rem Loopback1 10.10.10.10/32
        sudo config interface ip rem Loopback0 fd27::233:d0c6:fed1/128
        sudo config interface ip rem D1D4P2 51.54.2.51/24
        sudo config interface ip rem D1D4P1 51.54.1.51/24
        sudo config interface ip rem D1D3P2 51.53.2.51/24
        sudo config interface ip rem D1D3P1 51.53.1.51/24
        sudo config interface ipv6 disable use-link-local-only D1D6P2
        sudo config interface ipv6 disable use-link-local-only D1D6P1
        sudo config interface ipv6 disable use-link-local-only D1D5P2
        sudo config interface ipv6 disable use-link-local-only D1D5P1

    bgp:
      config: |
        debug zebra kernel
        debug zebra kernel msgdump
        debug zebra rib
        debug zebra rib detailed
        debug zebra vxlan
        debug zebra evpn mh mac
        debug bgp evpn mh route
        debug bgp evpn mh es
        debug bgp zebra
        debug zebra evpn mh neigh
        debug zebra dplane detailed
        debug bgp evpn dci 
        log stdout
        log syslog
        router bgp 65001
        timers bgp 10 30
        bgp router-id 100.100.100.1
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT_DC peer-group
        neighbor TRANSIT_DC remote-as external
        neighbor TRANSIT_DC ebgp-multihop 1
        neighbor TRANSIT_WAN peer-group
        neighbor TRANSIT_WAN remote-as external
        neighbor TRANSIT_WAN ebgp-multihop 1
        neighbor OVERLAY_DC peer-group
        neighbor OVERLAY_DC remote-as external
        neighbor OVERLAY_DC disable-connected-check
        neighbor OVERLAY_DC ebgp-multihop 255
        neighbor OVERLAY_DC update-source Loopback0
        neighbor OVERLAY_DC domain vxlan-local
        neighbor OVERLAY_DC reoriginate vxlan-remote
        neighbor OVERLAY_WAN peer-group
        neighbor OVERLAY_WAN remote-as external
        neighbor OVERLAY_WAN disable-connected-check
        neighbor OVERLAY_WAN ebgp-multihop 255
        neighbor OVERLAY_WAN update-source Loopback1
        neighbor OVERLAY_WAN domain vxlan-remote
        neighbor OVERLAY_WAN reoriginate vxlan-local
        neighbor fd27::233:d0c6:fed5 peer-group OVERLAY_DC
        neighbor fd27::233:d0c6:fed5 description "dc1-leaf1-sd5-evpn"
        neighbor fd27::233:d0c6:fed6 peer-group OVERLAY_DC
        neighbor fd27::233:d0c6:fed6 description "dc1-leaf2-sd6-evpn"
        neighbor 30.30.30.30 peer-group OVERLAY_WAN
        neighbor 30.30.30.30 description "dc2-gw1-evpn-sd3"
        neighbor 40.40.40.40 peer-group OVERLAY_WAN
        neighbor 40.40.40.40 description "dc3-gw1-evpn-sd4"
        neighbor D1D5P1 interface peer-group TRANSIT_DC
        neighbor D1D5P1 description "dc1-leaf1-sd5-1_1"
        neighbor D1D5P2 interface peer-group TRANSIT_DC
        neighbor D1D5P2 description "dc1-leaf1-sd5-1_2"
        neighbor D1D6P1 interface peer-group TRANSIT_DC
        neighbor D1D6P1 description "dc1-leaf2-sd6-1_5"
        neighbor D1D6P2 interface peer-group TRANSIT_DC
        neighbor D1D6P2 description "dc1-leaf2-sd6-1_6"
        neighbor 51.53.1.53 peer-group TRANSIT_WAN
        neighbor 51.53.1.53 description "dc2-gw1-sd3-1_8"
        neighbor 51.53.2.53 peer-group TRANSIT_WAN
        neighbor 51.53.2.53 description "dc2-gw1-sd3-1_9"
        neighbor 51.54.1.54 peer-group TRANSIT_WAN
        neighbor 51.54.1.54 description "dc3-gw1-sd4-1_10"
        neighbor 51.54.2.54 peer-group TRANSIT_WAN
        neighbor 51.54.2.54 description "dc3-gw1-sd4-1_11"
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT_DC activate
        neighbor TRANSIT_WAN activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT_DC activate
        exit-address-family
        address-family l2vpn evpn
        no use-es-l3nhg
        neighbor OVERLAY_DC activate
        neighbor OVERLAY_WAN activate
        advertise-all-vni
        advertise ipv4 unicast
        advertise ipv6 unicast
        exit-address-family
        exit

      deconfig: |
        no router bgp 65001
        end
        exit

