spine0:
    sonic:
      config: |
        swssloglevel -l INFO -c bfdsyncd
        sudo config interface startup D1D3P1 
        sudo config interface startup D1D3P2 
        sudo config interface startup D1D4P1
        sudo config interface startup D1D4P2
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config interface ipv6 enable use-link-local-only D1D3P2
        sudo config interface ipv6 enable use-link-local-only D1D4P1 
        sudo config interface ipv6 enable use-link-local-only D1D4P2 

      deconfig: |
        sudo config interface ipv6 disable use-link-local-only D1D3P1 
        sudo config interface ipv6 disable use-link-local-only D1D3P2 
        sudo config interface ipv6 disable use-link-local-only D1D4P1 
        sudo config interface ipv6 disable use-link-local-only D1D4P2 

    bgp:
      config: |
        log syslog debugging
        debug bfd distributed
        debug bfd network
        debug bfd peer
        debug bfd zebra
        debug bgp bfd
        debug bgp neighbor-events
        no router bgp
        router bgp 65200
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor TRANSIT bfd
        neighbor TRANSIT bfd disable-strict-mode
        neighbor D1D3P1 interface peer-group TRANSIT
        neighbor D1D3P2 interface peer-group TRANSIT
        neighbor D1D4P1 interface peer-group TRANSIT
        neighbor D1D4P2 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        exit

      deconfig: |
        log syslog informational
        no router bgp 65200
        exit


