      sudo config interface ip rem D3D1P4 2620:149:200:44d6::891/126
      sudo config interface ip rem D3D2P1 3620:149:200:44d6::7f1/126
      sudo config interface ip rem D3D2P2 3620:149:200:44d6::801/126
      sudo config interface ip rem D3D2P3 3620:149:200:44d6::881/126
      sudo config interface ip rem D3D2P4 3620:149:200:44d6::891/126
      sudo config interface ip rem D3D8P1 7620:149:200:c7::1717/126
      sudo config interface ip rem D3D9P1 6620:149:200:c7::622/126
      sudo config interface ip rem D3D5P1 4620:149:200:44d6::801/126
      sudo config interface ip rem D3D6P1 5620:149:200:c7::1722/126
      sudo config interface ip rem D3D7P1 2223:1:0:1::2/64
      sudo config interface ip rem D3D7P1 23.1.0.2/24
      sudo config interface ip rem Loopback0 5.5.5.5/32
      sudo config interface ip rem Loopback0 3002::5/128

  bgp:
    config: |
      ipv6 route 3002::/64 Loopback0
      router bgp 4206760186
      bgp router-id 5.5.5.5
      bgp log-neighbor-changes
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast
      bgp bestpath as-path multipath-relax
      timers bgp 120 360
      neighbor BG-PEERS peer-group
      neighbor BG-PEERS remote-as external
      neighbor BG-PEERS capability extended-nexthop
      neighbor IX_VTEP peer-group
      neighbor IX_VTEP remote-as external
      neighbor IX_VTEP timers connect 90
      neighbor IX_VTEP capability extended-nexthop
      neighbor PEER_V4 peer-group
      neighbor PEER_V6 peer-group
      neighbor PEER_V6 bfd
      neighbor PEER_V6 bfd profile BFDPROF
      neighbor PEER_V6 timers connect 90
      neighbor PEER_V6 capability extended-nexthop
      neighbor 6620:149:200:c7::621 peer-group BG-PEERS
      neighbor 7620:149:200:c7::1716 peer-group BG-PEERS
      neighbor 2223:1:0:1::1 peer-group IX_VTEP
      neighbor 2620:149:200:44d6::7f2 remote-as 650001
      neighbor 2620:149:200:44d6::7f2 peer-group PEER_V6
      neighbor 2620:149:200:44d6::7f2 description leaf0-setup22
      neighbor 2620:149:200:44d6::802 remote-as 650001
      neighbor 2620:149:200:44d6::802 peer-group PEER_V6
      neighbor 2620:149:200:44d6::802 description leaf0-setup22
      neighbor 2620:149:200:44d6::882 remote-as 650001
      neighbor 2620:149:200:44d6::882 peer-group PEER_V6
      neighbor 2620:149:200:44d6::882 description leaf0-setup22
      neighbor 2620:149:200:44d6::892 remote-as 650001
      neighbor 2620:149:200:44d6::892 peer-group PEER_V6
      neighbor 2620:149:200:44d6::892 description leaf0-setup22
      neighbor 3620:149:200:44d6::7f2 remote-as 650002
      neighbor 3620:149:200:44d6::7f2 peer-group PEER_V6
      neighbor 3620:149:200:44d6::7f2 description leaf1-setup2
      neighbor 3620:149:200:44d6::802 remote-as 650002
      neighbor 3620:149:200:44d6::802 peer-group PEER_V6
      neighbor 3620:149:200:44d6::802 description leaf1-setup2
      neighbor 3620:149:200:44d6::882 remote-as 650002
      neighbor 3620:149:200:44d6::882 peer-group PEER_V6
      neighbor 3620:149:200:44d6::882 description leaf1-setup2
      neighbor 3620:149:200:44d6::892 remote-as 650002
      neighbor 3620:149:200:44d6::892 peer-group PEER_V6
      neighbor 3620:149:200:44d6::892 description leaf1-setup2
      neighbor 4620:149:200:44d6::802 remote-as 4206346017
      neighbor 4620:149:200:44d6::802 capability extended-nexthop
      neighbor 5620:149:200:c7::1721 remote-as 4206346017
      neighbor 5620:149:200:c7::1721 capability extended-nexthop
      !
      address-family ipv4 unicast
        network 5.5.5.5/32
        network 172.16.1.0/24
        redistribute connected
        redistribute static
        neighbor BG-PEERS activate
        neighbor BG-PEERS route-map RECEIVE-EDGE-ROUTES-V6 in
        neighbor BG-PEERS route-map SEND-EDGE-ROUTES-V6 out
        neighbor IX_VTEP activate
        neighbor IX_VTEP soft-reconfiguration inbound
        neighbor IX_VTEP route-map RECEIVE_RS_ROUTES in
        neighbor PEER_V6 activate
        neighbor PEER_V6 soft-reconfiguration inbound
        neighbor PEER_V6 route-map RECEIVE-EDGE-ROUTES-V6 in
        neighbor PEER_V6 route-map SEND-EDGE-ROUTES-V6 out
        neighbor 2620:149:200:44d6::7f2 soft-reconfiguration inbound
        neighbor 2620:149:200:44d6::802 soft-reconfiguration inbound
        neighbor 4620:149:200:44d6::802 activate
        neighbor 4620:149:200:44d6::802 soft-reconfiguration inbound
        neighbor 4620:149:200:44d6::802 route-map RECEIVE_RS_ROUTES in
        neighbor 4620:149:200:44d6::802 route-map SEND_RS_ROUTES out
        neighbor 5620:149:200:c7::1721 activate
        neighbor 5620:149:200:c7::1721 soft-reconfiguration inbound
        neighbor 5620:149:200:c7::1721 route-map RECEIVE_RS_ROUTES in
        neighbor 5620:149:200:c7::1721 route-map SEND_RS_ROUTES out
        maximum-paths 64
      exit-address-family
      !
      address-family ipv6 unicast
        network 3000::/120
        network 3002::/64
        redistribute connected route-map REDIST-MAP
        neighbor BG-PEERS activate
        neighbor BG-PEERS route-map RECEIVE-EDGE-ROUTES-V6 in
        neighbor BG-PEERS route-map SEND-EDGE-ROUTES-V6 out
        neighbor IX_VTEP activate
        neighbor IX_VTEP soft-reconfiguration inbound
        neighbor PEER_V6 activate
        neighbor PEER_V6 default-originate route-map DEFAULT-ORIGINATE
        neighbor PEER_V6 soft-reconfiguration inbound
        neighbor PEER_V6 route-map RECEIVE-EDGE-ROUTES-V6 in
        neighbor PEER_V6 route-map SEND-EDGE-ROUTES-V6 out
        neighbor 2620:149:200:44d6::7f2 soft-reconfiguration inbound
        neighbor 2620:149:200:44d6::802 soft-reconfiguration inbound
        neighbor 4620:149:200:44d6::802 activate
        neighbor 4620:149:200:44d6::802 soft-reconfiguration inbound
        neighbor 4620:149:200:44d6::802 route-map RECEIVE_RS_ROUTES in
        neighbor 4620:149:200:44d6::802 route-map SEND_RS_ROUTES out
        neighbor 5620:149:200:c7::1721 activate
        neighbor 5620:149:200:c7::1721 soft-reconfiguration inbound
        neighbor 5620:149:200:c7::1721 route-map RECEIVE_RS_ROUTES in
        neighbor 5620:149:200:c7::1721 route-map SEND_RS_ROUTES out
        maximum-paths 64
      exit-address-family
      exit
      !
      ip prefix-list PL_LoopbackV4 seq 5 permit 5.5.5.5/32
      ip prefix-list LOCAL_VLAN_IPV4_PREFIX seq 5 permit 172.16.1.0/24
      ip prefix-list DEFAULT-ROUTE seq 10 permit 0.0.0.0/0
      ip prefix-list EDGE-LB-AGG-ROUTES seq 10 permit 10.8.16.128/25
      ip prefix-list EDGE-LB-ROUTES seq 10 permit 10.8.16.128/25 le 32
      ip prefix-list RIF-LB-ROUTES seq 10 permit 10.8.64.0/23 le 32
      !
      ipv6 prefix-list PL_LoopbackV6 seq 5 permit 3002::/64
      ipv6 prefix-list LOCAL_VLAN_IPV6_PREFIX seq 10 permit 3000::/120
      ipv6 prefix-list DEFAULT-ROUTE-V6 seq 10 permit ::/0
      ipv6 prefix-list DIF-P2P-RIF-ROUTES-V6 seq 10 permit 2620:149:200:3a1::/64 le 128
      ipv6 prefix-list EDGE-LB-AGG-ROUTES-V6 seq 10 permit 2620:149:200:351::/64
      ipv6 prefix-list EDGE-LB-ROUTES-V6 seq 10 permit 2620:149:200:351::/64 le 128
      ipv6 prefix-list RIF-LB-ROUTES-V6 seq 10 permit 2620:149:200:321::/64 le 128
      ipv6 prefix-list RIF-P2P-EDGE-AGG-ROUTES-V6 seq 10 permit 2620:149:200:3d2::/64
      ipv6 prefix-list RIF-P2P-EDGE-ROUTES-V6 seq 10 permit 2620:149:200:3d2::/64 le 128
      !
      bgp community-list expanded COMM-DC-P2P-LB-ROUTES seq 5 permit 10422:[0-9][0-9]100$
      bgp community-list expanded COMM-DC-P2P-LB-ROUTES-AGG seq 5 permit ^10241:[0-9][0-9]111$
      bgp community-list expanded COMM-EDGE-HOST-ROUTES seq 5 permit ^10422:1[56][24][0-9][0-9]$
      bgp community-list expanded COMM-EDGE-HOST-ROUTES seq 10 permit ^10422:1[78][24][0-9][0-9]$
      bgp community-list expanded COMM-HOST-ROUTES seq 5 permit ^10422:162[0-9][0-9]$
      bgp community-list expanded COMM-KB-SERVICE-ROUTES seq 5 permit ^10422:192[0-9][0-9]$
      bgp community-list standard allow_list_default_community seq 5 permit no-export
      bgp community-list standard allow_list_default_community seq 10 permit 5060:12345
      bgp community-list standard gshut seq 5 permit graceful-shutdown
      !
      route-map RM_SET_SRC6 permit 10
      set src 3002::5
      exit
      !
      route-map RM_SET_SRC permit 10
      set src 5.5.5.5
      exit
      !
      route-map ALLOW_LIST_DEPLOYMENT_ID_0_V4 permit 65535
      set community 5060:12345 additive
      exit
      !
      route-map ALLOW_LIST_DEPLOYMENT_ID_0_V6 permit 65535
      set community 5060:12345 additive
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 permit 5
      on-match next
      set ipv6 next-hop prefer-global
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 deny 10
      match ip address prefix-list DEFAULT-ROUTE
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 deny 20
      match ipv6 address prefix-list DEFAULT-ROUTE-V6
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 permit 30
      match community COMM-EDGE-HOST-ROUTES
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 permit 40
      match community COMM-DC-P2P-LB-ROUTES
      exit
      !
      route-map RECEIVE-EDGE-ROUTES-V6 deny 100
      exit
      !
      route-map DEFAULT-ORIGINATE permit 10
      set community 10422:16250 additive
      exit
      !
      route-map GR_TEST_AS permit 10
      set as-path prepend 50000
      exit
      !
      route-map GR_TEST_AS_SEC permit 10
      set as-path prepend 60000 50000
      exit
      !
      route-map REDIST-MAP permit 10
      set community 10422:16250 additive
      exit
      !
      route-map RECEIVE_RS_ROUTES permit 10
      on-match next
      set ipv6 next-hop prefer-global
      exit
      !
      route-map RECEIVE_RS_ROUTES permit 20
      exit
      !
      route-map SEND_RS_ROUTES permit 10
      on-match next
      set ipv6 next-hop prefer-global
      exit
      !
      route-map SEND_RS_ROUTES permit 20
      exit
      !
      route-map SEND-EDGE-ROUTES-V6 permit 10
      match ip address prefix-list DEFAULT-ROUTE
      exit
      !
      route-map SEND-EDGE-ROUTES-V6 permit 50
      match ipv6 address prefix-list RIF-P2P-EDGE-ROUTES-V6
      exit
      !
      route-map SEND-EDGE-ROUTES-V6 permit 60
      match community COMM-EDGE-HOST-ROUTES
      exit
      !
      route-map SEND-EDGE-ROUTES-V6 permit 70
      set community 10422:16250 additive
      exit
      !
      route-map SEND-EDGE-ROUTES-V6 deny 100
      exit
      !
      ip nht resolve-via-default
      !
      ipv6 nht resolve-via-default
      !
      ip protocol bgp route-map RM_SET_SRC
      !
      ipv6 protocol bgp route-map RM_SET_SRC6
      !
      bfd
      profile BFDPROF
        transmit-interval 250
        receive-interval 250
      exit
      !
      exit
      !
      end
    deconfig: |
      no router bgp 4206760186
      end
      exit

