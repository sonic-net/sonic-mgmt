spine0:
    sonic:
      config: |
        sudo config interface startup Ethernet0
        sudo config interface startup Ethernet28
        sudo config interface ipv6 enable use-link-local-only Ethernet0
        sudo config interface ipv6 enable use-link-local-only Ethernet28
        sudo config interface ip add Ethernet0 11.11.11.1/24
        sudo config interface ip add Ethernet28 11.11.12.1/24
        sudo config loopback add Loopback27
        sudo config interface ip add Loopback27 2001:db8:1::1/128
        sudo config interface startup Loopback27
      deconfig: |
        sudo config interface ip rem Loopback27 2001:db8:1::1/128
        sudo config interface ip rem Ethernet28 11.11.12.1/24
        sudo config interface ip rem Ethernet0 11.11.11.1/24
        sudo config interface ipv6 disable use-link-local-only Ethernet28
        sudo config interface ipv6 disable use-link-local-only Ethernet0

    bgp:
      config: |
        router bgp 2363070545
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT bfd
        neighbor TRANSIT ebgp-multihop 255
        neighbor 2001:db8:1::2 peer-group OVERLAY
        neighbor 2001:db8:1::3 peer-group OVERLAY
        neighbor Ethernet0 interface peer-group TRANSIT
        neighbor Ethernet28 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv6 unicast
        exit-address-family

      deconfig: |
        no router bgp 2363070545


