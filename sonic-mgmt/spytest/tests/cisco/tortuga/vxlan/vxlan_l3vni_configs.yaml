
spine0:
    sonic: |
      sudo config interface startup Ethernet0
      sudo config interface startup Ethernet4
      sudo config interface startup Ethernet12
      sudo config interface startup Ethernet16
      sudo config interface ipv6 enable use-link-local-only Ethernet0
      sudo config interface ipv6 enable use-link-local-only Ethernet4
      sudo config interface ipv6 enable use-link-local-only Ethernet12
      sudo config interface ipv6 enable use-link-local-only Ethernet16
      sudo config interface ip add Ethernet0 11.11.11.1/24
      sudo config interface ip add Ethernet8 11.11.12.1/24
      sudo config loopback add Loopback27
      sudo config interface ip add Loopback0 10.200.200.210/32
      sudo config interface startup Loopback27

    bgp: |           
      router bgp 2363070545
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast
      bgp disable-ebgp-connected-route-check
      bgp bestpath as-path multipath-relax
      neighbor OVERLAY peer-group
      neighbor OVERLAY remote-as external
      neighbor OVERLAY disable-connected-check
      neighbor OVERLAY ebgp-multihop 255
      neighbor OVERLAY update-source Loopback27
      neighbor TRANSIT peer-group
      neighbor TRANSIT remote-as external
      neighbor TRANSIT bfd
      neighbor TRANSIT ebgp-multihop 255
      neighbor 10.200.200.200 peer-group OVERLAY
      neighbor 10.200.200.201 peer-group OVERLAY
      neighbor 10.200.200.202 peer-group OVERLAY
      neighbor Ethernet0 interface peer-group TRANSIT
      neighbor Ethernet4 interface peer-group TRANSIT
      neighbor Ethernet8 interface peer-group TRANSIT
      neighbor Ethernet12 interface peer-group TRANSIT
      address-family ipv4 unicast
      redistribute connected
      neighbor TRANSIT activate
      exit-address-family
      address-family ipv6 unicast
      redistribute connected
      neighbor TRANSIT activate
      exit-address-family
      address-family l2vpn evpn
      neighbor OVERLAY activate
      advertise-all-vni
      advertise ipv4 unicast
      exit-address-family

leaf0:
    sonic: |
      sudo config interface startup Ethernet0
      sudo config interface startup Ethernet4
      sudo config interface startup Ethernet8
      sudo config interface startup Ethernet12
      sudo config interface startup Ethernet16
      sudo config interface ipv6 enable use-link-local-only Ethernet0
      sudo config interface ipv6 enable use-link-local-only Ethernet4
      sudo config interface ipv6 enable use-link-local-only Ethernet12
      sudo config interface ipv6 enable use-link-local-only Ethernet16
      sudo config interface ip add Ethernet0 11.11.11.2/24
      sudo config loopback add Loopback27
      sudo config interface ip add Loopback27 10.200.200.200/32
      sudo config vlan add 2
      sudo config vlan member add -u 2 Ethernet8
      sudo config vxlan add VXLAN 10.200.200.200
      sudo config vxlan evpn_nvo add NVO VXLAN
      sudo config vlan add 100
      sudo config vrf add Vrf01
      sudo config interface vrf bind Vlan2 Vrf01
      sudo config interface vrf bind Vlan100 Vrf01
      sudo config vxlan map add VXLAN 100 1000
      sudo config vrf add_vrf_vni_map Vrf01 1000
      sudo config interface ip add Vlan2 100.100.100.254/24
    bgp: |           
      router bgp 2363073663
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast
      bgp disable-ebgp-connected-route-check
      bgp bestpath as-path multipath-relax
      neighbor OVERLAY peer-group
      neighbor OVERLAY remote-as external
      neighbor OVERLAY disable-connected-check
      neighbor OVERLAY ebgp-multihop 255
      neighbor OVERLAY update-source Loopback27
      neighbor TRANSIT peer-group
      neighbor TRANSIT remote-as external
      neighbor TRANSIT bfd
      neighbor TRANSIT ebgp-multihop 255
      neighbor 10.200.200.201 peer-group OVERLAY
      neighbor 10.200.200.210 peer-group OVERLAY
      neighbor 10.200.200.211 peer-group OVERLAY
      neighbor Ethernet0 interface peer-group TRANSIT
      neighbor Ethernet4 interface peer-group TRANSIT
      neighbor Ethernet12 interface peer-group TRANSIT
      neighbor Ethernet16 interface peer-group TRANSIT
      address-family ipv4 unicast
      redistribute connected
      neighbor TRANSIT activate
      exit-address-family
      address-family l2vpn evpn
      neighbor OVERLAY activate
      advertise-all-vni
      advertise ipv4 unicast
      exit-address-family
      exit
      vrf Vrf01
      vni 1000
      exit
      router bgp 2363073663 vrf Vrf01
      address-family ipv4 unicast
      redistribute connected
      exit-address-family
      address-family l2vpn evpn
      advertise ipv4 unicast
      exit-address-family

