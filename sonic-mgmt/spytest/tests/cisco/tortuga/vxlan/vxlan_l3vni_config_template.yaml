spine0:
    sonic:
      config: |
        sudo config interface startup D1D3P1
        sudo config interface startup D1D4P1
        sudo config interface ipv6 enable use-link-local-only D1D3P1
        sudo config interface ipv6 enable use-link-local-only D1D4P1
      deconfig: |
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D3P1

    bgp:
      config: |
        router bgp 2363070545
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor D1D3P1 interface peer-group TRANSIT
        neighbor D1D4P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        end
        exit

      deconfig: |
        no router bgp 2363070545
        end
        exit


leaf0:
    sonic:
      config: |
        sudo config interface startup D3D1P1
        sudo config interface ipv6 enable use-link-local-only D3D1P1
        sudo config interface ip add Loopback27 10.200.200.200/32
        sudo config vxlan add VXLAN 10.200.200.200
        sudo config vxlan evpn_nvo add NVO VXLAN

      deconfig: |
        sudo config vxlan evpn_nvo del NVO
        sudo config vxlan del VXLAN
        sudo config interface ip rem Loopback27 10.200.200.200/32
        sudo config interface ipv6 disable use-link-local-only D3D1P1

    bgp:
      config: |
        router bgp 2363073663
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY update-source Loopback27
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1
        neighbor 10.200.200.201 peer-group OVERLAY
        neighbor D3D1P1 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        exit-address-family
        exit
        vrf Vrf01
        vni 1000
        exit
        router bgp 2363073663 vrf Vrf01
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        exit-address-family
        exit
        vrf Vrf02
        vni 2000
        exit
        router bgp 2363073663 vrf Vrf02
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        exit-address-family
        exit
        vrf Vrf03
        vni 3000
        exit
        router bgp 2363073663 vrf Vrf03
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        exit-address-family
        exit
        vrf Vrf04
        vni 4000
        exit
        router bgp 2363073663 vrf Vrf04
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        exit-address-family
        end
        exit

      deconfig: |
        no router bgp 2363073663 vrf Vrf04
        vrf Vrf04
        no vni 4000
        exit
        no router bgp 2363073663 vrf Vrf03
        vrf Vrf03
        no vni 3000
        exit
        no router bgp 2363073663 vrf Vrf02
        vrf Vrf02
        no vni 2000
        exit
        no router bgp 2363073663 vrf Vrf01
        vrf Vrf01
        no vni 1000
        exit
        no router bgp 2363073663
        end
        exit


