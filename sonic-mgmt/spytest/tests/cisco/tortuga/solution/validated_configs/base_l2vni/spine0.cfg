sudo config hostname Spine0
sudo config interface ipv6 enable use-link-local-only Ethernet0
sudo config interface ipv6 enable use-link-local-only Ethernet8
sudo config loopback add Loopback0
sudo config interface ip add Loopback0 10.200.200.100/32
sudo config interface startup Loopback0
sudo config interface startup Ethernet0
sudo config interface startup Ethernet8
vtysh
configure terminal
frr version 8.2.2
frr defaults traditional
log syslog informational
log facility local4
agentx
hostname Spine0
no service integrated-vtysh-config
password zebra
enable password zebra
router bgp 65100
 bgp router-id 10.200.200.100
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp disable-ebgp-connected-route-check
 bgp bestpath as-path multipath-relax
 neighbor TRANSIT peer-group
 neighbor TRANSIT remote-as external
 neighbor TRANSIT bfd
 neighbor TRANSIT ebgp-multihop 255
 neighbor Ethernet0 interface peer-group TRANSIT
 neighbor Ethernet8 interface peer-group TRANSIT
 address-family ipv4 unicast
  redistribute connected
  neighbor TRANSIT activate
 exit-address-family
 address-family ipv6 unicast
  redistribute connected
  neighbor TRANSIT activate
 exit-address-family
exit
exit
