spine1:
    sonic:
      config: |
        sudo config hostname sonic
        sudo config int breakout Ethernet1_17 "2x400G" -yfl
        sudo config int breakout Ethernet1_19 "2x400G" -yfl
        sudo config int breakout Ethernet1_21 "2x400G" -yfl
        sudo config int breakout Ethernet1_48 "2x400G" -yfl
        sudo config int start Ethernet1_17_1
        sudo config int start Ethernet1_17_2
        sudo config int start Ethernet1_19_1
        sudo config int start Ethernet1_19_2
        sudo config int start Ethernet1_21_1
        sudo config int start Ethernet1_21_2
        sudo config int start Ethernet1_48_1
        sudo config int start Ethernet1_48_2
        sudo config interface ip add Loopback0 1000:1::1/128
        sudo config interface ipv6 enable use-link-local-only Ethernet1_17_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_17_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_19_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_19_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_21_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_21_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_48_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_48_2
    bgp:
      config: |
        router bgp 65100
        bgp router-id 10.200.200.100
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor Ethernet1_17_1 interface peer-group TRANSIT
        neighbor Ethernet1_17_2 interface peer-group TRANSIT
        neighbor Ethernet1_19_1 interface peer-group TRANSIT
        neighbor Ethernet1_19_2 interface peer-group TRANSIT
        neighbor Ethernet1_21_1 interface peer-group TRANSIT
        neighbor Ethernet1_21_2 interface peer-group TRANSIT
        neighbor Ethernet1_48_1 interface peer-group TRANSIT
        neighbor Ethernet1_48_2 interface peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        end
        exit
