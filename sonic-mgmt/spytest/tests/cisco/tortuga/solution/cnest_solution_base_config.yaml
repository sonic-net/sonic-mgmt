leaf1:
    sonic:
      config: |
        sudo config hostname sonic
        sudo counterpoll tunnel enable
        sudo config int breakout Ethernet1_17 "2x400G" -yfl
        sudo config int breakout Ethernet1_18 "2x400G" -yfl
        sudo config int breakout Ethernet1_19 "2x400G" -yfl
        sudo config int breakout Ethernet1_20 "2x400G" -yfl
        sudo config int start Ethernet1_17_1
        sudo config int start Ethernet1_17_2
        sudo config int start Ethernet1_18_1
        sudo config int start Ethernet1_18_2
        sudo config int start Ethernet1_19_1
        sudo config int start Ethernet1_19_2
        sudo config int start Ethernet1_20_1
        sudo config int start Ethernet1_20_2
        sudo config int breakout Ethernet1_1 "2x400G" -yfl
        sudo config int breakout Ethernet1_2 "2x400G" -yfl
        sudo config int breakout Ethernet1_3 "2x400G" -yfl
        sudo config int breakout Ethernet1_4 "2x400G" -yfl
        sudo config int start Ethernet1_1_1
        sudo config int start Ethernet1_1_2
        sudo config int start Ethernet1_2_1
        sudo config int start Ethernet1_2_2
        sudo config int start Ethernet1_3_1
        sudo config int start Ethernet1_3_2
        sudo config int start Ethernet1_4_1
        sudo config int start Ethernet1_4_2
        sudo config interface ip add Loopback0 2000:1::1/128
        sudo config interface ipv6 enable use-link-local-only Ethernet1_17_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_17_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_18_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_18_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_19_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_19_2
        sudo config interface ipv6 enable use-link-local-only Ethernet1_20_1
        sudo config interface ipv6 enable use-link-local-only Ethernet1_20_2
        sudo config vxlan add VXLAN 2000:1::1
        sudo config vxlan evpn_nvo add NVO VXLAN
        sudo config vlan add 11
        sudo config vlan add 12
        sudo config vlan member add -u 11 Ethernet1_1_1
        sudo config vlan member add -u 12 Ethernet1_1_2
        sudo config vlan member add -u 11 Ethernet1_2_1
        sudo config vlan member add -u 12 Ethernet1_2_2
        sudo config vlan member add -u 11 Ethernet1_3_1
        sudo config vlan member add -u 12 Ethernet1_3_2
        sudo config vlan member add -u 11 Ethernet1_4_1
        sudo config vlan member add -u 12 Ethernet1_4_2
        sudo config vxlan map add VXLAN 11 5011
        sudo config vxlan map add VXLAN 12 5012
        sudo config vrf add VrfBackend_101 
        sudo config vlan add 101 
        sudo config interface vrf bind Vlan101 VrfBackend_101 
        sudo config interface vrf bind Vlan11 VrfBackend_101 
        sudo config interface vrf bind Vlan12 VrfBackend_101
        sudo config vxlan map add VXLAN 101 5101 
        sudo config vrf add_vrf_vni_map VrfBackend_101 5101 
        sudo config static-anycast-gateway mac_address add 00:11:22:33:44:55 
        sudo config interface ip add Vlan11 11.11.11.1/24  
        sudo config interface ip add Vlan12 12.12.12.1/24
        sudo config vlan static-anycast-gateway enable 11 
        sudo config vlan static-anycast-gateway enable 12
    bgp:
      config: |
        router bgp 65200
        bgp router-id 10.200.200.200
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor OVERLAY peer-group
        neighbor OVERLAY remote-as external
        neighbor OVERLAY ebgp-multihop 255
        neighbor OVERLAY disable-connected-check
        neighbor OVERLAY update-source Loopback0
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor Ethernet1_17_1 interface peer-group TRANSIT
        neighbor Ethernet1_17_2 interface peer-group TRANSIT
        neighbor Ethernet1_18_1 interface peer-group TRANSIT
        neighbor Ethernet1_18_2 interface peer-group TRANSIT
        neighbor Ethernet1_19_1 interface peer-group TRANSIT
        neighbor Ethernet1_19_2 interface peer-group TRANSIT
        neighbor Ethernet1_20_1 interface peer-group TRANSIT
        neighbor Ethernet1_20_2 interface peer-group TRANSIT
        neighbor 2000:1::2 peer-group OVERLAY
        neighbor 2000:1::3 peer-group OVERLAY
        neighbor 2000:1::4 peer-group OVERLAY
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family
        address-family l2vpn evpn
        neighbor OVERLAY activate
        advertise-all-vni
        advertise ipv4 unicast
        exit-address-family
        exit
        router bgp 65200 vrf VrfBackend_101
        address-family ipv4 unicast
        redistribute connected
        exit-address-family
        address-family l2vpn evpn
        advertise ipv4 unicast
        exit-address-family
        exit
        vrf VrfBackend_101
        vni 5101
        exit-vrf
        end
        exit
