SD7:
    linux:
      config: |
        sudo ip link set dev D7D3P1 up
        sudo ip link set dev D7D4P1 up
        sudo ip link set dev D7D4P2 up
        sudo ip link add link D7D3P1 name D7D3P1.2 type vlan id 2
        sudo ip link set dev D7D3P1.2 up
        sudo ip link add link D7D3P1 name D7D3P1.3 type vlan id 3
        sudo ip link set dev D7D3P1.3 up
        sudo ip link add link D7D4P1 name D7D4P1.2 type vlan id 2
        sudo ip link set dev D7D4P1.2 up
        sudo ip link add link D7D4P1 name D7D4P1.3 type vlan id 3
        sudo ip link set dev D7D4P1.3 up
        sudo ip link add link D7D4P2 name D7D4P2.2 type vlan id 2
        sudo ip link set dev D7D4P2.2 up
        sudo ip link add link D7D4P2 name D7D4P2.3 type vlan id 3
        sudo ip link set dev D7D4P2.3 up
        sudo ip link add name br0 type bridge
        sudo ip link set dev br0 up
        sudo ip link set dev D7D3P1.2 master br0 
        sudo ip link set dev D7D3P1.3 master br0 
        sudo ip link set dev D7D4P1.2 master br0 
        sudo ip link set dev D7D4P1.3 master br0 
        sudo ip link set dev D7D4P2.2 master br0
        sudo ip link set dev D7D4P2.3 master br0
      deconfig: |
        sudo ip link set dev D7D3P1.2 nomaster 
        sudo ip link set dev D7D3P1.3 nomaster 
        sudo ip link set dev D7D4P1.2 nomaster 
        sudo ip link set dev D7D4P1.3 nomaster 
        sudo ip link set dev D7D4P2.2 nomaster
        sudo ip link set dev D7D4P2.3 nomaster
        sudo ip link set dev br0 down
        sudo ip link delete br0 type bridge
        sudo ip link delete D7D3P1.2
        sudo ip link delete D7D3P1.3
        sudo ip link delete D7D4P1.2
        sudo ip link delete D7D4P1.3
        sudo ip link delete D7D4P2.2
        sudo ip link delete D7D4P2.3

