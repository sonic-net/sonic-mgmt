SD5:
    sonic:
      config: |
        sudo config vlan add 2
        sudo config vlan add 3
        sudo config portchannel add PortChannel01 --fast-rate true
        sudo config portchannel member add PortChannel01 D5D3P1
        sudo config portchannel member add PortChannel01 D5D4P1 
        sudo config vlan member add 2 PortChannel01
        sudo config vlan member add 3 PortChannel01
        sudo config spanning-tree vlan enable 2
        sudo config spanning-tree vlan enable 3
        sudo config spanning-tree interface cost PortChannel01 1
      deconfig: |
        sudo config spanning-tree vlan disable 2
        sudo config spanning-tree vlan disable 3
        sudo config vlan member del 2 PortChannel01
        sudo config vlan member del 3 PortChannel01
        sudo config portchannel member del PortChannel01 D5D3P1
        sudo config portchannel member del PortChannel01 D5D4P1 
        sudo config portchannel del PortChannel01
        sudo config vlan del 2
        sudo config vlan del 3

