spine0:
    sonic:
      config: |
        sudo config vlan add 10
        sudo config vlan add 20
        sudo config portchannel add PortChannel01
        sudo config interface startup D1D3P1
        config acl remove table TORTUGA_ACL_INGRESS
        config acl remove table TORTUGA_ACL_INGRESS_V6
        sudo config interface ipv6 disable use-link-local-only D1D3P1
        sudo config portchannel member add PortChannel01 D1D3P1
        sudo config interface startup D1D3P2
        sudo config interface ipv6 disable use-link-local-only D1D3P2
        sudo config portchannel member add PortChannel01 D1D3P2
        sudo config vlan member add 10 PortChannel01
        sudo config vlan member add 20 PortChannel01
        sudo config interface startup D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config vlan member add 10 D1D4P1
        sudo config vlan member add 20 D1D4P1
      deconfig: |
        sudo config vlan member del 10 PortChannel01
        sudo config vlan member del 20 PortChannel01
        sudo config vlan member del 10 D1D4P1
        sudo config vlan member del 20 D1D4P1
        sudo config portchannel member del PortChannel01 D1D3P1
        sudo config portchannel member del PortChannel01 D1D3P2
        sudo config portchannel del PortChannel01
        sudo config interface shutdown D1D4P1
        sudo config vlan del 10
        sudo config vlan del 20

