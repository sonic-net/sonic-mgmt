spine0:
    sonic_bd:
      config: |
        sudo config vlan add 10
        sudo config interface startup D1D3P1
        sudo config interface ipv6 disable use-link-local-only D1D3P1
        sudo config vlan member add 10 D1D3P1
        sudo config interface startup D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config vlan member add 10 D1D4P1
        sudo config interface startup D1D3P3
        sudo config interface ip add D1D3P3 12.1.1.1/24
        sudo config interface ip add D1D3P3 12:1:1::1/120
        sudo config interface startup D1D4P2
        sudo config interface ip add D1D4P2 13.1.1.1/24
        sudo config interface ip add D1D4P2 13:1:1::1/120
      deconfig: |
        sudo config interface ip rem D1D3P3 12.1.1.1/24
        sudo config interface ip rem D1D3P3 12:1:1::1/120
        sudo config interface ip rem D1D4P2 13.1.1.1/24
        sudo config interface ip rem D1D4P2 13:1:1::1/120
        sudo config vlan member del 10 D1D3P1
        sudo config vlan member del 10 D1D4P1
        sudo config vlan del 10
    sonic_bd_pc:
      config: |
        sudo config vlan add 10
        sudo config portchannel add PortChannel01
        sudo config interface startup D1D3P2
        sudo config acl remove table TORTUGA_ACL_INGRESS
        sudo config acl remove table TORTUGA_ACL_INGRESS_V6
        sudo config interface ipv6 disable use-link-local-only D1D3P2
        sudo config portchannel member add PortChannel01 D1D3P2
        sudo config interface startup D1D3P4
        sudo config acl remove table TORTUGA_ACL_INGRESS
        sudo config acl remove table TORTUGA_ACL_INGRESS_V6
        sudo config interface ipv6 disable use-link-local-only D1D3P4
        sudo config portchannel member add PortChannel01 D1D3P4
        sudo config vlan member add 10 PortChannel01
        sudo config interface startup D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config vlan member add 10 D1D4P1
        sudo config interface startup D1D3P3
        sudo config interface ip add D1D3P3 12.1.1.1/24
        sudo config interface ip add D1D3P3 12:1:1::1/120
        sudo config interface startup D1D4P2
        sudo config interface ip add D1D4P2 13.1.1.1/24
        sudo config interface ip add D1D4P2 13:1:1::1/120
      deconfig: |
        sudo config interface ip rem D1D3P3 12.1.1.1/24
        sudo config interface ip rem D1D3P3 12:1:1::1/120
        sudo config interface ip rem D1D4P2 13.1.1.1/24
        sudo config interface ip rem D1D4P2 13:1:1::1/120
        sudo config vlan member del 10 PortChannel01
        sudo config portchannel member del PortChannel01 D1D3P2
        sudo config portchannel member del PortChannel01 D1D3P4
        sudo config portchannel del PortChannel01
        sudo config vlan member del 10 D1D4P1
        sudo config vlan del 10
    sonic_pc:
      config: |
        sudo config vlan add 10
        sudo config portchannel add PortChannel01
        sudo config interface startup D1D3P2
        sudo config acl remove table TORTUGA_ACL_INGRESS
        sudo config acl remove table TORTUGA_ACL_INGRESS_V6
        sudo config interface ipv6 disable use-link-local-only D1D3P2
        sudo config portchannel member add PortChannel01 D1D3P2
        sudo config interface startup D1D3P4
        sudo config acl remove table TORTUGA_ACL_INGRESS
        sudo config acl remove table TORTUGA_ACL_INGRESS_V6
        sudo config interface ipv6 disable use-link-local-only D1D3P4
        sudo config portchannel member add PortChannel01 D1D3P4
        sudo config vlan member add 10 PortChannel01
        sudo config interface startup D1D4P1
        sudo config interface ipv6 disable use-link-local-only D1D4P1
        sudo config vlan member add 10 D1D4P1
        sudo config vlan add 20
        sudo config interface startup D1D3P1
        sudo config interface ipv6 disable use-link-local-only D1D3P1
        sudo config vlan member add 20 D1D3P1
        sudo config vlan member add 20 D1D4P1
      deconfig: |
        sudo config vlan member del 20 D1D4P1
        sudo config vlan member del 20 D1D3P1
        sudo config vlan member del 10 PortChannel01
        sudo config vlan member del 10 D1D4P1
        sudo config portchannel member del PortChannel01 D1D3P2
        sudo config portchannel member del PortChannel01 D1D3P4
        sudo config portchannel del PortChannel01
        sudo config vlan del 10
        sudo config vlan del 20
    bgp:
      config: |
        no router bgp
        router bgp 1001
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor 12.1.1.2 remote-as 1002
        neighbor 12.1.1.2 timers 3 10
        neighbor 12.1.1.2 timers connect 10
        neighbor 13.1.1.2 remote-as 1003
        neighbor 13.1.1.2 timers 3 10
        neighbor 13.1.1.2 timers connect 10
        neighbor 12:1:1::2 remote-as 1002
        neighbor 12:1:1::2 timers 3 10
        neighbor 12:1:1::2 timers connect 10
        neighbor 13:1:1::2 remote-as 1003
        neighbor 13:1:1::2 timers 3 10
        neighbor 13:1:1::2 timers connect 10
        address-family ipv4 unicast
        redistribute connected
        neighbor 12.1.1.2 activate
        neighbor 13.1.1.2 activate
        exit-address-family
        address-family ipv6 unicast
        redistribute connected
        neighbor 12:1:1::2 activate
        neighbor 12:1:1::2 route-map FROM_BGP_PEER_V6 in
        neighbor 12:1:1::2 route-map TO_BGP_PEER_V6 out
        neighbor 13:1:1::2 activate
        neighbor 13:1:1::2 route-map FROM_BGP_PEER_V6 in
        neighbor 13:1:1::2 route-map TO_BGP_PEER_V6 out
        exit-address-family
        exit
        route-map FROM_BGP_PEER_V6 permit 1
        on-match next
        set ipv6 next-hop prefer-global
        exit
        route-map FROM_BGP_PEER_V6 permit 100
        exit
        route-map TO_BGP_PEER_V6 permit 100
        exit
      deconfig: |
        no router bgp 1001

