leaf0:
    sonic:
      config: |
        sudo config interface startup D1D2P1
        sudo config interface ipv6 disable use-link-local-only D1D2P1
        sudo config portchannel add PortChannel19
        sudo config portchannel member add PortChannel19 D1D2P1
        sudo config vlan add 19
        sudo config vlan member add 19 PortChannel19
        sudo config vlan member add  -u 19 D1T1P1
        sonic-clear counters

      deconfig: |
        sudo config vlan member del 19 PortChannel19
        sudo config vlan member del 19 D1T1P1
        sudo config vlan del 19
        sudo config portchannel member del PortChannel19 D1D2P1
        sudo config portchannel del PortChannel19
        sudo config interface startup D1D2P1

    bgp:
      config: |
        router bgp 65102
        bgp router-id 10.200.200.201
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1 
        neighbor D1D2P1 peer-group TRANSIT
        address-family ipv4 unicast
        neighbor TRANSIT activate	
        redistribute connected
        exit-address-family
        exit

      deconfig: |
        no router bgp 65102


