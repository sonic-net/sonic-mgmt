      deconfig: |
        sudo config interface ip remove D2T1P1 3.3.3.1/24
        sudo config interface ip remove D2D1P1 4.4.4.2/24
        sudo config interface breakout D2D1P1 "1x10G(1)" -yf
        sudo config interface startup D2D1P1

    bgp:
      config: |
        router bgp 65103
