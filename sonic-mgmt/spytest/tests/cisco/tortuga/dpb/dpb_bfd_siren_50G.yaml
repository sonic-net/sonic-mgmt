leaf0:
    sonic:
      config: |
        sudo config interface breakout D1D2P1 "1x50G(1)" -yfl
        sudo config interface startup D1D2P1
        sudo config interface ipv6 disable use-link-local-only D1D2P1
        sudo config interface ip add D1D2P1 4.4.4.1/24
        sudo config interface ip add D1T1P1 2.2.2.1/24
        sonic-clear counters


      deconfig: |
        sudo config interface ip remove D1T1P1 2.2.2.1/24
        sudo config interface ip remove D1D2P1 4.4.4.1/24
        sudo config interface breakout D1D2P1 "1x10G(1)" -yf
        sudo config interface startup D1D2P1

    bgp:
      config: |
        router bgp 65102
        bgp router-id 10.200.200.201
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT bfd
        neighbor TRANSIT update-source 4.4.4.1
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 255 
        neighbor 4.4.4.2 peer-group TRANSIT
        address-family ipv4 unicast
        neighbor TRANSIT activate	
        redistribute connected
        exit-address-family
        exit

      deconfig: |
        no router bgp 65102


leaf1:
    sonic:
      config: |
        sudo config interface breakout D2D1P1 "1x50G(1)" -yfl
        sudo config interface startup D2D1P1
        sudo config interface ipv6 disable use-link-local-only D2D1P1
        sudo config interface ip add D2D1P1 4.4.4.2/24
        sudo config interface ip add D2T1P1 3.3.3.1/24
