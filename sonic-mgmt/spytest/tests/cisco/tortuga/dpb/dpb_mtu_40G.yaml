leaf0:
    sonic:
      config: |
        sudo config interface breakout D1D2P1 "4x10G(4)" -yf
        sudo config interface startup D1D2P2
        sudo config interface startup D1D2P3
        sudo config interface startup D1D2P4
        sudo config interface startup D1D2P5
        sudo config interface ipv6 disable use-link-local-only D1D2P2
        sudo config interface ipv6 disable use-link-local-only D1D2P3
        sudo config interface ipv6 disable use-link-local-only D1D2P4
        sudo config interface ipv6 disable use-link-local-only D1D2P5
        sudo config interface mtu D1T1P1 1500
        sudo config interface mtu D1D2P2 1500
        sudo config interface mtu D1D2P3 1500
        sudo config interface mtu D1D2P4 1500
        sudo config interface mtu D1D2P5 9100
        sudo config interface ip add D1D2P2 4.4.4.1/24
        sudo config interface ip add D1D2P3 5.5.5.1/24
        sudo config interface ip add D1D2P4 6.6.6.1/24
        sudo config interface ip add D1D2P5 7.7.7.1/24
        sudo config interface ip add D1T1P1 2.2.2.1/24
        sonic-clear counters

      deconfig: |
        sudo config interface mtu D1T1P1 9100
        sudo config interface mtu D1D2P2 9100
        sudo config interface mtu D1D2P3 9100
        sudo config interface mtu D1D2P4 9100
        sudo config interface mtu D1D2P5 9100
        sudo config interface ip remove D1D2P2 4.4.4.1/24
        sudo config interface ip remove D1D2P3 5.5.5.1/24
        sudo config interface ip remove D1D2P4 6.6.6.1/24
        sudo config interface ip remove D1D2P5 7.7.7.1/24
        sudo config interface ip remove D1T1P1 2.2.2.1/24
        sudo config interface breakout D1D2P1 "1x40G(4)" -yf
        sudo config interface startup D1D2P1

    bgp:
      config: |
        router bgp 65102
        bgp router-id 10.200.200.201
        no bgp ebgp-requires-policy
        no bgp default ipv4-unicast
        bgp disable-ebgp-connected-route-check
        bgp bestpath as-path multipath-relax
        neighbor TRANSIT peer-group
        neighbor TRANSIT remote-as external
        neighbor TRANSIT ebgp-multihop 1 
        neighbor 4.4.4.2 peer-group TRANSIT
        neighbor 5.5.5.2 peer-group TRANSIT
        neighbor 6.6.6.2 peer-group TRANSIT
        neighbor 7.7.7.2 peer-group TRANSIT
        address-family ipv4 unicast
        redistribute connected
        neighbor TRANSIT activate
        exit-address-family

      deconfig: |
        no router bgp 65102


