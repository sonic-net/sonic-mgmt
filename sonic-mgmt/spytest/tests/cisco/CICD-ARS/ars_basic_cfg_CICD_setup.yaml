
leaf0:
  sonic:
      config: |
        sudo config interface ip add D1T1P1 200.200.1.1/24
        sudo config interface ip add D1T1P1 2001:200:1::1/64

        sudo config interface ip add D1D3P1 100.100.41.1/24
        sudo config interface ip add D1D3P2 100.100.42.1/24
        sudo config interface ip add D1D4P1 100.100.81.1/24
        sudo config interface ip add D1D4P2 100.100.82.1/24
        
        sudo config interface ip add D1D3P1 1001:100:41::1/64
        sudo config interface ip add D1D3P2 1001:100:42::1/64
        sudo config interface ip add D1D4P1 1001:100:81::1/64
        sudo config interface ip add D1D4P2 1001:100:82::1/64

      deconfig: |
        sudo config interface ip rem D1T1P1 200.200.1.1/24
        sudo config interface ip rem D1T1P1 2001:200:1::1/64

        sudo config interface ip rem D1D3P1 100.100.41.1/24
        sudo config interface ip rem D1D3P2 100.100.42.1/24
        sudo config interface ip rem D1D4P1 100.100.81.1/24
        sudo config interface ip rem D1D4P2 100.100.82.1/24

        sudo config interface ip rem D1D3P1 1001:100:41::1/64
        sudo config interface ip rem D1D3P2 1001:100:42::1/64
        sudo config interface ip rem D1D4P1 1001:100:81::1/64
        sudo config interface ip rem D1D4P2 1001:100:82::1/64
  bgp:
    config: |
      router bgp 4234521651
      bgp router-id 10.29.158.248
      no bgp ebgp-requires-policy
      no bgp default ipv4-unicast

      bgp disable-ebgp-connected-route-check
      bgp bestpath as-path multipath-relax
      no bgp network import-check

      neighbor 100.100.41.2 remote-as 65203
      neighbor 100.100.42.2 remote-as 65203
      neighbor 100.100.81.2 remote-as 4201951195
      neighbor 100.100.82.2 remote-as 4201951195 


      neighbor 1001:100:41::2 remote-as 65203
      neighbor 1001:100:42::2 remote-as 65203
      neighbor 1001:100:81::2 remote-as 4201951195
      neighbor 1001:100:82::2 remote-as 4201951195

      neighbor 200.200.1.2 remote-as 65205
      neighbor 2001:200:1::2 remote-as 65205

      address-family ipv4 unicast
      neighbor 100.100.41.2 activate
      neighbor 100.100.42.2 activate
      neighbor 100.100.81.2 activate
      neighbor 100.100.82.2 activate
      neighbor 200.200.1.2 activate
      exit-address-family


      address-family ipv6 unicast
      neighbor 1001:100:41::2 activate
      neighbor 1001:100:41::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:41::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:42::2 activate
      neighbor 1001:100:42::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:42::2 route-map TO_BGP_PEER_V6 out

      neighbor 1001:100:81::2 activate
      neighbor 1001:100:81::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:81::2 route-map TO_BGP_PEER_V6 out


      neighbor 1001:100:82::2 activate
      neighbor 1001:100:82::2 route-map FROM_BGP_PEER_V6 in
      neighbor 1001:100:82::2 route-map TO_BGP_PEER_V6 out

      neighbor 2001:200:1::2 activate
      neighbor 2001:200:1::2 route-map FROM_BGP_PEER_V6 in
      neighbor 2001:200:1::2 route-map TO_BGP_PEER_V6 out
      exit-address-family
      exit

      route-map FROM_BGP_PEER_V6 permit 1
      on-match next
      set ipv6 next-hop prefer-global
      exit
      route-map FROM_BGP_PEER_V6 permit 100
      exit
      route-map TO_BGP_PEER_V6 permit 100
      end
      exit

    deconfig: |
      no router bgp 4234521651
      end
      exit

