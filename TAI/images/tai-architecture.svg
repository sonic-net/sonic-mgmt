<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5f6368"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#80868b" stroke-width="1.5"/>
    </marker>
    <style>
      .title  { font-size: 15px; font-weight: 600; fill: #202124; }
      .sub    { font-size: 11.5px; fill: #5f6368; }
      .mono   { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 11.5px; fill: #1a73e8; }
      .tag    { font-size: 11px; font-weight: 600; fill: #5f6368; letter-spacing: .4px; }
      .chip   { font-size: 12.5px; font-weight: 600; fill: #202124; }
      .edgelbl{ font-size: 11px; fill: #5f6368; font-style: italic; }
      .flow   { stroke: #5f6368; stroke-width: 1.6; fill: none; }
      .inherit{ stroke: #80868b; stroke-width: 1.4; fill: none; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="900" height="640" fill="#ffffff"/>

  <!-- Test -->
  <rect x="210" y="28" width="480" height="58" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
  <text x="450" y="50" text-anchor="middle" class="title">Test</text>
  <text x="450" y="71" text-anchor="middle" class="mono">platform_adapter.check_rx_drop(recv_delta, ingress_counters)</text>

  <path class="flow" d="M450,86 L450,124" marker-end="url(#arrow)"/>

  <!-- Facade -->
  <rect x="190" y="124" width="520" height="62" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
  <text x="450" y="148" text-anchor="middle" class="title">PlatformAdapter facade  (core/facade.py)</text>
  <text x="450" y="170" text-anchor="middle" class="sub">one object per DUT  &#183;  delegates every call  &#183;  caches adapters  &#183;  feature gating</text>

  <path class="flow" d="M450,186 L450,224" marker-end="url(#arrow)"/>
  <text x="462" y="209" class="edgelbl">at construction</text>

  <!-- Factory -->
  <rect x="190" y="224" width="520" height="62" rx="10" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.6"/>
  <text x="450" y="248" text-anchor="middle" class="title">AdapterFactory  (core/factory.py)</text>
  <text x="450" y="270" text-anchor="middle" class="sub">reads duthost.facts['hwsku']  &#183;  prefix match &#8594; platform  &#183;  creates instance</text>

  <path class="flow" d="M450,286 L450,322" marker-end="url(#arrow)"/>
  <text x="462" y="308" class="edgelbl">creates the right one</text>

  <!-- Adapter base types -->
  <rect x="120" y="322" width="300" height="62" rx="10" fill="#f3e8fd" stroke="#a142f4" stroke-width="1.6"/>
  <text x="270" y="346" text-anchor="middle" class="title">ThriftAdapter</text>
  <text x="270" y="367" text-anchor="middle" class="sub">SAI thrift counters &#183; PTF context</text>

  <rect x="480" y="322" width="300" height="62" rx="10" fill="#f3e8fd" stroke="#a142f4" stroke-width="1.6"/>
  <text x="630" y="346" text-anchor="middle" class="title">QoSAdapter</text>
  <text x="630" y="367" text-anchor="middle" class="sub">Redis + DUT shell &#183; scheduler / buffers</text>

  <text x="450" y="346" text-anchor="middle" class="tag">core/</text>

  <!-- inherit arrows from platform band up to base types -->
  <path class="inherit" d="M270,470 L270,386" marker-end="url(#arrowOpen)"/>
  <path class="inherit" d="M630,470 L630,386" marker-end="url(#arrowOpen)"/>
  <text x="285" y="430" class="edgelbl">inherits</text>
  <text x="645" y="430" class="edgelbl">inherits</text>

  <!-- Platform band -->
  <rect x="70" y="470" width="760" height="150" rx="12" fill="#f8f9fa" stroke="#80868b" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="86" y="492" class="tag">platforms/{family}/{generation}/  (each generation ships a thrift.py + a qos.py)</text>

  <!-- tomahawk group -->
  <text x="150" y="520" text-anchor="middle" class="tag">tomahawk</text>
  <rect x="96" y="530" width="108" height="44" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.4"/>
  <text x="150" y="557" text-anchor="middle" class="chip">TH5</text>
  <rect x="236" y="530" width="108" height="44" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.4"/>
  <text x="290" y="557" text-anchor="middle" class="chip">TH6</text>
  <path class="inherit" d="M236,552 L204,552" marker-end="url(#arrowOpen)"/>
  <text x="200" y="592" text-anchor="middle" class="edgelbl">TH6 inherits TH5</text>

  <!-- qumran group -->
  <text x="640" y="520" text-anchor="middle" class="tag">qumran</text>
  <rect x="586" y="530" width="108" height="44" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.4"/>
  <text x="640" y="557" text-anchor="middle" class="chip">Q3D</text>
  <text x="640" y="592" text-anchor="middle" class="edgelbl">inherits core base</text>

  <!-- divider -->
  <line x1="450" y1="510" x2="450" y2="600" stroke="#dadce0" stroke-width="1" stroke-dasharray="3 4"/>
</svg>
