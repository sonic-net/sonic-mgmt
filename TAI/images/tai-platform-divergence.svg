<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5f6368"/>
    </marker>
    <style>
      .t  { font-size: 13.5px; font-weight: 600; fill: #202124; }
      .s  { font-size: 11.5px; fill: #5f6368; }
      .m  { font-family: "SFMono-Regular", Consolas, monospace; font-size: 11px; fill: #1a73e8; }
      .v  { font-family: "SFMono-Regular", Consolas, monospace; font-size: 11.5px; fill: #202124; }
      .fl { stroke: #5f6368; stroke-width: 1.6; fill: none; }
    </style>
  </defs>
  <rect width="780" height="430" fill="#ffffff"/>

  <!-- same test call -->
  <rect x="160" y="24" width="460" height="58" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
  <text x="390" y="46" text-anchor="middle" class="t">Same test, unchanged</text>
  <text x="390" y="68" text-anchor="middle" class="m">platform_adapter.check_rx_drop(recv_d, ingress_counters)</text>

  <path class="fl" d="M390,82 L250,120" marker-end="url(#pd-arrow)"/>
  <path class="fl" d="M390,82 L530,120" marker-end="url(#pd-arrow)"/>
  <text x="270" y="106" text-anchor="middle" class="s">on TH6</text>
  <text x="512" y="106" text-anchor="middle" class="s">on Q3D</text>

  <!-- TH6 column -->
  <rect x="90" y="120" width="280" height="56" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
  <text x="230" y="143" text-anchor="middle" class="t">TH6ThriftAdapter</text>
  <text x="230" y="163" text-anchor="middle" class="s">resolves via TH5 &#8594; ThriftAdapter base</text>
  <path class="fl" d="M230,176 L230,210" marker-end="url(#pd-arrow)"/>

  <rect x="90" y="210" width="280" height="180" rx="10" fill="#f1f8f4" stroke="#34a853" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="110" y="236" class="s" font-weight="600">behaviour applied</text>
  <text x="110" y="262" class="v">margin = 2</text>
  <text x="110" y="286" class="v">all counter indices active</text>
  <text x="110" y="310" class="v">drops counted on egress</text>
  <text x="110" y="358" class="s">Tomahawk (XGS) defaults,</text>
  <text x="110" y="375" class="s">nothing overridden</text>

  <!-- Q3D column -->
  <rect x="410" y="120" width="280" height="56" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="1.6"/>
  <text x="550" y="143" text-anchor="middle" class="t">Q3DThriftAdapter</text>
  <text x="550" y="163" text-anchor="middle" class="s">resolves at Q3D / base</text>
  <path class="fl" d="M550,176 L550,210" marker-end="url(#pd-arrow)"/>

  <rect x="410" y="210" width="280" height="180" rx="10" fill="#fef3f2" stroke="#ea4335" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="430" y="236" class="s" font-weight="600">behaviour applied</text>
  <text x="430" y="262" class="v">margin = 10</text>
  <text x="430" y="286" class="v">only counter index 1 read</text>
  <text x="430" y="310" class="v">drops counted on ingress</text>
  <text x="430" y="358" class="s">broadcom-dnx differences live</text>
  <text x="430" y="375" class="s">in the Q3D adapter</text>
</svg>
