# Splunk HTTP Event Collector (HEC) Configuration
splunk:
  hec_url: "https://10.81.124.127:8088"                   # Splunk HEC endpoint (HTTPS)
  hec_token: "ADD SPLUNK HEC TOKEN HERE"       # HEC authentication token
  index: "main"                                            # Splunk index
  source: "packet_drop_monitor"                            # Event source
  sourcetype: "_json"                                      # Sourcetype (using built-in JSON parser)
  verify_ssl: false                                        # SSL verification (disabled for internal server)
  timeout: 30                                             # HTTP timeout seconds (increased for high latency)