parameters:
  - name: dependsOn
    type: object
    default: []
    displayName: 'Depends On'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: maxTier
    type: number
    default: 5
  - name: top
    type: number
    default: 60

stages:
  - stage: common2_migration_dashboard
    displayName: 'common2 Migration Dashboard'
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    jobs:
      - template: /.azure-pipelines/common2/jobs/run-migration-dashboard.yml
        parameters:
          maxTier: ${{ parameters.maxTier }}
          top: ${{ parameters.top }}
