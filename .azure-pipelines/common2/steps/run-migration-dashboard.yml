parameters:
  - name: pythonVersion
    type: string
    default: '3.x'
  - name: maxTier
    type: number
    default: 5
  - name: top
    # Number of easiest tasks to render in the log. 0 == show every task.
    type: number
    default: 60
  - name: jsonArtifactName
    type: string
    default: 'common2-migration-dashboard'

steps:
  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ parameters.pythonVersion }}'
    inputs:
      versionSpec: '${{ parameters.pythonVersion }}'

  - script: |
      set -e
      echo "Generating the tests/common -> tests/common2 migration dashboard..."
      # The analyzer uses only the Python standard library (no pip install needed).
      python .azure-pipelines/common2/scripts/migration_dashboard.py \
        --repo-root "$(Build.SourcesDirectory)" \
        --max-tier ${{ parameters.maxTier }} \
        --top ${{ parameters.top }} \
        --json-out "$(Build.ArtifactStagingDirectory)/migration_dashboard.json"
    displayName: 'Print common2 migration dashboard'

  # Publish the machine-readable dashboard so a later step (or the future
  # GitHub Project upload) can consume it without recomputing.
  - task: PublishPipelineArtifact@1
    displayName: 'Publish migration dashboard JSON'
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/migration_dashboard.json'
      artifact: '${{ parameters.jsonArtifactName }}'

  # ---------------------------------------------------------------------------
  # FUTURE: upload the dashboard to a GitHub Project board.
  # This is intentionally disabled for now (the pipeline only prints to the log
  # and publishes the JSON artifact). When project permissions are available,
  # enable a step here that reads migration_dashboard.json and creates/updates
  # one GitHub Project item per task/sub-task via the GitHub GraphQL API, e.g.:
  #
  # - script: |
  #     python .azure-pipelines/common2/scripts/upload_to_github_project.py \
  #       --json "$(Build.ArtifactStagingDirectory)/migration_dashboard.json" \
  #       --project-url "$(GITHUB_PROJECT_URL)"
  #   env:
  #     GITHUB_TOKEN: $(GITHUB_PROJECT_TOKEN)
  #   displayName: 'Upload dashboard to GitHub Project'
  # ---------------------------------------------------------------------------
