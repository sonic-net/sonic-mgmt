name: Container_Upgrade_Nightly_KVM_$(Build.DefinitionName)_$(SourceBranchName)_$(Build.BuildId)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 0 * * *"
    displayName: Nightly Scheduler
    branches:
      include:
        - internal
    always: true

resources:
  repositories:
    - repository: sonic-mgmt
      type: github
      name: sonic-net/sonic-mgmt
      ref: master
      endpoint: sonic-net

variables:
  - group: SONIC_IMAGE_URLS
  - group: SAITHRIFT_URLS

parameters:
  - name: MGMT_BRANCH
    type: string
    default: internal

  - name: KVM_IMAGE_BRANCH
    type: string
    default: internal

  - name: DOCKERS
    type: string
    default: "telemetry"
    displayName: "Pipe-separated docker short names (e.g. telemetry|restapi)"

  - name: BRANCHES
    type: string
    default: "kubesonic"
    displayName: "Pipe-separated branch/tag prefixes for docker tag discovery (e.g. kubesonic|internal)"

  - name: TESTCASE_FILE
    type: string
    default: "container_upgrade/telemetry_testcases.json"
    displayName: "Path to testcase JSON file"

  - name: PARAMETERS_FILE
    type: string
    default: "container_upgrade/parameters.json"
    displayName: "Path to parameters JSON file"

  - name: OS_VERSIONS
    type: string
    default: "202412|202505|202511"
    displayName: "Pipe-separated OS versions (e.g. 202412|202505|202511)"

  - name: IMAGE_URL_TEMPLATE
    type: string
    default: "http://10.201.148.43/pipelines/Networking-acs-buildimage-Official/vs/internal-<osversion>/latest/target/sonic-vs.bin"
    displayName: "Image URL template with <osversion> placeholder"

  - name: MAX_RUN_TEST_MINUTES
    type: number
    default: 240

  - name: RETRY_TIMES
    type: string
    default: "0"

stages:
- stage: Container_Upgrade_Nightly_KVM
  variables:
    - group: SONiC-Elastictest

  jobs:
  - job: T0
    displayName: kvm.t0.container_upgrade_nightly
    timeoutInMinutes: ${{ parameters.MAX_RUN_TEST_MINUTES }}
    continueOnError: false
    pool: sonic-ubuntu-1c
    steps:
    - template: ../run-test-elastictest-template.yml
      parameters:
        TOPOLOGY: t0
        SCRIPTS: "container_upgrade/test_container_upgrade_nightly.py"
        MGMT_BRANCH: ${{ parameters.MGMT_BRANCH }}
        KVM_IMAGE_BRANCH: ${{ parameters.KVM_IMAGE_BRANCH }}
        MAX_RUN_TEST_MINUTES: ${{ parameters.MAX_RUN_TEST_MINUTES }}
        RETRY_TIMES: ${{ parameters.RETRY_TIMES }}
        REPO_NAME: "sonic-mgmt-int"
        TEST_PLAN_TYPE: "NIGHTLY"
        REQUESTER: "Nightly Test"
        COMMON_EXTRA_PARAMS: "--disable_sai_validation"
        SPECIFIC_PARAM: '[{"name": "container_upgrade/test_container_upgrade_nightly.py","param": "--dockers=${{ parameters.DOCKERS }} --branches=${{ parameters.BRANCHES }} --testcase_file=${{ parameters.TESTCASE_FILE }} --parameters_file=${{ parameters.PARAMETERS_FILE }} --os_versions=${{ parameters.OS_VERSIONS }} --image_url_template=${{ parameters.IMAGE_URL_TEMPLATE }}"}]'

  - job: T1_Lag
    displayName: kvm.t1-lag.container_upgrade_nightly
    timeoutInMinutes: ${{ parameters.MAX_RUN_TEST_MINUTES }}
    continueOnError: false
    pool: sonic-ubuntu-1c
    steps:
    - template: ../run-test-elastictest-template.yml
      parameters:
        TOPOLOGY: t1-lag
        SCRIPTS: "container_upgrade/test_container_upgrade_nightly.py"
        MGMT_BRANCH: ${{ parameters.MGMT_BRANCH }}
        KVM_IMAGE_BRANCH: ${{ parameters.KVM_IMAGE_BRANCH }}
        MAX_RUN_TEST_MINUTES: ${{ parameters.MAX_RUN_TEST_MINUTES }}
        RETRY_TIMES: ${{ parameters.RETRY_TIMES }}
        REPO_NAME: "sonic-mgmt-int"
        TEST_PLAN_TYPE: "NIGHTLY"
        REQUESTER: "Nightly Test"
        COMMON_EXTRA_PARAMS: "--disable_sai_validation"
        SPECIFIC_PARAM: '[{"name": "container_upgrade/test_container_upgrade_nightly.py","param": "--dockers=${{ parameters.DOCKERS }} --branches=${{ parameters.BRANCHES }} --testcase_file=${{ parameters.TESTCASE_FILE }} --parameters_file=${{ parameters.PARAMETERS_FILE }} --os_versions=${{ parameters.OS_VERSIONS }} --image_url_template=${{ parameters.IMAGE_URL_TEMPLATE }}"}]'
