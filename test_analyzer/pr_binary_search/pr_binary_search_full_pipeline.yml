# Pipeline: PR Full Binary Search Pipeline (combined)
# Runs failure analyzer → waits for Kusto ingestion → dispatches one binary
# search pipeline run per unique failure row.
# After all child pipelines are triggered the job exits immediately.
# For manual dispatch with a specific AnalyzerRunId, use pr_binary_search_dispatcher.yml.
name: $(Build.DefinitionName)_$(SourceBranchName)_$(Build.BuildId)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 22 * * *"
    displayName: Daily PR Failure Analyzer and Binary Search
    branches:
      include:
        - internal
    always: true

parameters:
  - name: LOOKBACK_DAYS
    type: number
    default: 1
    displayName: "Lookback Days"

  - name: FAILURE_INFO_FILE
    type: string
    default: "failure_info.json"
    displayName: "Failure Info File"

  - name: MAX_PARALLEL
    type: number
    default: 5
    displayName: "Max Parallel Binary Searches"

  - name: UPLOAD_KUSTO
    type: boolean
    default: true
    displayName: "Upload results to Kusto"

  - name: USE_AGENCY_FAILURE_INFO
    type: boolean
    default: false
    displayName: "Use PRBinarySearchFailureInfoAgency as Kusto failure info source"

  - name: ENABLE_CI_PRESCREENING
    type: boolean
    default: false
    displayName: "Use existing CI build images to narrow buildimage commit range"

  - name: MAX_CONCURRENT_RUNS
    type: number
    default: 8
    displayName: "Max simultaneous binary search pipeline runs to queue"

  - name: MAX_SEARCH_RANGE_DAYS
    type: number
    default: 14
    displayName: "Max days to search back for commit range"

stages:
  - stage: PRFailureAnalyzerAndBinarySearch
    jobs:
      - job: PRFailureAnalyzerAndBinarySearch
        pool: sonic-ubuntu-1c
        timeoutInMinutes: 120
        variables:
          - group: KUSTO_SECRETS
          - group: GIT_SECRETS
          - group: PR Regression
          - name: skipComponentGovernanceDetection
            value: true
        steps:
          - template: pr_failure_analyzer_steps.yml
            parameters:
              LOOKBACK_DAYS: ${{ parameters.LOOKBACK_DAYS }}
              FAILURE_INFO_FILE: ${{ parameters.FAILURE_INFO_FILE }}
              UPLOAD_KUSTO: ${{ parameters.UPLOAD_KUSTO }}
              MAX_SEARCH_RANGE_DAYS: ${{ parameters.MAX_SEARCH_RANGE_DAYS }}

          - task: AzureCLI@2
            retryCountOnTaskFailure: 0
            displayName: Wait for Kusto ingestion
            condition: eq('${{ parameters.UPLOAD_KUSTO }}', 'true')
            inputs:
              azureSubscription: "SONiC-Automation"
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -eux
                echo "Waiting 10 minutes for Kusto ingestion to complete before binary search"
                sleep 600

          - task: AzureCLI@2
            retryCountOnTaskFailure: 0
            displayName: Trigger per-failure binary search pipelines
            inputs:
              azureSubscription: "SONiC-Automation"
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                accessToken=$(az account get-access-token --resource https://api.kusto.windows.net --query accessToken -o tsv)
                export ACCESS_TOKEN=$accessToken
                set -x
                cd test_analyzer
                pip install -r requirements.txt
                cd pr_binary_search
                python trigger_binary_searches.py \
                  --kusto_lookback_hours 2 \
                  --max_parallel ${{ parameters.MAX_PARALLEL }} \
                  --max_concurrent_runs ${{ parameters.MAX_CONCURRENT_RUNS }} \
                  --upload_kusto ${{ parameters.UPLOAD_KUSTO }} \
                  --USE_AGENCY_FAILURE_INFO ${{ parameters.USE_AGENCY_FAILURE_INFO }} \
                  --enable_ci_prescreening ${{ parameters.ENABLE_CI_PRESCREENING }}
            env:
              KUSTO_CLUSTER_INGEST_URL: $(TEST_REPORT_INGEST_KUSTO_CLUSTER_BACKUP)
              AZURE_DEVOPS_ACCESS_TOKEN: $(System.AccessToken)
