# Pipeline: PR Failure Analyzer (standalone)
# Runs failure analysis and publishes failure_info.json as a pipeline artifact.
# Step logic lives in pr_failure_analyzer_steps.yml (shared with pr_full_pipeline.yml).
name: $(Build.DefinitionName)_$(SourceBranchName)_$(Build.BuildId)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 22 * * *"
    displayName: Daily PR Failure Analyzer
    branches:
      include:
        - internal
    always: true

parameters:
  - name: LOOKBACK_DAYS
    type: number
    default: 1
    displayName: "Lookback Days"
  - name: FAILURE_INFO_FILE
    type: string
    default: "failure_info.json"
    displayName: "Failure Info Output File"
  - name: UPLOAD_KUSTO
    type: boolean
    default: true
    displayName: "Upload results to Kusto"
  - name: MAX_SEARCH_RANGE_DAYS
    type: number
    default: 14
    displayName: "Max days to search back for commit range"

stages:
  - stage: PRFailureAnalyzer
    jobs:
      - job: PRFailureAnalyzer
        pool: sonic-ubuntu-1c
        timeoutInMinutes: 1440
        variables:
          - group: KUSTO_SECRETS
          - group: GIT_SECRETS
          - group: PR Regression
          - group: sonicbld
          - name: skipComponentGovernanceDetection
            value: true
        steps:
          - template: pr_failure_analyzer_steps.yml
            parameters:
              LOOKBACK_DAYS: ${{ parameters.LOOKBACK_DAYS }}
              FAILURE_INFO_FILE: ${{ parameters.FAILURE_INFO_FILE }}
              UPLOAD_KUSTO: ${{ parameters.UPLOAD_KUSTO }}
              MAX_SEARCH_RANGE_DAYS: ${{ parameters.MAX_SEARCH_RANGE_DAYS }}
