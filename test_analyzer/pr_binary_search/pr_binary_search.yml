# Pipeline: PR Binary Search (standalone)
# Runs binary search to identify the bad commit for each failure.
# Reads failure info from Kusto (PRBinarySearchFailureInfo) - no artifact download needed.
# Step logic lives in pr_binary_search_steps.yml (shared with pr_binary_search_full_pipeline.yml).
name: $(Build.DefinitionName)_$(SourceBranchName)_$(Build.BuildId)_$(Date:yyyyMMdd)$(Rev:.r)
trigger: none
pr: none

parameters:
  - name: KUSTO_LOOKBACK_HOURS
    type: number
    default: 48
    displayName: "Kusto lookback window (hours) for failure info"
  - name: MAX_PARALLEL
    type: number
    default: 5
    displayName: "Max Parallel Binary Searches"
  - name: UPLOAD_KUSTO
    type: boolean
    default: true
    displayName: "Upload results to Kusto"
  - name: USE_AGENCY_FAILURE_INFO
    type: boolean
    default: false
    displayName: "Use PRBinarySearchFailureInfoAgency as Kusto failure info source"
  - name: ENABLE_CI_PRESCREENING
    type: boolean
    default: false
    displayName: "Use existing CI build images to narrow buildimage commit range"

stages:
  - stage: PRBinarySearch
    jobs:
      - job: PRBinarySearch
        pool: sonic-ubuntu-1c
        timeoutInMinutes: 1440
        variables:
          - group: KUSTO_SECRETS
          - group: GIT_SECRETS
          - group: PR Regression
          - group: sonicbld
          - name: skipComponentGovernanceDetection
            value: true
        steps:
          - template: pr_binary_search_steps.yml
            parameters:
              KUSTO_LOOKBACK_HOURS: ${{ parameters.KUSTO_LOOKBACK_HOURS }}
              MAX_PARALLEL: ${{ parameters.MAX_PARALLEL }}
              UPLOAD_KUSTO: ${{ parameters.UPLOAD_KUSTO }}
              USE_AGENCY_FAILURE_INFO: ${{ parameters.USE_AGENCY_FAILURE_INFO }}
              ENABLE_CI_PRESCREENING: ${{ parameters.ENABLE_CI_PRESCREENING }}
