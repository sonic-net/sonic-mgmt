# Pipeline: PR Binary Search Dispatcher
# Accepts an AnalyzerRunId, queries all failure rows for that batch, and triggers
# one independent pipeline 3305 run per unique failure (deduped by test identity).
# Finishes as soon as all child pipelines are queued — does not wait for results.
#
# Usage:
#   - Triggered manually with a specific ANALYZER_RUN_ID to dispatch binary searches
#     for a freshly completed failure-analyzer batch.
#   - Called from pr_binary_search_full_pipeline.yml after the analyzer step.
name: $(Build.DefinitionName)_$(SourceBranchName)_$(Build.BuildId)_$(Date:yyyyMMdd)$(Rev:.r)
trigger: none
pr: none

parameters:
  - name: ANALYZER_RUN_ID
    type: string
    displayName: "AnalyzerRunId from the failure analyzer batch to dispatch"
  - name: MAX_PARALLEL
    type: number
    default: 5
    displayName: "Max Parallel Binary Searches (per 3305 run)"
  - name: MAX_CONCURRENT_RUNS
    type: number
    default: 8
    displayName: "Max simultaneous 3305 pipeline runs to queue"
  - name: UPLOAD_KUSTO
    type: boolean
    default: true
    displayName: "Upload results to Kusto"
  - name: USE_AGENCY_FAILURE_INFO
    type: boolean
    default: false
    displayName: "Use PRBinarySearchFailureInfoAgency as Kusto failure info source"
  - name: ENABLE_CI_PRESCREENING
    type: boolean
    default: false
    displayName: "Use existing CI build images to narrow buildimage commit range"

stages:
  - stage: DispatchBinarySearches
    jobs:
      - job: DispatchBinarySearches
        pool: sonic-ubuntu-1c
        timeoutInMinutes: 30
        variables:
          - group: KUSTO_SECRETS
          - group: sonicbld
          - name: skipComponentGovernanceDetection
            value: true
        steps:
          - template: ../../.azure-pipelines/templates/install-azure-cli.yml

          - task: AzureCLI@2
            retryCountOnTaskFailure: 0
            displayName: Trigger per-failure binary search pipelines
            inputs:
              azureSubscription: "SONiC-Automation"
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                accessToken=$(az account get-access-token --resource https://api.kusto.windows.net --query accessToken -o tsv)
                export ACCESS_TOKEN=$accessToken
                set -x
                cd test_analyzer
                pip install -r requirements.txt
                cd pr_binary_search
                python trigger_binary_searches.py \
                  --analyzer_run_id "$ANALYZER_RUN_ID" \
                  --max_parallel ${{ parameters.MAX_PARALLEL }} \
                  --max_concurrent_runs ${{ parameters.MAX_CONCURRENT_RUNS }} \
                  --upload_kusto ${{ parameters.UPLOAD_KUSTO }} \
                  --USE_AGENCY_FAILURE_INFO ${{ parameters.USE_AGENCY_FAILURE_INFO }} \
                  --enable_ci_prescreening ${{ parameters.ENABLE_CI_PRESCREENING }}
            env:
              KUSTO_CLUSTER_INGEST_URL: $(TEST_REPORT_INGEST_KUSTO_CLUSTER_BACKUP)
              MSSONIC_TOKEN: $(MSSONIC-TOKEN)
              ANALYZER_RUN_ID: ${{ parameters.ANALYZER_RUN_ID }}
