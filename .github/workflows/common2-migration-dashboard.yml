name: common2 Migration Dashboard

# Daily report of what can be migrated from tests/common to tests/common2,
# how much work each candidate is (rank/tier/score), and which tests it
# impacts. The tabular report is rendered on the workflow run summary page and
# the same data is upserted into a GitHub Project (one card per module).

on:
  push:
    branches:
      - common-to-common2-migration-plan
  schedule:
    # 01:00 UTC every day.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      maxTier:
        description: "Number of difficulty tiers (produces tiers 1..maxTier+1)."
        required: false
        default: "5"
        type: string
      top:
        description: "How many easiest tasks to render in the report table (0 = all)."
        required: false
        default: "60"
        type: string
      dryRun:
        description: "Compute + log the project changes without mutating the project."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  migration-dashboard:
    if: github.repository_owner == 'opcoder023'
    name: Generate common2 migration dashboard
    runs-on: ubuntu-latest
    env:
      # Mirror the working skip_issue_expiry workflow: use the standard GitHub
      # token plus a GitHub App token, and provide the target Project (v2) ID.
      GH_CTOC2_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_CTOC2_PROJECT_ID: ${{ secrets.GH_CTOC2_PROJECT_ID }}
      GH_CTOC2_APP_ID: ${{ secrets.GH_CTOC2_APP_ID }}
      GH_CTOC2_APP_PRIVATE_KEY: ${{ secrets.GH_CTOC2_APP_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history is not required; the analyzer only reads the working tree.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate migration dashboard
        env:
          MAX_TIER: ${{ github.event.inputs.maxTier || '5' }}
          TOP: ${{ github.event.inputs.top || '60' }}
        run: |
          set -e
          mkdir -p dashboard-out
          # The analyzer uses only the Python standard library (no pip install).
          python tools/common2_migration/migration_dashboard.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --max-tier "$MAX_TIER" \
            --top "$TOP" \
            --markdown-out dashboard-out/migration_dashboard.md \
            --json-out dashboard-out/migration_dashboard.json

      - name: Upload dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-dashboard-artifacts
          path: |
            dashboard-out/migration_dashboard.md
            dashboard-out/migration_dashboard.json
            dashboard-out/migration_dashboard.yaml
          if-no-files-found: error
          retention-days: 7

      - name: Publish report to run summary
        if: always()
        run: |
          if [ -f dashboard-out/migration_dashboard.md ]; then
            cat dashboard-out/migration_dashboard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dashboard report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Downloadable artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: migration-dashboard-artifacts (contains migration_dashboard.md, migration_dashboard.json, and migration_dashboard.yaml)" >> "$GITHUB_STEP_SUMMARY"

      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.GH_CTOC2_APP_ID }}
          private-key: ${{ env.GH_CTOC2_APP_PRIVATE_KEY }}

      - name: Upsert dashboard into GitHub Project
        # Only runs when the Project ID is configured.
        if: env.GH_CTOC2_PROJECT_ID != ''
        env:
          DRY_RUN: ${{ github.event.inputs.dryRun == 'true' && '--dry-run' || '' }}
          GITHUB_TOKEN: ${{ env.GH_CTOC2_GITHUB_TOKEN }}
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          PROJECT_ID: ${{ env.GH_CTOC2_PROJECT_ID }}
        run: |
          set -e
          python tools/common2_migration/upsert_migration_project.py \
            --json dashboard-out/migration_dashboard.json \
            --project-id "$PROJECT_ID" \
            $DRY_RUN
