name: common2 Migration Dashboard

# Daily report of what can be migrated from tests/common to tests/common2,
# how much work each candidate is (rank/tier/score), and which tests it
# impacts. The tabular report is rendered on the workflow run summary page and
# the same data is upserted into a GitHub Project (one card per module).

on:
  push:
    branches:
      - common-to-common2-migration-plan
  schedule:
    # 01:00 UTC every day.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      maxTier:
        description: "Number of difficulty tiers (produces tiers 1..maxTier+1)."
        required: false
        default: "5"
        type: string
      top:
        description: "How many easiest tasks to render in the report table (0 = all)."
        required: false
        default: "60"
        type: string
      dryRun:
        description: "Compute + log the project changes without mutating the project."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  migration-dashboard:
    if: github.repository_owner == 'opcoder023'
    name: Generate common2 migration dashboard
    runs-on: ubuntu-latest
    env:
      # A PAT (classic: `project` scope) or fine-grained token with
      # "Projects: read and write". The default GITHUB_TOKEN CANNOT write to
      # user/org Projects, so this secret is required for the upsert step.
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      # Owner of the project (defaults to the repo owner) and the project
      # number (the N in https://github.com/users/<owner>/projects/N).
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history is not required; the analyzer only reads the working tree.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate migration dashboard
        env:
          MAX_TIER: ${{ github.event.inputs.maxTier || '5' }}
          TOP: ${{ github.event.inputs.top || '60' }}
        run: |
          set -e
          mkdir -p dashboard-out
          # The analyzer uses only the Python standard library (no pip install).
          python .github/workflows/scripts/migration_dashboard.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --max-tier "$MAX_TIER" \
            --top "$TOP" \
            --markdown-out dashboard-out/migration_dashboard.md \
            --json-out dashboard-out/migration_dashboard.json

      - name: Publish report to run summary
        if: always()
        run: |
          if [ -f dashboard-out/migration_dashboard.md ]; then
            cat dashboard-out/migration_dashboard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dashboard report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upsert dashboard into GitHub Project
        # Only runs when a project write token is configured (skipped otherwise
        # so forks without the secret don't fail).
        if: env.PROJECT_TOKEN != ''
        env:
          DRY_RUN: ${{ github.event.inputs.dryRun == 'true' && '--dry-run' || '' }}
        run: |
          set -e
          python .github/workflows/scripts/upsert_migration_project.py \
            --json dashboard-out/migration_dashboard.json \
            --project-owner "$PROJECT_OWNER" \
            --project-number "$PROJECT_NUMBER" \
            $DRY_RUN
