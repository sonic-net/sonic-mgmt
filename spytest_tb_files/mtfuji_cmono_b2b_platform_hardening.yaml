        interfaces:
            Ethernet0: {EndDevice: leaf1, EndPort: Ethernet0, params: def_link}
            Ethernet8: {EndDevice: leaf1, EndPort: Ethernet8, params: def_link}
            Ethernet16: {EndDevice: leaf1, EndPort: Ethernet16, params: def_link}
            Ethernet24: {EndDevice: leaf1, EndPort: Ethernet24, params: def_link}
            Ethernet32: {EndDevice: leaf1, EndPort: Ethernet32, params: def_link}
            Ethernet40: {EndDevice: leaf1, EndPort: Ethernet40, params: def_link}
            Ethernet48: {EndDevice: leaf1, EndPort: Ethernet48, params: def_link}
            Ethernet56: {EndDevice: leaf1, EndPort: Ethernet56, params: def_link}
