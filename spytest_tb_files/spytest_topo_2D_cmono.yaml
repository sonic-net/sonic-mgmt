version: 2.0

services: {default: !include sonic_services.yaml}

params: !include sonic_params.yaml
builds: !include sonic_builds.yaml
speeds: !include sonic_speeds.yaml
errors: !include sonic_errors.yaml
instrument: !include sonic_instrument.yaml

configs:
    default: !include sonic_configs.yaml
    empty: {current: [], restore: []}

devices:
    SD1:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.67, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 10, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    SD2:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.210, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 10, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}


topology:
    SD1:
        interfaces:
            Ethernet0: {EndDevice: SD2, EndPort: Ethernet0, params: def_link}
            Ethernet8: {EndDevice: SD2, EndPort: Ethernet8, params: def_link}
            Ethernet16: {EndDevice: SD2, EndPort: Ethernet16, params: def_link}
            Ethernet24: {EndDevice: SD2, EndPort: Ethernet24, params: def_link}
    SD2:
        interfaces:
            Ethernet0: {EndDevice: SD1, EndPort: Ethernet0, params: def_link}
            Ethernet8: {EndDevice: SD1, EndPort: Ethernet8, params: def_link}
            Ethernet16: {EndDevice: SD1, EndPort: Ethernet16, params: def_link}
            Ethernet24: {EndDevice: SD1, EndPort: Ethernet24, params: def_link}

