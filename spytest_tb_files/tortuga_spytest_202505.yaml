version: 2.0

services: {default: !include sonic_services.yaml}

params: !include sonic_params.yaml
builds: !include sonic_builds.yaml
speeds: !include sonic_speeds.yaml
errors: !include sonic_errors.yaml
instrument: !include sonic_instrument.yaml

configs:
    default: !include sonic_configs.yaml
    empty: {current: [], restore: []}

devices:
    spine0:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.206, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 10, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    spine1:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.4, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 11, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    leaf0:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.84, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 12, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    leaf1:
        device_type: DevSonic
        access: {protocol: ssh, ip: 192.168.122.237, port: 22}
        rps: {model: Raritan, ip: 2.3.4.5, outlet: 13, username: admin, password: admin}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    T1:
        device_type: TGEN
        properties: {type: ixia, version: 9.20, ip: 192.168.122.246, ix_server: 192.168.122.207}

topology:
    spine0:
        interfaces:
            Ethernet224: {EndDevice: leaf0, EndPort: Ethernet224, params: def_link}
            Ethernet228: {EndDevice: leaf0, EndPort: Ethernet228, params: def_link}
            Ethernet232: {EndDevice: leaf1, EndPort: Ethernet224, params: def_link}
            Ethernet236: {EndDevice: leaf1, EndPort: Ethernet228, params: def_link}
    spine1:
        interfaces:
            Ethernet224: {EndDevice: leaf0, EndPort: Ethernet232, params: def_link}
            Ethernet228: {EndDevice: leaf0, EndPort: Ethernet236, params: def_link}
            Ethernet232: {EndDevice: leaf1, EndPort: Ethernet232, params: def_link}
            Ethernet236: {EndDevice: leaf1, EndPort: Ethernet236, params: def_link}

    leaf0:
        interfaces:
            Ethernet240: {EndDevice: T1, EndPort: 1/1, params: def_tg_link}
            Ethernet244: {EndDevice: T1, EndPort: 1/2, params: def_tg_link}
            Ethernet248: {EndDevice: T1, EndPort: 1/3, params: def_tg_link}
            Ethernet252: {EndDevice: T1, EndPort: 1/4, params: def_tg_link}

    leaf1:
        interfaces:
            Ethernet240: {EndDevice: T1, EndPort: 1/5, params: def_tg_link}
            Ethernet244: {EndDevice: T1, EndPort: 1/6, params: def_tg_link}
            Ethernet248: {EndDevice: T1, EndPort: 1/7, params: def_tg_link}
            Ethernet252: {EndDevice: T1, EndPort: 1/8, params: def_tg_link}

