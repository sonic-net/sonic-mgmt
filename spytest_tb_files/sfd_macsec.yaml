version: 2.0

services: {default: !include sonic_services.yaml}

params: !include sonic_params.yaml
builds: !include sonic_builds.yaml
speeds: !include sonic_speeds.yaml
errors: !include sonic_errors.yaml
instrument: !include sonic_instrument.yaml

configs:
    default: !include sonic_configs.yaml
    empty: {current: [], restore: []}

devices:
    D1:
        device_type: DevSonic
        access: {protocol: ssh, ip: 1.75.44.12, port: 22}
        rps: {model: Raritan, ip: 1.75.43.207, outlet: 19,20, username: admin, password: admin}
        credentials: {username: cisco, password: cisco123, altpassword: sonic123}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
        rpip: 1.75.44.5
    D2:
        device_type: DevSonic
        access: {protocol: ssh, ip: 1.75.44.11, port: 22}
        rps: {model: Raritan, ip: 1.75.43.205, outlet: 19, username: admin, password: admin}
        credentials: {username: cisco, password: cisco123, altpassword: sonic123}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
        rpip: 1.75.44.5

    T1:
        device_type: TGEN
        properties: {type: ixia, version: 9.20, ip: 172.27.147.46, ix_server: 172.27.147.46}
topology:
    D1:
        interfaces:
            Ethernet8: {EndDevice: T1, EndPort: 1, params: def_tg_link}
            Ethernet16: {EndDevice: D2, EndPort: Ethernet16, params: def_link}
            Ethernet32: {EndDevice: D2, EndPort: Ethernet32, params: def_link}
    D2:
        interfaces:
            Ethernet8: {EndDevice: T1, EndPort: 2, params: def_tg_link}
            Ethernet16: {EndDevice: D1, EndPort: Ethernet16, params: def_link}
            Ethernet32: {EndDevice: D1, EndPort: Ethernet32, params: def_link}
