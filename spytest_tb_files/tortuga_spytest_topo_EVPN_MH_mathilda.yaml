        interfaces:
            Ethernet0: {EndDevice: leaf1, EndPort: Ethernet0, params: def_link}
            Ethernet4: {EndDevice: leaf1, EndPort: Ethernet4, params: def_link}
            Ethernet8: {EndDevice: leaf1, EndPort: Ethernet8, params: def_link}
            Ethernet12: {EndDevice: leaf1, EndPort: Ethernet12, params: def_link}
            Ethernet16: {EndDevice: leaf2, EndPort: Ethernet0, params: def_link}
            Ethernet20: {EndDevice: leaf2, EndPort: Ethernet4, params: def_link}
            Ethernet24: {EndDevice: leaf2, EndPort: Ethernet8, params: def_link}
            Ethernet28: {EndDevice: leaf2, EndPort: Ethernet12, params: def_link}
            Ethernet32: {EndDevice: leaf0, EndPort: Ethernet32, params: def_link}
            Ethernet36: {EndDevice: leaf0, EndPort: Ethernet36, params: def_link}
            Ethernet40: {EndDevice: leaf0, EndPort: Ethernet40, params: def_link}
            Ethernet44: {EndDevice: leaf0, EndPort: Ethernet44, params: def_link}

    leaf0:
        interfaces:
            Ethernet48: {EndDevice: T1, EndPort: 1/7, params: def_tg_link}
            Ethernet52: {EndDevice: T1, EndPort: 1/8, params: def_tg_link}
  
