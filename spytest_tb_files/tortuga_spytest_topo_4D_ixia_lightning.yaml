        device_type: TGEN
        properties: {type: ixia, version: 9.20, ip: 192.168.122.63, ix_server: 192.168.122.161}

topology:
    spine0:
        interfaces:
            Ethernet1_1_1: {EndDevice: leaf0, EndPort: Ethernet1_1_1, params: def_link}
            Ethernet1_1_2: {EndDevice: leaf0, EndPort: Ethernet1_1_2, params: def_link}
            Ethernet1_2_1: {EndDevice: leaf0, EndPort: Ethernet1_2_1, params: def_link}
            Ethernet1_2_2: {EndDevice: leaf0, EndPort: Ethernet1_2_2, params: def_link}
            Ethernet1_3_1: {EndDevice: leaf1, EndPort: Ethernet1_1_1, params: def_link}
            Ethernet1_3_2: {EndDevice: leaf1, EndPort: Ethernet1_1_2, params: def_link}
            Ethernet1_4_1: {EndDevice: leaf1, EndPort: Ethernet1_2_1, params: def_link}
            Ethernet1_4_2: {EndDevice: leaf1, EndPort: Ethernet1_2_2, params: def_link}
    spine1:
        interfaces:
            Ethernet1_1_1: {EndDevice: leaf0, EndPort: Ethernet1_3_1, params: def_link}
            Ethernet1_1_2: {EndDevice: leaf0, EndPort: Ethernet1_3_2, params: def_link}
            Ethernet1_2_1: {EndDevice: leaf0, EndPort: Ethernet1_4_1, params: def_link}
            Ethernet1_2_2: {EndDevice: leaf0, EndPort: Ethernet1_4_2, params: def_link}
            Ethernet1_3_1: {EndDevice: leaf1, EndPort: Ethernet1_3_1, params: def_link}
