            Ethernet1_5_2: {EndDevice: T1, EndPort: 1/2, params: def_tg_link}
            Ethernet1_6_1: {EndDevice: T1, EndPort: 1/3, params: def_tg_link}
            Ethernet1_6_2: {EndDevice: T1, EndPort: 1/4, params: def_tg_link}
  
    leaf1:
