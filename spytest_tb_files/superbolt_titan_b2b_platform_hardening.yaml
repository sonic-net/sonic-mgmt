version: 2.0
 
services: {default: !include sonic_services.yaml}
 
params: !include sonic_params.yaml
builds: !include sonic_builds.yaml
speeds: !include sonic_speeds.yaml
errors: !include sonic_errors.yaml
instrument: !include sonic_instrument.yaml
 
configs:
    default: !include sonic_configs.yaml
    empty: {current: [], restore: []}
 
devices:
    leaf0:
        device_type: DevSonic
        platform_type: superbolt
        access: {protocol: ssh, ip: 172.25.168.104, port: 22}
        rps: {model: Raritan, ip: 172.25.184.63, outlet: [1,19], username: admin, password: raritan}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
    leaf1:
        device_type: DevSonic
        platform_type: titan
        access: {protocol: ssh, ip: 172.25.168.105, port: 22}
        rps: {model: Raritan, ip: 172.25.184.63, outlet: [4,5,9,10], username: admin, password: raritan}
        credentials: {username: admin, password: password, altpassword: YourPaSsWoRd}
        properties: {config: default, build: default, services: default, params: def_dut, speed: default}
 
topology:
    leaf0:
        interfaces:
            Ethernet0: {EndDevice: leaf1, EndPort: Ethernet0, params: def_link}
            Ethernet8: {EndDevice: leaf1, EndPort: Ethernet8, params: def_link}
            Ethernet16: {EndDevice: leaf1, EndPort: Ethernet16, params: def_link}
            Ethernet24: {EndDevice: leaf1, EndPort: Ethernet24, params: def_link}
            Ethernet32: {EndDevice: leaf1, EndPort: Ethernet32, params: def_link}
            Ethernet40: {EndDevice: leaf1, EndPort: Ethernet40, params: def_link}
            Ethernet48: {EndDevice: leaf1, EndPort: Ethernet48, params: def_link}
            Ethernet56: {EndDevice: leaf1, EndPort: Ethernet56, params: def_link}
            Ethernet64: {EndDevice: leaf1, EndPort: Ethernet64, params: def_link}
            Ethernet72: {EndDevice: leaf1, EndPort: Ethernet72, params: def_link}
            Ethernet80: {EndDevice: leaf1, EndPort: Ethernet80, params: def_link}
            Ethernet88: {EndDevice: leaf1, EndPort: Ethernet88, params: def_link}
            Ethernet96: {EndDevice: leaf1, EndPort: Ethernet96, params: def_link}
            Ethernet104: {EndDevice: leaf1, EndPort: Ethernet104, params: def_link}
            Ethernet112: {EndDevice: leaf1, EndPort: Ethernet112, params: def_link}
