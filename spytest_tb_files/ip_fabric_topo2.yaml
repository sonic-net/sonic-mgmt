speeds: !include sonic_speeds.yaml
errors: !include sonic_errors.yaml
instrument: !include sonic_instrument.yaml

configs:
    leaf0: {current: [ip_fabric/leaf0/config.json, ip_fabric/leaf0/config.frr], restore: []}
    leaf1: {current: [ip_fabric/leaf1/config.json, ip_fabric/leaf1/config.frr], restore: []}
    spine0: {current: [ip_fabric/spine0/config.json, ip_fabric/spine0/config.frr], restore: []}
    spine1: {current: [ip_fabric/spine1/config.json, ip_fabric/spine1/config.frr], restore: []}

